# GLANCE.yml — micropolis
# Status: DESIGNING
# 🏙️ "The filesystem is the city. Git is the multiverse."

status: designing

soul_city: |
  The complete vision: Micropolis engine + MOOLLM + mooco + GitHub-as-MMORPG.
  Humans and AI characters interact via GitHub (issues, PRs) and web app.

what: |
  Micropolis as constructionist educational platform.
  A nurturing environment, not a killer app.
  Open source SimCity → WebAssembly → SvelteKit → MOOLLM.
  AI tutors. School-owned repos. Game state as git-controlled files.

lineage:
  simcity_ports: "SimCity → HyperLook → SimCityNet → Micropolis/OLPC"
  method_of_loci: "DreamScape → iLoci → MediaGraph → Bar Karma"
  web_stack: "C++/TurboGears/OpenLaszlo → MicropolisCore/Emscripten/SvelteKit → GitHub-as-MMORPG"

philosophy:
  nurturing_environment: "Provide creative people fertile ground to plant seeds"
  users_and_agents_on_common_ground: "You and AI interact in same environment"

key_ideas:
  sister_script: "CLI tool for save files, simulation, export, git multiverse"
  ai_tutors: "MOOLLM characters who debate and advise"
  school_repos: "Each school forks and owns their instance"
  git_multiverse: "Branches are timelines. PRs merge histories."

artifacts: |
  artifacts/INDEX.yml — Master index to all artifacts
  artifacts/plans.yml — Planning docs, unfulfilled dreams (Logo turtles, Robot Odyssey)
  artifacts/history.yml — Version timeline + 6 YouTube demo videos
  artifacts/education.yml — Constructionist philosophy, courseware, newspaper metaphor
  artifacts/people.yml — Will Wright, Don Hopkins, Chaim Gingold, Warren Robinett, pioneers
  artifacts/technical.yml — File formats, engine source, diagrams, tilesets
  artifacts/unfulfilled-dreams.yml — 1990s visions → Soul City reality
  artifacts/connections.yml — Related ideas, press, MOOLLM pitch, anti-vibe-coding

see_also:
  - MicropolisCore (github.com/SimHacker/MicropolisCore)
  - mooco (github.com/SimHacker/mooco — private)
  - artifacts/ — organized links to MicropolisCore docs
