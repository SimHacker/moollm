# Sniffable Python — structural sniff depths and optional LLM abstractions
name: sniffable-python
tagline: "Mark and sniff Python (and other files) at multiple depths; extend to description/glance/LLM summary."
what: |
  Defines how to assign "sniff depth" to lines (glance / structure / full) so tools like moo sniff can emit only the right level. Supports optional in-file overrides and future abstractions (description, glance text, LLM summary cached locally).
depths:
  glance: 1      # Section headers, module-level markers — minimal outline
  structure: 2   # + class, def, async def, @decorator — skeleton
  full: 3        # + any other smelly lines — everything structural
related: [moo, moocroworld, skill]
