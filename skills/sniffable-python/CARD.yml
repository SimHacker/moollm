# CARD.yml — sniffable-python
# Read GLANCE.yml first.

name: sniffable-python
tagline: "Sniff depths and abstractions for Python (and extensible to other types)."
description: |
  Documents how Python (and optionally other file types) are "sniffed" at different depths:
  glance (1), structure (2), full (3). Moo sniff uses these; authors can override with
  # SNIFF: depth or # depth: name. Extensible to other abstraction kinds (e.g. description,
  glance text, LLM-generated summary) and to other file types with type-specific depth semantics.

layout: "GLANCE.yml = quick reference; SKILL.md = depth levels, marking convention, extensibility, LLM/abstract hooks."

depths:
  glance: "Section comments (# SECTION, # ---, UPPERCASE); top-level outline only."
  structure: "glance + class, def, async def, @decorator."
  full: "All smelly lines (structure + any other pattern the sniffer emits)."

abstractions: "Future: description (one-line), glance (short summary), LLM summary (cached). File-type-specific."

related:
  moo: "Implements sniff with --depth; uses this skill's depth semantics for .py."
  moocroworld: "Uses moo; branch/object layout."
