# Cursor-mirror: ideas and external-source assimilation
# Two-stage process: Stage 1 = per-source YAML (assimilated/*.yml, in their terms). Stage 2 = universal model (synthesis, deduped, evidentially sourced). See designs/ASSIMILATION-PROCESS.md.

meta:
  version: 1
  updated: "2026-02-18"
  purpose: "Track assimilation of external Cursor SQLite/transcript knowledge into MOOLLM cursor-mirror"
  stage1_output: "reference/assimilated/<SOURCE>.yml"
  stage2_output: "reference/universal/CURSOR-SQLITE-MODEL.yml (design: reference/universal/UNIVERSAL-MODEL-DESIGN.md)"
  format_entourage: "YAML/JSON/JSONB/SQLite/CSV/TXT; schema: reference/universal/cursor-sqlite-model-schema.json; spec: reference/universal/FORMAT-ENTOURAGE.md"
  forum_harvest: "reference/FORUM-HARVEST.md — ideas, projects, people, assimilation candidates from Cursor forum"
  clone_vs_http: "reference/PENDING-SOURCES-CLONE-VS-HTTP.md — which pending sources are worth cloning and mounting in Cursor vs HTTP-only"

