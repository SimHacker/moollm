# Harvested ideas (from assimilations)
ideas:
  - idea: "terminal-commands command: merge DB + transcript for run_terminal_* (TOOL-ARGS-MISSING)"
    source: cursor-mirror
  - idea: "dubble: reverse-engineered full bubble DB, metadata + transcript pointers (DOUBLE-BUBBLE)"
    source: cursor-mirror
  - idea: "cursorDiskKV whole-table read: each value = one chat blob (name, createdAt, conversation[]); legacy/simple shape (fankaidev gist)"
    source: FANKAIDEV-CURSORDISKKV-EXPORT
  - idea: "cursor-composers / .cursor-export-logs output convention; project-scoped export; auto-detect DB (unlimite-context)"
    source: TON-AI-CORE-UNLIMITE-CONTEXT
  - idea: "MessageType filter: user | assistant | tool | thinking | error (cursor-history)"
    source: S2thend/cursor-history
  - idea: "Session/list from workspace ItemTable; full messages from global cursorDiskKV bubbles (cursor-history)"
    source: S2thend/cursor-history
  - idea: "Tool param key aliases per tool (targetFile/path/file, command/cmd, etc.) for display/merge"
    source: S2thend/cursor-history
  - idea: "extractBubbleText: assistant = toolFormerData.result.diff -> formatToolCallWithResult, else text+codeBlocks, else thinking.text; user = codeBlocks then text; error = additionalData.status === 'error'"
    source: S2thend/cursor-history
  - idea: "Borg cookbook: single reference with every key + copy-paste SQL (list sessions, full session, composerState, table check)"
    source: assimilated/BORG-COLLECTIVE-COOKBOOK.yml
  - idea: "Two-stage pipeline: Stage 1 per-source assimilated/*.yml (their terms); Stage 2 universal CURSOR-SQLITE-MODEL.yml (synthesis, YAML Jazz, evidence)"
    source: designs/ASSIMILATION-PROCESS.md
  - idea: "Format entourage: canonical YAML + JSON/JSONB/SQLite/CSV/TXT exports; Python load→validate→process→eval→apply; cursor-sqlite-model-schema.json"
    source: reference/universal/FORMAT-ENTOURAGE.md
  - idea: "Chunk layout: pure data in individual files, subdirs, semantic names (clear, domain nomenclature; category-first when ordering needed; no numeric prefixes); no container parsing; git-friendly; assemble/explode (DATA-LAYOUT.md)"
    source: reference/universal/DATA-LAYOUT.md
  - idea: "Official caveat (Forum): no 3rd party extension support; DB format/contents subject to change. Community keys: aiService.prompts, workbench.panel.aichat; globalStorage/workspaceStorage paths; datasette query pattern; backup/Clear All Chats workaround."
    source: CURSOR-FORUM-STATE-VSCDB.yml
  - idea: "Full import/export pipeline: quit Cursor → read full state.vscdb → transform (deterministic or LLM) → write back. Input/output pipeline; full ownership of DB once model is complete. See designs/INPUT-OUTPUT-PIPELINE.md."
    source: cursor-mirror
  - idea: "Reverse-engineered dir: one big dir .moollm/skills/cursor-mirror/reverse-engineered for all big-endian named YAML (from Cursor executables/dirs and from projects by project name). Shared metadata core: source, created, last_updated, attribution, hand_edit_annotations; beyond that project-specific YAML-Jazz. designs/REVERSE-ENGINEERED-DIR.md, reference/reverse-engineered/README.md."
    source: cursor-mirror
  - idea: "Cost analysis extension: cursor-mirror implements (model cost database, context assembly metadata, time cost via timestamps, network bandwidth/flow/latency); skill-snitch and skill-test perform (audit and validate using cost data)."
    source: cursor-mirror
  - idea: "Path-based workspace association: metadata tied to project path; rename/move loses link. cursor-mirror: list orphaned workspaceStorage, recovery (copy DB to new workspace id), document workspace.json→folder URI. (Forum: tree, 42699)"
    source: reference/FORUM-HARVEST.md
  - idea: "Orphan cleanup: list workspaces (last-used, size), export selected to markdown, optionally prune/archive. (Forum: metadata storage, cleanup)"
    source: reference/FORUM-HARVEST.md
  - idea: "Recovery after rename/move: identify old workspace id from workspace.json, copy/symlink state into new workspace folder. (Forum: SOLVED 48163)"
    source: reference/FORUM-HARVEST.md
  - idea: "Rich export: HTML or styled markdown with diff highlighting; forum asks for PDF/rich-ish text. (Forum: 37986)"
    source: reference/FORUM-HARVEST.md
  - idea: "Document cursorDiskKV migration: 'storage structure changed, now in cursorDiskKV'; keep ItemTable + cursorDiskKV in KEY-CATALOG. (Forum, fankaidev gist)"
    source: reference/FORUM-HARVEST.md
  - idea: "MOOCO turbocharges MOOLLM by directly supporting skills: precise context management, k-line diffusion, advanced orchestration (tick, magic dictionary, context paging, skill containment). Assimilated data feeds MOOCO context and state. See designs/MOOCO-INTEGRATION.md; mooco_interpolation in assimilated YAMLs."
    source: cursor-mirror
  - idea: "MOOCO-in-the-middle: MOOCO piggybacks on Cursor (user auth, API, tools, MCP, terminal, chat stream). Watch = cursor-mirror/state.vscdb (bubbles, thinking, tool calls); Act = cursor-rpc + same auth (StreamChat, ClientSideToolV2). Cursor becomes MOOCO's UI; agents 'just know' and interact via chat. Interpose in chat stream = plug-in outpost in the Composer feed (like Facebook apps in the social stream). See EVERESTMZ-CURSOR-RPC.yml mooco_in_middle, designs/MOOCO-INTEGRATION.md section MOOCO-in-the-middle."
    source: cursor-mirror
  - idea: "MOOCO-in-the-middle: run quick free local model over the stream (summarize, annotate, back-and-forth); run skill-snitch to virus-scan and analyze the stream (body and spirit). Build protocol trace + summary over time; edit the ongoing protocol each way; play–learn–lift from it (explore, learn patterns, skillify)."
    source: cursor-mirror

# Pipeline / tooling extensions (todo)
# cursor-mirror implements; skill-snitch and skill-test consume/perform.
extensions_todo:
  - id: cost-analysis
    name: Cost analysis extension
    implement: cursor-mirror
    perform: [skill-snitch, skill-test]
    inputs:
      - model_cost_database
      - context_assembly_metadata
      - timestamps
      - network_bandwidth_flow_latency
    description: |
      Model cost: use model cost DB + token/usage from bubbles/agentKv to compute $ per session/composer.
      Time cost: analyze timestamps (createdAt, updatedAt, tool call order) for latency, duration, idle.
      Network: bandwidth, flow, latency from context assembly metadata and request/response patterns.
      cursor-mirror exposes cost commands and data; skill-snitch audits cost (e.g. runaway spend); skill-test validates cost budgets and SLAs.

# Protocols extracted (cross-reference DATA-SCHEMAS, KEY-CATALOG)
protocols:
  - name: workspace_vs_global
    summary: "List sessions from workspace ItemTable (composer.composerData or legacy chatdata); full content from global cursorDiskKV (bubbleId:*, composerData:*)."
    sources: [S2thend/cursor-history, jbdamask/cursor-db-mcp]
  - name: bubble_type_codes
    summary: "type 1 = user, type 2 = assistant (bubble JSON)."
    sources: [S2thend/cursor-history, DATA-SCHEMAS]
  - name: composer_state_global
    summary: "YOLO/modes live in global ItemTable key reactiveStorage...applicationUser; composerState.* paths."
    sources: [tarq.net, TARQ-COMPOSER-STATE.yml]
  - name: mcp_resources_cursor
    summary: "cursor://projects, cursor://projects/{name}/chat|composers, cursor://composers/{id}; query_table(ItemTable|cursorDiskKV)."
    sources: [jbdamask/cursor-db-mcp, JBDAMASK-CURSOR-DB-MCP.yml]
