  workspace_vs_global: "Forum: workspaceStorage for per-workspace state.vscdb (ItemTable keys above); globalStorage for global state.vscdb (loading-forever thread). Aligns with jbdamask/S2thend."
  table: "Forum only mentions ItemTable; cursorDiskKV (global) not mentioned in these threads."
