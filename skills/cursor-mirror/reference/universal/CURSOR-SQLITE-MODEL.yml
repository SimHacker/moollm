paths:
  darwin:
    base: "~/Library/Application Support/Cursor/User"
    global_db: "globalStorage/state.vscdb"
    workspace_storage: "workspaceStorage"
  win32:
    base: "%APPDATA%/Cursor/User"
    global_db: "globalStorage/state.vscdb"
    workspace_storage: "workspaceStorage"
  linux:
    base: "~/.config/Cursor/User"
    global_db: "globalStorage/state.vscdb"
    workspace_storage: "workspaceStorage"
  workspace_db: "workspaceStorage/{id}/state.vscdb"
  workspace_json: "workspaceStorage/{id}/workspace.json"
  folder_uri_to_path: "folder.replace(/^file:\\/\\//, '').replace(/%20/g, ' ')"
  recovery_backup_paths: { global_backup: "globalStorage/state.vscdb.backup", history_folder: "User/History/", sources: [BOSTOCK-CURSORRECOVERY] }
  vscdb_note: "*.vscdb = SQLite workspace/extension state (DCREBBIN-CURSOR-LEARNER)."
  cursor_agent:
    path_pattern: "~/.cursor/chats/<user_hash>/<chat_id>/store.db"
    note: "Per-chat DB; meta + blobs (protobuf). Schema not fully documented. Single source DAV-ELL."
  storage_note: |
    Full chat content (bubbles) = global state.vscdb cursorDiskKV only (bubbleId:*, composerData:*).
    Session list and legacy/cache (composer.composerData allComposers[], workbench.panel.aichat, aiService.prompts)
    can appear in workspace ItemTable; canonical session list and full messages come from global.

tables:
  ItemTable:
    schema: "key TEXT, value TEXT (value is JSON)"
    where: "Workspace: session list, prompts, generations, panel state. Global: config, composerState, feature flags, memories, MCP, auth."
  cursorDiskKV:
    schema: "key TEXT, value TEXT (or BLOB)"
    where: "Global state.vscdb only. Bubbles, composerData, agentKv, checkpoints, diffs, messageRequestContext."
    note: "KEY-CATALOG total_keys ~102724; bubbleId ~49%, agentKv ~25%, checkpointId ~10%, codeBlockDiff ~7%."
  store_db:
    where: "cursor-agent CLI only; path ~/.cursor/chats/<hash>/<id>/store.db"
    schema: "meta (key, value hex-encoded JSON); blobs (id SHA-256, data BLOB protobuf)"
    note: "Schema not fully documented. Single source DAV-ELL-BLINK-CURSOR-SKILLS."

keys:
  workspace_itemtable:
    session_list_priority:
      description: "Try in order until one exists; value has session list (allComposers[] or legacy chatdata)."
      keys:
        - "composer.composerData"
        - "workbench.panel.aichat.view.aichat.chatdata"
        - "workbench.panel.chat.view.chat.chatdata"
    prompts: "aiService.prompts"
    generations: "aiService.generations"
    note: "Full message content is in global cursorDiskKV (bubbleId:*). allComposers[] has composerId, name, createdAt, lastUpdatedAt."
  global_itemtable:
    composer_state_key: "src.vs.platform.reactivestorage.browser.reactiveStorageServiceImpl.persistentStorage.applicationUser"
    composer_state_paths: "composerState.useYoloMode, yoloCommandAllowlist, yoloCommandDenylist, modes4, defaultMode2, mcpAllowedTools"
    notable: ["cursorai/featureStatusCache", "cursorPendingMemories", "mcpService.knownServerIds"]
  cursor_disk_kv:
    key_pattern: "{namespace}:{id}:{suffix}"
    catalog_summary: { total_keys: 102724, unique_prefixes: 11, source: KEY-CATALOG }
    entries:
      bubbleId: { pattern: "bubbleId:{composerId}:{index}", count: 50567, percent: 49.23, note: "Chat bubbles; ORDER BY rowid = message order." }
      agentKv: { pattern: "agentKv:{composerId}:{toolCallId}", count: 25819, percent: 25.13, note: "Tool results; result, status, toolName." }
      checkpointId: { pattern: "checkpointId:{uuid}:{filePath}", count: 10019, percent: 9.75 }
      codeBlockDiff: { pattern: "codeBlockDiff:{bubbleId}:{blockIndex}", count: 6865, percent: 6.68 }
      codeBlockPartialInlineDiffFates: { pattern: "codeBlockPartialInlineDiffFates:{uuid}", count: 5179, percent: 5.04 }
      messageRequestContext: { pattern: "messageRequestContext:{composerId}:{requestId}", count: 3185, percent: 3.10 }
      composer.content: { pattern: "composer.content.{sha256hash}", count: 975, percent: 0.95 }
      inlineDiffUndoRedo: { pattern: "inlineDiffUndoRedo-{uuid}-{uuid}", count: 56, percent: 0.05 }
      composerData: { pattern: "composerData:{composerId}", count: 36, percent: 0.04 }
      inlineDiffs: { pattern: "inlineDiffs-{hash|timestamp}", count: 13, percent: 0.01 }
      composer.autoAccept: { keys: [lastSeenHeadSha, lastSeenHeadTimestamp], count: 2 }

entities:
  bubble:
    description: "A single message (user prompt or assistant response). Fundamental unit of chat history."
    storage: { table: cursorDiskKV, location: "global state.vscdb", key_pattern: "bubbleId:<composerId>:<messageIndex>" }
    type: { values: { 1: user, 2: assistant } }
    core_fields: { type: integer, text: "Main content; alias content", codeBlocks: "Array of { languageId, content, relativePath, applied }", toolFormerData: "name, params, rawArgs, result, status, additionalData", thinking: "{ text, signature }", createdAt: "ISO 8601", selections: "User code selections" }
    optional_fields_ref: "DATA-SCHEMAS.yml#bubble and embedded_objects"
    fields_full_note: "DAV-ELL documents 69+ fields; DATA-SCHEMAS and S2THEND define core set."
  composer_meta:
    description: "Conversation container metadata. Session list = workspace ItemTable composer.composerData; full blob per id = global cursorDiskKV composerData:{id}."
    fields: { name: string, title: string, createdAt: "unix ms", updatedAt: "unix ms", workspaceUri: "file:// path" }
    storage: { session_list: "Workspace ItemTable key composer.composerData", per_composer: "Global cursorDiskKV composerData:{composerId}" }
  composer_state:
    storage: { table: ItemTable, location: "global state.vscdb", key: "src.vs.platform.reactivestorage.browser.reactiveStorageServiceImpl.persistentStorage.applicationUser" }
    fields: { useYoloMode: boolean, yoloCommandAllowlist: "Array of command strings", yoloCommandDenylist: "Array of command strings", modes4: "Array of mode objects", defaultMode2: "e.g. agent | plan", mcpAllowedTools: "Array of tool IDs" }
  tool_result_parse:
    context: "agentKv:{composerId}:{toolCallId} value; also bubble toolFormerData.result (JSON string)."
    by_tool: { terminal: "result.output", read_file: "result.contents", edit_write: "result.diff.chunks[].diffString; result.resultForModel", generic: "output | result | content | text" }
    error: "additionalData.status === 'error'"
    is_error: "toolFormerData?.additionalData?.status === 'error'"
  tool_param_aliases:
    read_file: [targetFile, path, file]
    list_dir: [targetDirectory, path, directory]
    run_terminal_command: [command, cmd]
    run_terminal_cmd: [command, cmd]
    edit_file: [targetFile, path, file, filePath, relativeWorkspacePath]
    search_replace: [targetFile, oldString, newString, search, replace]
    write: [targetFile, path, file, relativeWorkspacePath]
    grep: [pattern, query, searchQuery]
    codebase_search: [pattern, query, searchQuery]
  agent_transcript:
    description: "Human-readable transcript of agent session: tool calls, tool results, thinking blocks. Not in SQLite."
    storage: "Filesystem; path pattern agent-transcripts/*.txt"
    schema: { Tool_call: "Tool name and arguments; LLM may use different param names.", Tool_result: "Tool output or error.", Thinking: "Reasoning blocks." }
    sources: [cursor-mirror]

algorithms:
  extract_bubble_text:
    assistant: ["1) toolFormerData.result.diff -> formatToolCallWithResult", "2) text + codeBlocks", "3) thinking.text", "4) toolFormerData result as text"]
    user: ["codeBlocks (pasted) then text/content"]
    is_error: "toolFormerData?.additionalData?.status === 'error'"

sql:
  list_sessions_workspace:
    body: "SELECT value FROM ItemTable WHERE key = 'composer.composerData';"
    usage: "Workspace state.vscdb. Returns single row; parse JSON allComposers[].{composerId, name, createdAt, lastUpdatedAt}"
    sources: [BORG-COLLECTIVE-COOKBOOK, S2THEND-CURSOR-HISTORY]
  full_session:
    body: |
      SELECT key, value FROM cursorDiskKV WHERE key LIKE 'bubbleId:' || :composer_id || ':%' ORDER BY rowid ASC;
      SELECT value FROM cursorDiskKV WHERE key = 'composerData:' || :composer_id;
    usage: "Global state.vscdb. Bubbles ORDER BY rowid = message order; then composer metadata."
    sources: [BORG-COLLECTIVE-COOKBOOK, S2THEND-CURSOR-HISTORY]
  list_composers_global:
    body: "SELECT key, value FROM cursorDiskKV WHERE key LIKE 'composerData:%';"
    usage: "Global cursorDiskKV; key format composerData:{uuid}; value has name, title, createdAt, updatedAt, workspaceUri"
    sources: [BORG-COLLECTIVE-COOKBOOK]
  count_bubbles:
    body: |
      SELECT key, (SELECT COUNT(*) FROM cursorDiskKV k2 WHERE k2.key LIKE 'bubbleId:' || replace(k.key, 'composerData:', '') || ':%') as cnt
      FROM cursorDiskKV k WHERE key LIKE 'composerData:%';
    usage: "Per-composer bubble counts from global cursorDiskKV"
    sources: [BORG-COLLECTIVE-COOKBOOK]
  composer_state:
    body: |
      SELECT json_extract(value, '$.composerState.useYoloMode') as useYoloMode,
             json_extract(value, '$.composerState.yoloCommandAllowlist') as allowlist,
             json_extract(value, '$.composerState.defaultMode2') as defaultMode
      FROM ItemTable
      WHERE key = 'src.vs.platform.reactivestorage.browser.reactiveStorageServiceImpl.persistentStorage.applicationUser';
    usage: "Global ItemTable; read composerState (YOLO, modes, defaultMode)"
    sources: [BORG-COLLECTIVE-COOKBOOK, TARQ-COMPOSER-STATE]
  table_check_cursor_disk_kv:
    body: "SELECT name FROM sqlite_master WHERE type='table' AND name='cursorDiskKV';"
    usage: "Check if global DB has cursorDiskKV (required for bubble/composerData read)"
    sources: [BORG-COLLECTIVE-COOKBOOK, S2THEND-CURSOR-HISTORY]
  agent_kv_for_composer:
    body: "SELECT key, value FROM cursorDiskKV WHERE key LIKE 'agentKv:' || :composer_id || ':%' ORDER BY rowid;"
    usage: "Tool results for a composer; ORDER BY rowid"
    sources: [BORG-COLLECTIVE-COOKBOOK]
  search_keys_prefix:
    body: "SELECT key FROM cursorDiskKV WHERE key LIKE :prefix ORDER BY rowid LIMIT :limit;"
    usage: "cursorDiskKV; prefix e.g. 'bubbleId:uuid-here:%' or 'composerData:%'"
    sources: [BORG-COLLECTIVE-COOKBOOK]
  list_itemtable_keys:
    body: "SELECT key FROM ItemTable ORDER BY key;"
    usage: "List all keys in ItemTable (workspace or global)"
    sources: [BORG-COLLECTIVE-COOKBOOK]

legacy_vs_new:
  new_primary: { session_list: "composer.composerData with allComposers[]", bubbles: "Global cursorDiskKV bubbleId:*", composer_meta: "Global cursorDiskKV composerData:{id}" }
  legacy_keys: ["workbench.panel.aichat.view.aichat.chatdata", "workbench.panel.chat.view.chat.chatdata"]
  raw_session: "raw_chat_data.chatSessions or .tabs"
  migration: "Session list and prompts/cache may still live in workspace ItemTable; full message content moved to global cursorDiskKV (bubbleId:*)."
  composer_head: "composerId, name, createdAt, lastUpdatedAt, unifiedMode"
  raw_session_fields: "id, title, createdAt, lastUpdatedAt, messages|bubbles"

