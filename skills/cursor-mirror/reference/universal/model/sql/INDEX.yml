# INDEX.yml -- named SQL queries for Cursor SQLite databases.
# Each query is callable by id from CLI or code. Parameters are typed and documented.
# The .sql file is the source of truth for the query text; this file adds metadata.

queries:

  list_sessions_workspace:
    file: list-sessions-workspace.sql
    db: workspace
    table: ItemTable
    description: "Session list from workspace. Parse JSON allComposers[]."
    params: {}
    returns: "Single row; value is JSON with allComposers[].{composerId, name, createdAt, lastUpdatedAt}"
    chain_hint: "Feed composerId values into full_session or count_bubbles"

  full_session:
    file: full-session.sql
    db: global
    table: cursorDiskKV
    description: "All bubbles + metadata for a composer."
    params:
      composer_id: { type: str, required: true, description: "Composer UUID" }
    returns: "Two result sets: bubbles (ORDER BY rowid = message order), then composer metadata"
    multi_statement: true
    chain_hint: "Get composer_id from list_sessions_workspace or list_composers_global"

  list_composers_global:
    file: list-composers-global.sql
    db: global
    table: cursorDiskKV
    description: "All composers from global DB with metadata."
    params: {}
    returns: "Rows of (key, value); key = composerData:{uuid}, value = JSON metadata"

  count_bubbles:
    file: count-bubbles.sql
    db: global
    table: cursorDiskKV
    description: "Per-composer bubble counts."
    params: {}
    returns: "Rows of (composerData key, count)"

  composer_state:
    file: composer-state.sql
    db: global
    table: ItemTable
    description: "YOLO mode, allowlist/denylist, default mode from composerState."
    params: {}
    returns: "Single row: useYoloMode, allowlist, defaultMode"

  agent_kv_for_composer:
    file: agent-kv-for-composer.sql
    db: global
    table: cursorDiskKV
    description: "Tool results (agentKv) for a composer, ordered by execution."
    params:
      composer_id: { type: str, required: true, description: "Composer UUID" }
    returns: "Rows of (key, value); key = agentKv:{composerId}:{toolCallId}"
    chain_hint: "Get composer_id from list_sessions_workspace"

  table_check_cursor_disk_kv:
    file: table-check-cursor-disk-kv.sql
    db: global
    table: sqlite_master
    description: "Check if cursorDiskKV table exists in global DB."
    params: {}
    returns: "Row with name='cursorDiskKV' if exists, empty otherwise"

  search_keys_prefix:
    file: search-keys-prefix.sql
    db: global
    table: cursorDiskKV
    description: "Search cursorDiskKV keys by prefix pattern."
    params:
      prefix: { type: str, required: true, description: "LIKE pattern, e.g. 'bubbleId:uuid:%'" }
      limit: { type: int, required: false, default: 100, description: "Max rows to return" }
    returns: "List of matching keys"

  list_itemtable_keys:
    file: list-itemtable-keys.sql
    db: either
    table: ItemTable
    description: "List all keys in ItemTable."
    params: {}
    returns: "All key names, sorted"
    chain_hint: "Use to discover available keys; then query specific key values"
