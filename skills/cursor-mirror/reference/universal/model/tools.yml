  # e.g. mcp_cursor-ide-browser_browser_navigate. Not dot-joined.
  cursor-ide-browser: { total: 76, tools: [browser_navigate, browser_click, browser_type, browser_select_option, browser_snapshot] }
  puppeteer-nessus: { total: 13, tools: [browser_navigate, browser_click, browser_press_key, browser_snapshot] }
  naming_in_bubbles: "mcp_{server}_{tool} -- e.g. mcp_cursor-ide-browser_browser_navigate"

explanation_pattern:
  description: "Tools with side effects, external calls, or semantic intent carry a WHY field."
  tools_with_explanation: [codebase_search, web_search, run_terminal_cmd, delete_file]

v2_variants:
  description: "Cursor maintains v1 and v2 of several tools; v2 uses streaming protocols."
  pairs:
    - [read_file, read_file_v2]
    - [list_dir, list_dir_v2]
    - [run_terminal_cmd, run_terminal_command_v2]
    - [search_replace, edit_file_v2]

tool_selection:
  note: "Per HN discussion (joshmlewis): Cursor vectorizes tool descriptions and selects per-query. supportedTools in bubble is dynamic."
  source: "HN#44210550 (TensorZero thread)"

per_action_prompts:
  note: "Different system prompts for Ask, Edit, Cmd-K, Shell, Agent. Not one global prompt."
  source: "TensorZero team (HN#44209875), sshh12 system prompt extract"

by_category:
  file_ops: 12153
  search: 2399
  execution: 5139
  validation: 328
  web: 330
  meta: 334
  mcp: 89

# From prompt extracts (CL4R1T4S Cursor_2.0, sshh12 cursor-agent); may vary by Cursor version
documented_limits:
  read_file: { max_lines: 250, min_lines: 200, note: "Per call; full file only when edited or attached" }
  grep: { max_matches: 50, note: "Results capped" }
  file_search: { max_results: 10, note: "Fuzzy path search; distinct from glob_file_search" }
  sources: [ELDER-PLINIUS-CL4R1T4S-CURSOR, SSHH12-CURSOR-PROMPTS]

# From prompt extracts; reapply = post-edit fallback when apply model fails
prompt_extract_tools:
  reapply: { note: "Call after edit_file when diff not as expected; invokes smarter model to re-apply" }
  file_search: { note: "Fuzzy file path search; 10 results cap (CL4R1T4S)" }
