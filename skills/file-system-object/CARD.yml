# CARD.yml — file-system-object
#
# SNIFFABLE INTERFACE — see SKILL.md for full documentation.
#
# The grammar: plural dirs declare element type, UPPERCASE marker
# files declare interface exports, directories are implementation
# classes in a COM-style multiple-interface sense (minus the UUIDs).

card:
  id: file-system-object
  name: "File System as Object — Directories, Interfaces, and the UPPERCASE Marker Grammar"
  type: [skill, meta, grammar, object-oriented]
  emoji: "📂"
  tier: 1
  rarity: mythic
  tagline: "Directories are classes; UPPERCASE.ext files are interface exports; plurals declare element type."

  description: |
    The object-oriented grammar that makes MOOLLM's file system legible.
    Three rules:

      1. A `<plural>/` directory declares "things in here are of
         type <singular>."  (skills/ → each child is a skill.)

      2. UPPERCASE files at a directory's root declare interface
         exports. `SKILL.md` at root means "this directory exports
         the SKILL interface." Multiple UPPERCASE files = multiple
         interfaces implemented by one directory-as-class.

      3. The directory name is the implementation class name; no
         UUIDs. Like COM, but human-readable from the path alone.

    This skill formalizes a grammar that already exists throughout
    MOOLLM. The other meta-skills (skill, prototype, card, schema)
    all USE this grammar; file-system-object NAMES it explicitly so
    newcomers can read MOOLLM directory trees fluently.

# K-LINES

  k_lines:
  activates:
    - FILE-SYSTEM-OBJECT
    - UPPERCASE-MARKER
    - PLURAL-CONTAINER
    - INTERFACE-EXPORT
    - DIR-AS-CLASS
    - EMPATHIC-TEMPLATE
    - NESTED-SKILLS
    - SKILL-CATEGORY
    - LOOKUP-SCOPE
    - TREE-CONTAINMENT-INHERITANCE
    - POSTEL-PATH-RESOLUTION
    - MOUNTED-REPO-SKILL-PATH
    - DISTRIBUTED-SKILL-ECOSYSTEM
    - CURSOR-WORKSPACE-ROOTS
    - CARD-ONLY-DISPATCH
    - QUACK-QUACK-DUCK-TYPING
  related:
    - { ref: skill, relation: "SKILL.md is an interface export under this grammar" }
    - { ref: card, relation: "CARD.yml is an interface export under this grammar" }
    - { ref: prototype, relation: "DOP delegation reads classes through marker files" }
    - { ref: schema, relation: "schemapedia mechanism/* profiles follow this grammar" }
    - { ref: self, relation: "Self-style prototype + message reception applied to directories" }
    - { ref: com-xpcom, relation: "COM is the structural ancestor of the multiple-interface-per-class idea" }
    - { ref: yaml-jazz, relation: "UPPERCASE.yml marker files are YAML Jazz" }
    - { ref: room, relation: "rooms ARE directories; this grammar applies to them" }

# INVOKE WHEN

invoke_when:
  - 'Reading an unfamiliar directory tree'
  - 'Naming a new directory or marker file'
  - 'Deciding where a file should live'
  - 'Explaining MOOLLM structure to a newcomer'
  - 'Designing a branch-as-object type (UPPERCASE marker file at branch root)'
  - 'Wondering "why is this file named FOO.md?"'

# ADVERTISEMENTS

advertisements:
  PARSE-TREE:
    score: 95
    satisfies: [comprehension, navigation]
    condition: "reading a MOOLLM or sister directory tree"
    what_to_do: "Identify plural dirs; look for UPPERCASE.ext marker files at each dir root; the marker files name the interfaces the dir exports."

  DECLARE-INTERFACE:
    score: 90
    satisfies: [authoring, extending]
    condition: "making a directory expose a new interface"
    what_to_do: "Add FOO.md (or FOO.yml) at the dir's root. The presence of the file = the declaration. No registry needed."

  NAME-A-NEW-DIR:
    score: 85
    satisfies: [authoring, naming]
    condition: "creating a new directory and wondering plural vs singular"
    what_to_do: "If it's a CONTAINER of type T → use T's plural. If it's AN INSTANCE → use a singular name of your choice; add the UPPERCASE marker files for the interfaces it exports."

  BRANCH-AS-OBJECT:
    score: 80
    satisfies: [versioned_storage]
    condition: "storing a versioned <TypeName>_<id> object on a git branch"
    note: "The branch's root directory declares its implemented interface via an UPPERCASE marker file (e.g., ALERT.yml → this branch implements the ALERT interface)."
    see: ../../central/skills/github/protocols/branch-as-object.md       # if reading from moollm repo

  INSTANTIATE-FROM-EMPATHIC-TEMPLATE:
    score: 88
    satisfies: [authoring, scaffolding]
    condition: "plural container `<things>/` has a `<THING>.yml.template` and you want a new instance"
    what_to_do: |
      1. cp <things>/<THING>.yml.template <things>/<id>/<THING>.yml
      2. Fill in REQUIRED fields.
      3. Override defaults ONLY where you differ — omit the rest (they're
         inherited from the template at read time, Self-style).
      4. Strip meta-commentary blocks (the "# [INSTANTIATE: remove this]"
         banners and placeholder hints).
      5. Keep YAML comments that add authorial voice (yaml-jazz).

  LIFT-TEMPLATE-TO-SKILL:
    score: 70
    satisfies: [evolution, reuse]
    condition: "template is getting reused across unrelated contexts (different parent skills / repos / domains)"
    what_to_do: "Promote <THING>.yml.template from its current parent skill to a new standalone skill moollm/skills/<thing>/ with its own SKILL.md + CARD.yml + templates/. Switch consumers to `inherits: [<thing>]`."

  NEST-OR-LIFT-A-SUBSKILL:
    score: 72
    satisfies: [authoring, categorization]
    condition: "deciding whether a sub-concern should be a nested sub-skill or a top-level skill"
    what_to_do: |
      Nest under parent (skills/<parent>/skills/<child>/) when the child is
      only meaningful in the parent's context. Lift to top-level
      (skills/<child>/) when the child earns reuse across unrelated
      contexts, gains independent audience, or other skills want to
      inherit from it. Parent skill IS the category — no separate
      category type needed.

# METHODS

methods:
  parse:        { signature: "ls <dir>; look for UPPERCASE.ext + sub-plural dirs", category: read }
  declare:      { signature: "touch <dir>/FOO.md; fill with content",              category: write }
  validate:     { signature: "check: every subdir of plural X exports the X interface (has X.md or X.yml)", category: audit }
  promote:      { signature: "move content from CHAT/SKILL.md → new subdir under plural container + UPPERCASE marker", category: evolve }
  enumerate:    { signature: "for entry in <things>/: skip {README.md, INDEX.yml, *.template, *.tmpl, *.prototype}; rest are instances", category: read }
  instantiate:  { signature: "cp <things>/<THING>.yml.template <things>/<id>/<THING>.yml; fill REQUIREDs; omit defaults; strip meta-commentary", category: write }
  lift_template: { signature: "move <parent-skill>/<things>/<THING>.yml.template → moollm/skills/<thing>/templates/<THING>.yml.template; update consumers to inherits: [<thing>]", category: evolve }
  nest_subskill: { signature: "mkdir -p skills/<parent>/skills/<child>/; create child SKILL.md + CARD.yml", category: write }

# NAMING CONVENTIONS

naming:
  plural_directory:
    pattern: "<singular>s  |  <singular>es  |  <singular>ies"
    examples: [skills, biomes, mechanisms, recipes, gotchas, runbooks, protocols, instances, stacks, scripts, cost, quota, regions]
    semantic: "children are of type <singular>"

  singular_directory_as_instance:
    pattern: "<lowercase-id>  (kebab-case or single word)"
    examples: [skill, biome, gcs, azure, edgebox, github, json-schema, cursor-mirror]
    semantic: "this dir is an instance; its name is the id"

  UPPERCASE_marker_file:
    pattern: "<TYPENAME>.<ext>"
    examples: [SKILL.md, CARD.yml, GLANCE.yml, README.md, CHARACTER.yml, MECHANISM.yml, ALERT.yml, PROTOTYPES.yml, EXPORTS.yml, BIOME.md, INCARNATION.yml]
    semantic: "this directory EXPORTS the <TYPENAME> interface"
    notes: |
      README.md is a special case: the UPPERCASE name declares the README
      interface (human landing page), which every directory is implicitly
      expected to export if it's intended for direct human navigation.

  branch_as_object_name:
    pattern: "<TypeName>_<id>"
    examples: [Issue_45345345, ALERT_42, Review_a7b2c3d4]
    semantic: "git branch is an instance of <TypeName>; the branch root exports the <TypeName> interface via <TypeName>.yml (or similar UPPERCASE marker file)"
    see: central/skills/github/protocols/branch-as-object.md

# PARTICIPATION LEVELS — how much a directory "quacks like a skill"

participation_levels:
  # 🦆 Duck typing: directory participates in the MOOLLM object system
  # to the degree its UPPERCASE marker files declare.

  full_skill:
    minimum_markers: [SKILL.md, CARD.yml]
    usually_also:    [GLANCE.yml, README.md]
    what_works:      "everything — dispatch, narrative, semantic-image-pyramid reading, ambient-parent inheritance"
    example:         "moollm/skills/biome/"

  dispatchable_object:
    minimum_markers: [CARD.yml]
    required_for_dispatch: true
    what_works: |
      methods:, advertisements:, k_lines:, state:, inherits:, navigation:
      ALL work. queryInterface(dir, 'card') returns the sniffable interface.
      This is a first-class object — NOT a degraded skill.
    what_doesnt:  "no narrative / teaching protocol; semantic-image-pyramid reading collapses to GLANCE → CARD"
    when_to_use:  "the directory has methods to declare but no HOW to teach; narrative isn't warranted yet"
    com_parallel: "implementation that exports IFoo without also exporting a documentation interface"

  scope_declared_stub:
    minimum_markers: []
    required_context: "lives inside `skills/<name>/` (or `biomes/<name>/`, etc.)"
    what_works: "type-level discovery (enumeration recognizes as plural's type); becomes dispatchable when a CARD.yml is added"
    note: "not an error — a stub is a signpost to future self about what goes here"

narrative_is_optional:
  principle: "Write CARD when you have methods to declare; write SKILL when you have a protocol to teach. The two files answer different questions — not every object needs a teaching narrative."
  card_question:  "WHAT CAN THIS DO?"
  skill_question: "HOW DOES THIS WORK?"

# SKILL LOOKUP — resolve bare names by walking outward; tree containment = inheritance

skill_lookup:
  forms_accepted:
    - { form: bare_name,             example: "biome",                              notes: "resolver searches outward; shortest form" }
    - { form: unambiguous_fragment,  example: "moollm/skills/biome",                notes: "preferred for prose + design docs + cross-repo refs" }
    - { form: relative_path,         example: "../biome/",                          notes: "works in Markdown renderers without a resolver" }
    - { form: slash_path,            example: "moollm/skills/biome/SKILL.md",       notes: "fully qualified, file-level" }
    - { form: scalar_or_list,        example: "inherits: biome   # or [biome]",     notes: "resolver accepts both" }

  resolution_order:
    phase_1_local_tree_walk:
      desc: "Walk upward from the referring skill's dir; at each level run TWO searches"
      duck_test: "is_skill_like(d) ≡ exists(d/SKILL.md) OR exists(d/CARD.yml)    # CARD alone is enough to dispatch"
      steps:
        - "Search 1: is_skill_like(d / 'skills' / name) → found"
        - "Search 2 (self-match): basename(d) == name AND is_skill_like(d) → found (d IS the skill)"
        - "d = parent(d); repeat until filesystem root"
      notes:
        - "Search 1's container doesn't need to be a skill — any dir can scope skills via `skills/`"
        - "Search 2 requires d to itself quack like a skill (SKILL.md OR CARD.yml at its root)"
    phase_2_mounted_workspace_roots:
      desc: "For every mounted repo in the workspace, check its `skills/<name>/`"
      equal_citizen_sources:
        - { category: moollm_core,        example: "moollm/skills/",           role: "baseline library" }
        - { category: customer_specific,  example: "central/skills/",          role: "company / per-customer overlays" }
        - { category: distributed,        example: "<team-shared>/skills/",    role: "org-wide shared packs" }
        - { category: public,             example: "<community-pack>/skills/", role: "third-party open-source" }
        - { category: private,            example: "<my-scratch>/skills/",     role: "personal work-in-progress" }
        - { category: per_project,        example: "<project>/skills/",        role: "workspace-local" }
      editor_support: "Cursor's multi-root workspace maps directly onto this model"
      versioning: "git commit/tag/branch of the mounted skill repo pins the version; no skill-layer version negotiation"
    shadowing: "first match wins; closer definition shadows farther one (classic lexical scope)"

  graceful_degradation: |
    If a referenced skill's repo is not mounted, treat as unresolved,
    emit a one-line warning naming the expected repo so the developer
    can mount it. Do NOT crash. (Robust-first principle.)

  tree_containment_is_inheritance: |
    A skill at A/B/C/foo/ inherits the ambient behaviors of any of
    A/B/C/ → A/B/ → A/ that are themselves skills (have SKILL.md at
    their root), in that order, before falling through to mounted-repo
    / MOOLLM-wide defaults. Parallels: Python sys.path, Node.js
    node_modules walk, CSS cascade, DOM event bubbling, Self/Scheme
    lexical scope, .gitignore composition, COM aggregation.

  postel_law:
    when_emitting: "prefer unambiguous path fragment (moollm/skills/biome/SKILL.md)"
    when_accepting: "accept bare names, fragments, relative paths, slash-form, scalar-or-list"
    cite: "RFC 761 — 'Be conservative in what you send, be liberal in what you accept.'"

  disambiguation_rules:
    - "Two skills in the same scope with the same name → resolver errors; author must disambiguate"
    - "A skill deliberately shadowing a more-distant one should declare `shadows: <path>` in its CARD.yml"
    - "Consumer-repo skills using MOOLLM skills by bare name SHOULD still work; MOOLLM finds them"

# EMPATHIC TEMPLATES — type-level artifacts that anticipate authoring

empathic_templates:
  shape:
    single_file: "<things>/<THING>.yml.template"     # or .md.template
    directory:   "templates/<THING>/"                # for multi-file scaffolds
  characteristics:
    - "Inline explanations alongside every section (what it's for, typical values, trade-offs)"
    - "Sensible defaults pre-filled; instance can OMIT defaults it doesn't need to override"
    - "Meta-commentary blocks clearly marked so they can be stripped at instantiation"
    - "UPPERCASE-prefixed because they declare a TYPE, not content"
  instantiation:
    copy:       "cp <THING>.yml.template <things>/<id>/<THING>.yml"
    fill:       "populate REQUIRED fields"
    minimize:   "delete keys that match the default — the template carries them"
    clean:      "strip meta-commentary ('# [INSTANTIATE: remove this]' banners)"
    preserve:   "keep YAML comments that carry authorial voice (yaml-jazz)"
  defaults_resolution: |
    Self-style prototype delegation applied to templates:
      effective = defaults_from(<THING>.yml.template) ∪ fields_from(<THING>.yml)
                                                      (instance wins on conflict)
    Composes naturally with DOP: template is the prototype, instance inherits from it.
  lift_when:
    - "template is reused across unrelated parent skills"
    - "template gains consumers outside the parent's audience"
    - "other skills want to `inherits:` the template's type directly"
    - "how_to_lift: promote to moollm/skills/<thing>/ with its own SKILL.md + templates/"

# NESTED SKILLS — skill containing skill; parent IS the category

nested_skills:
  shape: |
    skills/<parent>/
    ├── SKILL.md                  ← the parent skill's own protocol
    ├── CARD.yml
    └── skills/                   ← plural: sub-skills of this parent
        └── <child>/
            ├── SKILL.md
            └── CARD.yml
  category_pattern: |
    The parent skill IS the category for its sub-skills — no separate
    "category" concept is needed. A sub-skill belongs to a category by
    virtue of its path: skills/<category>/skills/<member>/.
  when_to_nest:
    - "sub-skill is only meaningful in the parent's context"
    - "sub-skill is a sub-concern of the parent not yet reused elsewhere"
    - "parent wants to ship sub-skills as exemplary reference material (cf. skills/biome/biomes/gcp/)"
  when_to_lift:
    - "sub-skill is reusable across unrelated contexts"
    - "other skills want to inherit from it"
    - "audience broadens beyond users of the parent"
  cross_category: |
    Don't duplicate directories for cross-category membership. A skill
    lives at one canonical path; other categories reference it via DOP
    `inherits:` chains. (E.g., a skill that belongs to both gardening
    and cooking categories lives once and is referenced twice.)

# INTERFACES — the canonical set MOOLLM defines

canonical_interfaces:
  SKILL:
    file: SKILL.md
    exporter: "MOOLLM skill"
    consumer: "MOOLLM orchestrator, LLM reading the skill"
    semantic: "this dir implements a reusable MOOLLM skill"

  CARD:
    file: CARD.yml
    exporter: "any skill or card-shaped directory"
    consumer: "orchestrator sniffing interfaces"
    semantic: "this dir exposes a sniffable interface (methods, advertisements, k_lines, navigation)"

  GLANCE:
    file: GLANCE.yml
    exporter: "any skill"
    consumer: "LLM doing initial relevance scan"
    semantic: "this dir has a quick-scan summary for multi-resolution reading"

  README:
    file: README.md
    exporter: "nearly every directory intended for human navigation"
    semantic: "this dir has a human landing page"

  CHARACTER:
    file: CHARACTER.yml
    exporter: "a character / persona instance"
    semantic: "this dir is an incarnation-ready character"

  MECHANISM:
    file: MECHANISM.yml
    exporter: "a schemapedia plugin entry"
    semantic: "this dir is a registered schema mechanism in schemapedia"

  EXPORTS:
    file: EXPORTS.yml
    exporter: "a skill that knows how to package itself for standalone distribution"
    semantic: "this dir declares bundling rules"

  PROTOTYPES:
    file: PROTOTYPES.yml
    exporter: "a DOP-participating directory with an ordered prototype stack"
    semantic: "this dir declares its delegation chain for first-match-wins lookup"

  ALERT:
    file: ALERT.yml
    exporter: "a branch-as-object alert instance in leela-alerts"
    semantic: "this branch implements the ALERT interface (id, type, severity, state, etc.)"
    see: "central/skills/github/protocols/branch-as-object.md"

  # Extend this list as new canonical interfaces are defined.

# STATE

state:
  fields:
    - current_directory
    - observed_marker_files
    - inferred_interfaces

# TOOLS

tools:
  required: [read_file]
  optional: [list_dir, grep]

# FILES INDEX

files:
  core:
    - GLANCE.yml
    - CARD.yml
    - SKILL.md
    - README.md

  see_also:
    - ../skill/SKILL.md
    - ../skill/delegation-object-protocol.md
    - ../skill/skill-instantiation-protocol.md
    - ../schema/schemas/mechanisms/com-xpcom/
    - ../schema/schemas/mechanisms/self/

# SERIALIZATION PREFERENCE — for interface marker files

serialization_preference:
  preferred: yaml
  welcome:   json
  also_ok:   markdown    # for prose-heavy interfaces (SKILL.md, README.md)
  rationale: |
    YAML supports comments as first-class carriers of meaning (yaml-jazz
    skill). JSON is welcome for tooling interop (jq, ajv, schema validators)
    but strips human intent — use it when a downstream tool requires it,
    keep the YAML form as canonical. Markdown is the right choice when the
    interface is narrative (SKILL.md, README.md). Comments in YAML are
    ENCOURAGED: they're the primary way MOOLLM carries "why" alongside "what."
  canonical_pattern: |
    Interface marker file                 → preferred extension
    ─────────────────────                 ──────────────────────
    FOO.yml (data-shaped interfaces)      → .yml (comments + structure)
    FOO.json (tool-interop interfaces)    → .yml canonical + .json generated
    FOO.md (narrative interfaces)         → .md (prose + structure)
    FOO.yml.tmpl / FOO.md.tmpl            → scaffold templates (placeholders filled on instantiation)
    FOO.yml.template / FOO.md.template    → EMPATHIC templates (inline guidance + defaults;
                                            copy, fill REQUIREDs, omit defaults, strip meta)
    FOO.yml.prototype / FOO.md.prototype  → prototype exemplar (read-only reference instance)
  yaml_over_json:
    - "YAML: comments support, structural hints via indentation, first-class multi-line strings"
    - "YAML: yaml-jazz skill treats comments as semantic data (three audiences: humans, LLMs, machines)"
    - "YAML: richer than JSON for the expressive-authoring use case"
    - "JSON: more universal tool support (ajv, jq, std libs), smaller parser footprint"
    - "JSON: required when emitted by a program that doesn't need human authorship"
  guidance:
    - "If you're authoring by hand → YAML. Always."
    - "If a tool is reading it and humans rarely will → JSON is fine."
    - "If it's narrative (explains, guides, teaches) → Markdown."
    - "If you need both (human-authored + tool-consumed) → YAML canonical, JSON generated on a hook."

# LINEAGE — ancestral influences, oldest first

lineage:
  - { name: "Smalltalk",
      source: "Xerox PARC, Alan Kay et al., 1970s",
      contribution: "classes and instances; message passing; image-as-object persistence; the original OO file system spirit lives in the Smalltalk image" }
  - { name: "Self",
      source: "David Ungar & Randall Smith, 1987",
      contribution: "prototype delegation; objects without classes; parent slots; the direct ancestor of MOOLLM's DOP" }
  - { name: "NeWS (Network extensible Window System)",
      source: "James Gosling & David S. H. Rosenthal (Sun Microsystems, 1986)",
      contribution: "PostScript-based window system with lightweight prototype delegation; proved prototype-style object-orientation in system software at a scale beyond Self's research context" }
  - { name: "TNT: The NeWS Toolkit",
      source: "Owen Densmore & David S. H. Rosenthal (Sun, late 1980s)",
      contribution: "class hierarchy built on NeWS's prototype foundation; a widget/UI class system where class identity and inheritance were first-class filesystem-and-namespace concerns. The patent around this work is the direct conceptual ancestor of treating the file system as an OO class hierarchy with named interfaces." }
  - { name: "COM (Component Object Model)",
      source: "Microsoft, mid-1990s",
      contribution: "multiple interfaces per implementation class; QueryInterface dispatch; the interface-class distinction MOOLLM borrows (minus UUIDs)" }
  - { name: "XPCOM",
      source: "Mozilla",
      contribution: "cross-platform COM; the 'how to do COM right' / 'how did COM go wrong' history; schemapedia's com-xpcom mechanism has the fuller retrospective" }
  - { name: "Ted Nelson — intertwingularity",
      source: "Project Xanadu, 1960s+",
      contribution: "explicit cross-reference is the primary mode of computation; filesystems and skills alike are fundamentally linked, not siloed" }
  - { name: "MOOLLM DOP (Delegation Object Protocol)",
      source: "don@leela-ai.com, leela-ai/moollm",
      contribution: "formalized Self-style delegation for LLM-read-able filesystems; PROTOTYPES.yml as an interface export marker" }
  - { name: "MOOLLM branch-as-object",
      source: "leela-ai/leela-alerts (Issue_<n> / ALERT_<n> branches)",
      contribution: "the grammar extended from filesystems to git branches; UPPERCASE marker file at branch root declares the branch's implemented interface. See central/skills/github/protocols/branch-as-object.md" }
