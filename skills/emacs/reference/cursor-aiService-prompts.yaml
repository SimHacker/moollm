  textDescription: "note that xml does have a comment layer, unlike json. So there are situations where it might be practical\
    \ to \"step back\" into XML from JSON or even YAML, where files resemble documents, like xml or html. both html and xml\
    \ dom treat comments and even whitespace (subect to bizarre rules) as first class citizens. Svelte takes a good approach\
    \ to its .svelte files being plain web page syntax. \n\nPantheon: self-object system, formats, COP, and XML\nSelf-object\
    \ system (MOOLLM core): skills are prototypes; files and directories in the repo instantiate them (activation context,\
    \ git history). The schemapedia is meta-programming over schema mechanisms—how interchange, notation, relational, and\
    \ other families compose. It sits on top of the self-object kernel, not in place of it.\n\nWhere COP fits: Comment Oriented\
    \ Programming (COP) is not its own registry mechanism. It lives in the notation family, expressed by yaml-jazz: the comment\
    \ channel is the programming surface beside the parsed tree. JSON and other interchange-only shapes have no COP layer\
    \ (no comment channel). See schemas/formats.yml comment_oriented_programming.\n\nFormats ↔ mechanisms: Common file formats\
    \ (plain text, CSV, JSON, YAML, XML, SGML) align with one or more mechanism ids depending on layer—interchange validators,\
    \ notation (YAML only for COP in this registry), relational import, etc. The index is schemas/formats.yml.\n\nInteroperable\
    \ CLI toolchains: schemas/formats.yml interoperable_toolchains names open-source, scriptable tools (e.g. jq, ajv-cli,\
    \ yq, xmllint, jing, trang, xsltproc, Saxon-HE) aligned with mechanism ids and gateways.yml—a practical layer for shell-orchestration\
    \ skills and automation without pretending every bridge is one binary.\n\nXML and many grammars: XML is one syntax family;\
    \ multiple schema mechanisms interoperate on it (e.g. W3C XML Schema xml-schema, RELAX NG relax-ng, DTDs, instance-level\
    \ rules). The registry lists the interchange mechanisms we stub; gateways.yml records bridges (e.g. xsd-relax-ng, xml-json).\
    \ Do not collapse “XML” to a single schema—pick mechanisms and document gateways.\n\nGit and GitHub (and more): git is\
    \ a vcs mechanism—DAG, objects, hooks, timeline—not only “a format.” github is a collaboration mechanism: interchange\
    \ (JSON APIs), timeline (issues, PRs, commits), social (stars, follows), execution (Actions), all over git. Typed orphan\
    \ branches (ClassName_ObjectID, e.g. Issue_<IssueID>) as parallel object filesystems with history are specified in moocroworld;\
    \ moo implements moorls and the CLI. See schemas/mechanisms/github/MECHANISM.yml and schemas/systems.yml; add other forges\
    \ the same way.\n\n"
