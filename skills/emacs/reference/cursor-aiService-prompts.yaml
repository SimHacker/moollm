  textDescription: 'Blend space (simplicial + barycentric): schemas/blend-space.yml lifts the graph to a simplicial complex:
    joint mechanisms in one workflow are higher simplices (triangles, …); barycentric coordinates are nonnegative weights
    on the vertices of a chosen simplex (summing to 1)—navigation = retuning that blend. Supersession axes live in a different
    explanatory space (legacy clusters), not as coords on the deployed simplex.


    Think of this like a general weighted "server matrix" that shows "mash-ups" and "interpolations" between mechanisms. '
