  textDescription: 'Where COP fits: Comment Oriented Programming (COP) is not its own registry mechanism. In this registry,
    COP is expressed by the notation family’s yaml-jazz plugin: the YAML comment channel is the programming surface beside
    the parsed tree. JSON omits comments on purpose—the same design space PostScript fills differently: Document Structuring
    Conventions (DSC) use %% structured comments (and the %!PS-Adobe- header) beside the executable PostScript—a COP-class
    pattern: metadata, page boundaries, and spooler hints live in the comment lane, not in the operator stream alone. XML
    and HTML are not COP-via-yaml-jazz, but they do have a native lexical comment layer (<!-- -->) and DOM treatment of comments
    and (with infoset / HTML parsing rules—sometimes counterintuitive) whitespace as real nodes or positions—not the same
    mechanism as YAML Jazz, but the same idea: authored surface beside structure. See schemas/formats.yml comment_oriented_programming.


    explain its relation to and inspiration from literary programming, and the particular sweet space of suitability that
    markup occupies, with polymorphic syntactically modular code blocks with plugin renderers, yaml, json, csv, mermaid, etc. '
