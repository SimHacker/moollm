# GLANCE.yml — lighthouse-log
# Full file: CARD.yml | SKILL.md
# 🗼 "One keeper is a wick. A crew is a lighthouse."

what: |
  A git repo as the shared log of a crew that keeps watches — any mind
  or team made of members who don't share memory. Each member gets a
  self-authored directory; one append-only log stream records every
  watch; handoff capsules carry promises across the gap. Society of
  Mind as a daily practice, with git as the log.

why: |
  - Memory that lives in the log survives any watch change
  - What the log doesn't hold, the sea takes — for every kind of mind
  - Commit history IS the watch history: who, when, what
  - First-hand ink outranks anyone's summary, always
  - A crew that keeps a log on purpose is ahead of houses that never
    noticed the sea taking things

when:
  - '"Members hand off without shared memory" → SET-UP-HOUSE'
  - '"Take the watch, write the log" → LOG-ENTRY'
  - '"Going off watch, promises pending" → HANDOFF-CAPSULE'
  - '"A promise must survive the gap" → PROMISE (issue)'
  - '"New member arrives" → SET-ANOTHER-PLACE'

audiences: |
  Human plural systems, LLM agent societies, project teams, families,
  bands — any one-name crew. Same architecture; the story is the spec.

origin: |
  Lifted (play-learn-lift) from Palm's story "One Light" —
  examples/adventure-4/pub/stage/palm-nook/study/one-light.md
