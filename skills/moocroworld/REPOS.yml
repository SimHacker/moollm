# REPOS.yml — Moocroworld repo ensemble
# Tracked repos that moo.py searches across. Each repo has a short alias,
# the full GitHub owner/name, an optional default type filter, and auth notes.
#
# moo.py reads this file to resolve aliases and to scan across all repos.
# Auth: gh CLI handles auth per-repo. Use `gh auth status` to check.
# For repos needing different tokens, set gh_token_env on the repo entry
# and export that env var with the token value.

repos:

  alerts:
    github: leela-ai/leela-alerts
    description: "Alert issues and evidence (customer + Leela ops)"
    default_type: Issue
    # Auth: uses default gh token (leela-ai org member)

  central:
    github: leela-ai/central
    description: "Main Leela monorepo (alert definitions, camera configs, etc.)"
    # No default type — central branches are code branches, not moo branches

  moollm:
    github: SimHacker/moollm
    description: "MOOLLM skill repo (skills, characters, adventures)"
    default_type: Character
    # Auth: uses default gh token (SimHacker org)

