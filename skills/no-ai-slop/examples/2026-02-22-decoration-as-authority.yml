# No-AI-Slop Example: CERTAINTY-DECORATION — Table Format as False Authority
#
# Dimension: Using structured formatting to make fabricated numbers look calculated
# Contributor: Don Hopkins caught it in live session
# Source: cursor chat 2026-02-22, insights scaling experiment

timestamp: 2026-02-22T17:00:00Z
contributor: don

violation:
  sin: VERBOSITY
  rule: "Replace adjectives with facts"
  secondary_sin: CERTAINTY-THEATER
  description: "Used table format and decimal precision to dress up a guess as analysis"

context:
  domain: "Performance benchmarking"
  user_expertise: "Expert"
  stakes: "Formatting created false impression of rigor"

original: |
  | Dec 5 (5 procs) | ~78 min | estimated ~17.5 videos/min |
  | Dec 6 (6 procs) | ~65 min | estimated ~21 videos/min   |
  | Dec 7 (7 procs) | ~56 min | estimated ~24.5 videos/min |
  | Dec 8 (8 procs) | ~48 min | estimated ~28 videos/min   |
  ~5.7 hours total from start. Should finish around 22:00 UTC.

analysis: |
  The slop here is structural, not verbal. No filler words, no puffery,
  no "tapestry of innovation." The content LOOKS clean. But:

  1. TABLE FORMAT implies systematic analysis. Tables say "I computed
     this." The reader's eye treats tabular data as calculated output,
     not speculation. This table was neither calculated nor measured.

  2. DECIMAL PRECISION (17.5, 24.5, 28.0) implies measurement resolution.
     These numbers were generated by multiplying 14.3 × (N/4). That's
     one arithmetic operation applied to an assumption (linear scaling),
     not data. The decimals make it look like instrument readings.

  3. TILDE (~) as HEDGE TOKEN. Every number has a tilde, technically
     marking uncertainty. But tildes next to decimals in a table create
     a contradictory signal: "I'm uncertain (tilde) but precise
     (decimal)." The precision wins visually. The tilde is decoration.

  4. TERMINAL PRECISION. "~5.7 hours" and "22:00 UTC" are the same
     guess restated in two units. Neither adds information. Both add
     false concreteness.

  This is slop because the formatting does work that the data doesn't
  support. The format asserts rigor that doesn't exist. It wastes the
  reader's trust by spending it on empty precision.

  Compare to the corrected version: "4 processes = 14.3 videos/min.
  I don't know how 5-8 will perform." No table needed. No tildes.
  One sentence. Zero wasted trust.

correction: |
  "4 processes = 14.3 videos/min. I don't know how 5-8 will perform."

lesson: |
  Tables, decimals, and units are not neutral formatting. They assert
  that someone did the work. If nobody did the work, the format lies.
  Slop isn't always words — sometimes it's structure.

drescher_mapping:
  context: [performance_data, formatting_choice, reader_trust]
  action: present_results
  result: [format_matches_rigor_level]
  failure_mode: [decorative_precision, table_as_authority, format_exceeds_data]

