  Device adapters: Bosch Flow (done), XOSS G (Abraham plug-in).

when:
  - "map all my bike rides together"
  - "sync video to GPS track"
  - "show video frame path on map"
  - "pull FIT from Flow iPhone app"

methods: [SYNC, BUILD, INSPECT, SYNC_VIDEO, MATCH]

stack: [fitparse, ffprobe, GeoJSON, OSM tiles, argparse CLI]

see: DATA-CONTRACT.md | adapters/README.md | examples/demo/
