anti_patterns:
  - "Roll out N micro-transitions to plan long horizon"
  - "Each LLM response token = simulation timestep"
  - "Turn-by-turn map as primary UX while riding"

good_patterns:
  - "Verb + target commands (adventure options)"
  - "TICK on meaningful state change only"
  - "pickDescription(lod) — detail on demand"
  - "SET DESTINATION then delegate micro routing"
