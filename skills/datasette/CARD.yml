# CARD.yml — datasette

card:
  id: datasette
  name: "Datasette"
  type: [skill, database, tooling]
  emoji: 📊
  rarity: common

  description: |
    Datasette publishes SQLite databases as a read-only web app and JSON API.
    Metadata YAML, plugins, --crossdb. MOOLLM integrates cursor-mirror via
    export_datasette and reference/universal/datasette-metadata.yml.

tools:
  required: [read_file, run_terminal_cmd]
  optional: [grep]

tier: 1

methods:
  SERVE:
    description: "Run datasette on one or more .db paths"
    parameters: { paths: "SQLite files", metadata: "Optional -m YAML" }
    output: terminal + browser
    invoked-by: [operator]

  CROSSDB:
    description: "Serve multiple DBs with --crossdb for SQL across databases"
    parameters: { dbs: "List of paths" }
    output: chat
    invoked-by: [operator]

  CURSOR_MIRROR:
    description: "Export consolidated DB then serve with bundled metadata"
    parameters: {}
    output: chat (paths and command)
    invoked-by: [operator]

related_skills: [sqlite, cursor-mirror, schema]

advertisements:
  when: ["datasette", "SQLite web", "canned queries", "crossdb"]
  load: GLANCE.yml
