# GLANCE.yml — datasette
# Full file: CARD.yml | SKILL.md
# Datasette: serve SQLite over HTTP; metadata YAML; JSON API; cursor-mirror export path.

what: |
  Datasette turns SQLite files into a read-only web explorer and JSON API—same .db path as sqlite3, no duplicate file,
  HTTP read-only. Metadata YAML configures titles, facets, and canned SQL. --crossdb joins multiple DBs.

why: |
  - Share and explore .db files without writing a custom app
  - MOOLLM ships a full metadata + export path for cursor-mirror introspection

when:
  - '"Browse my SQLite in a browser" → SERVE'
  - '"Canned queries and facets" → METADATA'
  - '"cursor-mirror in Datasette" → EXPORT_THEN_SERVE'

methods:
  SERVE: "datasette *.db -m metadata.yml --crossdb -p PORT"
  METADATA: "databases: / tables: / queries: in YAML"
  EXPORT_THEN_SERVE: "lib/datasette_export.export_datasette; datasette-metadata.yml"
