# GLANCE.yml -- datasette
# Simon Willison's open-source multi-tool for exploring and publishing data.
# "Datasette is WordPress for data."

what: "Explore and publish SQLite data with web UI, JSON API, and 154+ plugins."
why: "cursor-mirror already produces SQLite; Datasette gives it a web face, URLs, and sharing."
when:
  - "Expose cursor-mirror data through a web UI"
  - "Share analysis results with a URL"
  - "Publish SQLite databases with zero backend code"
  - "Build dashboards from cursor-mirror transcript indexes"

integration_with_cursor_mirror:
  transcript_indexes: "The .db files next to transcripts are already Datasette-ready"
  state_vscdb: "Cursor's own SQLite databases can be opened read-only in Datasette"
  universal_model: "Model YAML drives code; Datasette serves the resulting data"

key_pattern: "pip install datasette && datasette path/to/database.db"
plugin_pattern: "datasette install datasette-<plugin-name>"

related: [cursor-mirror, yaml-jazz, sister-script]
tier: 1
