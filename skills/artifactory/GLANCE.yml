  - "Drexler — Engines of Creation"
  - "McCarthy/Church — lambda, eval/apply"
  - "Ungar & Smith — Self: selfish inheritance (prototypes/slots/delegation, not classes; clone, don't instantiate)"
  - "Factorio — automation belts, assemblers feeding assemblers"
  - "Dyson Sphere Program — Factorio in 3D at galactic scale: factories across planets, building Dyson spheres around stars"
  - "Will Wright's Spore — creation IS the game: editors (construction sets) build creatures→vehicles→buildings→civilizations, cell to galaxy; player as author-god"
  - "Papert — objects-to-think-with; meta-cognition needs a concrete something"

governor: |
  Creates AND destroys, so it needs a stop condition. Reversible (git safety net), append-only
  logs, human-in-the-loop for destructive or rule changes. No coprophagic self-training. Every
  artifact carries provenance (stigmata). Calm constructor, not Autofac.

