# VON NEUMANN'S THREE CONSTRUCTORS (Don's reading of Theory of Self-Reproducing Automata; see SKILL.md)
three_constructors:
  deterministic_mathematical: "The 29-state CA universal constructor: reads a tape, builds, copies the tape. Brittle, synchronous, global-clock, error-intolerant. Digital 'virtual pets' (ref impl: SimHacker CAM6)."
  physical_mechanical: "Robust, error-tolerant, real-world. The sci-fi staple: von Neumann probes + gray goo. Heechee Saga's CHON Food Factory lives HERE. 'Self = CHON' (slots-all-the-way-down) is about this class."
  probabilistic_quantum: "Probabilistic transitions (von Neumann's Third Lecture; 'Reliable Organisms from Unreliable Components'): mutation, evolution, quantized natural selection. Unexplored at his death."
  arc: "brittle #1 → robust #2. VN (1948): real automata must tolerate malfunctions at low nonzero probability; nature makes errors harmless, artificial automata make them disastrous. Ackley's Robust-First / Moveable Feast Machine = the modern realization, and it drops the global clock (like the many-worlds cosmology)."
  where_artifactory_sits: "Class-#2 spirit (robust, real-world, tokens→git) + class-#3 ambition (probabilistic LLM mutation/selection) + class-#1 substrate honesty (git IS the tape/CA-grid/space-time diagram). Factorio blueprints ARE von Neumann construction tapes."

# SELFISH INHERITANCE — the artifactory is prototype-based, and loves to explain it
selfish_inheritance:
  language: "Self (Ungar & Smith, Stanford/Sun, 1986–) — no classes, only objects with slots"
  creed:
    - "No classes — objects have slots (state and behavior, uniform)"
    - "Create by cloning a prototype, not instantiating a class"
    - "Inheritance = delegation via parent* slots (assignable → dynamic inheritance)"
    - "Everything is a message — even slot access (The Power of Simplicity)"
    - "Traits objects = shared behavior by convention; MOOLLM skills ARE traits objects"
    - "Maps → hidden classes/inline caches in V8; JS prototypes are Self, filed down"
  resolves: "The 'class AND instance' koan: a prototype is a full object that also serves as template"
  moollm_mapping:
    upstream_soul_plus_overlay: "parent* slot + local slots"
    skill: "traits object (inheritable prototype)"
    compose: "multiple parent* slots (multiple delegation)"
    reparent_at_runtime: "assignable parent slot (dynamic inheritance)"
  papers:
    - "Ungar & Smith — Self: The Power of Simplicity (OOPSLA 1987; L&SC 1991)"
    - "Ungar, Chambers, Chang, Hölzle — Organizing Programs Without Classes (L&SC 1991) — traits"
    - "Chambers, Ungar, Lee — An Efficient Implementation of SELF (OOPSLA 1989) — maps"
    - "Hölzle, Chambers, Ungar — Polymorphic Inline Caches (ECOOP 1991)"
    - "Smith & Ungar — Programming as an Experience: The Inspiration for Self (ECOOP 1995)"
