# GLANCE.yml — yaml-jazz
# Full file: CARD.yml (189 lines) | SKILL.md
# 🎷 "The comments ARE the data."

what: |
  Semantic YAML where comments are first-class data.
  LLMs read and interpret comments.
  Structure for humans AND machines AND LLMs.

why: |
  - Comments as semantic data
  - Three audiences served
  - Entropy preserved (JSON collapses)
  - Git-friendly diffs
  - Directories as advertisements

when:
  - '"Need LLM-readable YAML" → IMPROVISE'
  - '"Read semantic YAML" → INTERPRET'
  - '"Design file structure" → follow principles'

methods:
  IMPROVISE: "Create YAML Jazz structure"
  INTERPRET: "Read semantically"

what_yaml_adds:
  - "Comments as data — WHY travels with WHAT"
  - "Inline context — self-documenting"
  - "Multiline prose — formatted explanations"
  - "Nested reasoning — inner voice"
  - "Git-friendly — semantic diffs"
  - "Documentation by example — instance + comments as curriculum"
  - "Parallel lenses — same structure, different comment sets (intent vs validation vs metrics vs history)"

standards_to_domains: |
  Spec (YAML 1.x) plus domain packs (K8s, Actions, MOOLLM, …); Jazz is annotation inside each pack’s constraints.
  Block # runs and EOL # both carry semantics; parsers that drop comments do not erase the LLM-facing file.

three_audiences: |
  YAML Jazz serves:
  • Humans — read comments, understand intent
  • LLMs — read everything, understand context
  • Machines — parse structure, execute logic

directories_as_advertisements: |
  Filenames are LLM-recognizable K-lines.
  Directory listing IS the advertisement index — Sims-style "what's available here?"
  Big-endian naming: 2026-01-24-description.yml

principles:
  comments_matter: "Comments are semantic data"
  structure_guides: "Hierarchy implies relationship"
  flexibility: "Accept variations, emit consistency"
  entropy_preservation: "YAML preserves; JSON collapses"
  big_endian_naming: "Most significant first"

empirical: "Sunil Kumar (Groundlight, 2025): YAML improved entropy stability"
go_deeper:
  CARD.yml: "Full YAML Jazz notation rules, comment patterns, directory naming conventions"
  SKILL.md: "Complete protocol for reading and writing semantic YAML, three-audience design"

