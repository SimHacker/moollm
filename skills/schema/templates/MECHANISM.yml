# Prototype — copy to schemas/mechanisms/<registry-id>/MECHANISM.yml
#
# Directory name equals the mechanism id in schemas/registry.yml (kebab-case).
# Filename is always MECHANISM.yml (same pattern as GLANCE → CARD → SKILL at skill root).
#
# Layers:
#   schemas/           — cross-cutting: registry, gateways, plugin-convention, drescher-mapping (not per-mechanism)
#   schemas/mechanisms/<id>/ — one plugin: this file; optional extra assets later (examples/, snippets/)
#
# Delegation:
#   plugin_profile.deeper_skills → MOOLLM skills under skills/<name>/ (ensemble plugins).
#   Another mechanism is never nested as a subdirectory: many mechanisms may reference the same peer
#   (e.g. json-schema). Use gateways.yml for canonical bridges; use mechanism_relations (below) for this
#   file’s view of composition (protocol, parameters, gateway_ref).

mechanism:
  id: example-mechanism
  family: interchange

plugin_profile:
  kind: standalone
  deeper_skills: []

# kind: ensemble — then set deeper_skills: [skill-id, ...] and optional delegate: maps

# cli_tools:
#   - { name: jq, role: "short role line" }

# Optional — how this mechanism relates to other registered mechanisms (see plugin-convention.yml):
# mechanism_relations:
#   relations:
#     - target: json-schema
#       kind: complementary
#       protocol: "Short contract: what is shared between this mechanism and the target."
#       gateway_ref: json-schema-with-yaml-jazz
#       parameters:
#         source_of_truth: parsed_tree

moollm_hooks:
  cross_link: skills/schema/SKILL.md
  registry: skills/schema/schemas/registry.yml
  # augment: schemas/mechanisms/<registry-id>/SCHEMAPEDIA-<REGISTRY-ID-UPPER>-AUGMENT.yml
