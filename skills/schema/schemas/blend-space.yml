# Blend space — simplicial complex over mechanisms, barycentric navigation
# Complements registry.yml (vertices), gateways.yml (1-simplices / bridges), mechanism_relations (local stars),
# supersession-suggestions.yml (meta-axes outside the deployed blend).

blend_space:
  version: 4

  summary: |
    Schemapedia treats **registered mechanisms** as **vertices** of a **simplicial complex**: **blendable**
    stacks are **simplices**; **moving** a design **inside** a simplex is **barycentric navigation**—weights on
    vertices, not a forced linear timeline.

  intuition_weighted_matrix: |
    Picture a general **weighted matrix**—**server**/**service** mash-up routing or **mixer**-style levels over
    mechanism **channels**: **mash-ups** are joint activation (higher simplices); **interpolation** is **retuning**
    barycentric weights along a face or inside a simplex. Distinct from **supersession** clusters (different chart).

  tools_in_the_blend: |
    Concrete **tools** (CLI binaries, daemons, LLM endpoints, image generators, …) are **not** outside the complex:
    they sit in the **overlapping** regions of **higher** simplices—on a **face** or in the **interior** where the
    mechanisms they **span** are **jointly** active. **Placement** = which simplex (which co-active mechanisms) and
    what **share** of the blend (barycentric weights), not a disconnected catalog.

  simplicial_complex:
    vertices:
      source: "schemas/registry.yml — each mechanism id is a vertex."
    one_simplices:
      source: "schemas/gateways.yml — each bridge is an **edge** (1-simplex) between two vertices when a named bridge exists."
      note: "Edges carry **kind** and **fidelity**—not every pair of vertices is connected."
    higher_simplices:
      definition: |
        A **k-simplex** is a **(k+1)-tuple** of mechanisms that may be **jointly** active in one coherent workflow
        (e.g. interchange + notation + relational at a boundary). A **face** is any subset—coarser blends.
      examples:
        - "Triangle: json-schema + yaml-jazz + sqlite (validate tree, preserve comments in YAML, persist rows)."
        - "Triangle: shell-orchestration + cursor-mirror + sqlite (run, forensicate, query)."
      admission: |
        Not every (k+1)-subset of vertices is a simplex—only **blendable** combinations the project documents
        (MECHANISM.yml relations, gateways, runbooks). The complex is **abstract**: you declare which simplices matter.

  barycentric_coordinates:
    definition: |
      On a reference k-simplex with vertices v₀,…,vₖ, a **blend** is a point with **barycentric coordinates**
      (λ₀,…,λₖ): each λᵢ ≥ 0 and Σλᵢ = 1. Interpret λᵢ as the **relative weight** or **ownership share** of mechanism
      vᵢ in the layered stack (which layer is canonical, which is advisory, which is observability-only).
    navigation: |
      **Design moves** = continuous or discrete changes to (λᵢ)—retuning the blend—without requiring a total order
      on mechanisms. **Sparse** blends sit on a **face** (some λᵢ = 0): fewer than k+1 mechanisms materially engaged.
    not_the_same_as: |
      **Supersession** axes (toward_now, roots_downward, …) are **not** barycentric coords on the deployed simplex:
      they describe **meta** relations to **legacy technology clusters** in supersession-suggestions.yml—orthogonal
      explanatory space.

  relative_proximity_to_self:
    purpose: |
      From a chosen **anchor** mechanism (“self”), you can **rate** every other registered mechanism by **how close**
      it feels on a fixed set of **interpretive axes**. This is a **subjective, goal-relative** chart—not a total order
      on the registry and **not** the same as bridge fidelity or supersession predicates.
    anchor: |
      **Self** = one mechanism id (the reference vertex). The same pair (A, B) gets **different** proximity profiles
      when the anchor is A vs B vs a third party C.
    axes:
      generality: |
        **Scope** of claims: narrow / domain-specific vs broad / many domains. “Close” here = similar **width** of
        applicability relative to the anchor (not “better,” just aligned).
      simplicity: |
        **Conceptual and operational surface**: rules count, moving parts, ceremony. Close = similar **complexity tier**
        (minimal vs baroque), again relative to the anchor’s posture.
      efficiency: |
        **Cost** in the usual engineering senses: CPU/memory/latency, bytes on the wire, and **human** time to specify
        and maintain. Close = similar **cost profile**, not identical absolute numbers.
      influence: |
        **Centrality**: how much surrounding stacks **bend** to this mechanism vs how much this mechanism defers to
        others (schema-as-contract vs adapter-at-the-edge). Close = similar **gravitational** role in a pipeline.
    closeness: |
      **Proximity** = alignment on these four axes—e.g. normalized scores per axis and a **distance** (weighted sum
      of squared differences, or discrete bands). **Closer to self** = smaller distance in this **four-dimensional**
      interpretive space. Weights are **contextual** (a codegen pass cares more about simplicity; a hot path cares more
      about efficiency).
    where_to_record: |
      Optional **narrative** in `MECHANISM.yml` / README or a project-local matrix; schemapedia names the axes and
      semantics here—no mandatory numeric column in the registry.

  relation_to_other_artifacts:
    gateways_yml: "Edges of the complex; bridge ids reference pairs of vertices."
    mechanism_relations: "Per-vertex **link** view of composition; may cite the same bridge as gateways.yml."
    formats_yml_interoperable_toolchains: "CLI **supports** for traversing edges (tools, not vertices)."
    supersession_suggestions_yml: "Historical / migration **context**—does not add vertices to the production simplex by itself."
    relative_proximity_axes: "Anchor-relative **interpretive** distances (generality, simplicity, efficiency, influence)—orthogonal to barycentric blends and to supersession clusters."
