# Drescher ↔ interchange mapping (schemapedia cross-cutting file)
#
# Purpose: optional field-shape correspondence between Drescher causal records and serialized
# interchange payloads (JSON and similar). Not a substitute for gateways.yml (JSON Schema ↔ XSD, etc.).
#
# YAML Jazz: ad hoc metadata, project standards, application specific, and schemapedia-documented 
# conventions are welcome. Document by example.
# Grammar is intentionally open-ended—unknown: keys and comments at any level SHOULD be preserved 
# by tools that round-trip YAML so commentary, parallel lenses, and extensions survive.

mapping_spec:
  version: 1

  schemapedia_refs:
    registry: "skills/schema/schemas/registry.yml"
    gateways: "skills/schema/schemas/gateways.yml"
    plugin_convention: "skills/schema/schemas/plugin-convention.yml"
    drescher_mechanism: "skills/schema/schemas/mechanisms/drescher/MECHANISM.yml"
    yaml_jazz_mechanism: "skills/schema/schemas/mechanisms/yaml-jazz/MECHANISM.yml"
    schema_skill: "skills/schema/SKILL.md"

  yaml_jazz:
    role: |
      Authors may use semantic comments (block and line), sibling lens files, and extra keys anywhere
      in this document for human, LLM, and script audiences—per YAML Jazz (notation family) in the registry.
      Comments are instance-specific code and data: they travel with this file and are not interchangeable
      with JSON-only interchange. A comment may define a constraint or transformation to maintain when
      the mapping or payload evolves; preserve them on round-trip when this YAML is authoritative.
    open_ended_grammar: true
    ad_hoc:
      description: |
        Project-specific keys, narrative fields, and cross-references not enumerated below are allowed.
        Prefer namespaced keys (e.g. project_acme_*) when sharing files across repos to avoid collisions.
    standards_documented_in_schemapedia:
      - mechanism_id: yaml-jazz
        path: "skills/schema/schemas/mechanisms/yaml-jazz/MECHANISM.yml"
      - mechanism_id: json-schema
        path: "skills/schema/schemas/mechanisms/json-schema/MECHANISM.yml"
      - skill_docs: "skills/yaml-jazz/SKILL.md"
    extensions:
      description: "Optional bag for structured extensions; may be empty or omitted."
      example_keys: [intent, lens, provenance, review_status]

drescher_to_json:
  description: "When a Drescher schema is serialized for storage or APIs."
  example_mapping:
    id: "string"
    action: "string"
    context: "array of string"
    result: "array of string"
    reliability: "number 0..1"
    extended_context: "object | optional"
    extended_results: "object | optional"

notes:
  - "Learning and reliability stay in schema-factory / schema-mechanism."
  - "This file names shape correspondence and metadata hooks, not algorithms."
  - "Round-trip tools should preserve YAML comments when this file is authoritative (see yaml-jazz MECHANISM format_capabilities)."
