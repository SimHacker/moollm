# Representative file formats vs schemapedia mechanisms
# Cross-cutting index: not a registry of media types alone—maps common formats to mechanism families and ids.
# See gateways.yml for bridges between mechanisms (e.g. XSD ↔ RELAX NG).

formats:
  version: 4

  moollm_self_object_system:
    role: |
      MOOLLM’s self-object system is core: skills are inheritable prototypes; directories activate context;
      files in the repo are instances over time (git history). The schemapedia does not replace that kernel—
      it names how schema-shaped mechanisms (validators, notation, relational, causal, …) compose and how
      they attach to everyday formats (JSON, YAML, XML, CSV, plain text).

  comment_oriented_programming:
    acronym: COP
    pantheon_placement: |
      COP is not a separate row in registry.yml. It names the comment-as-programming-surface convention
      inside the notation family, carried by the yaml-jazz mechanism (YAML Jazz). RFC 8259 JSON has no
      comment channel by design (small grammar; no parallel comment lane). PostScript Document Structuring
      Conventions (DSC) are a COP-class example: %% structured comments beside the program. Lexical XML
      and HTML have <!-- --> comments and DOM representations for comments and (with infoset/HTML parsing
      rules) whitespace—not the yaml-jazz plugin, but a parallel author surface beside structure. Typical
      tree-only XML APIs may drop comments; preserve lexical XML when comments matter. YAML with
      comment-preserving tooling carries COP in this registry.

  stacks:
    plain_text:
      notes: "Unstructured bytes; schema mechanisms apply when conventions layer on top (front matter, COP in YAML subsets, etc.)."

    csv:
      notes: "Delimited tabular text; often validated ad hoc or loaded into relational mechanisms (sql, sqlite). No dedicated CSV mechanism in this registry yet—treat as format + project rules."

    json:
      interchange_mechanisms: [json-schema, zod]
      cop: false
      notes: "RFC 8259 JSON has no comment syntax by design; that exclusion is intentional (not an oversight). Pair with YAML + yaml-jazz when an authored comment channel must travel with the data."

    yaml:
      interchange_mechanisms: [json-schema, zod]
      notation_mechanisms: [yaml-jazz]
      cop: true
      cop_via: yaml-jazz
      notes: "Same tree can be validated as interchange and documented as notation; use comment-preserving parsers for COP round-trip."

    xml:
      interchange_mechanisms: [xml-schema, relax-ng]
      lexical_comment_syntax: "<!-- ... -->"
      unlike_json: "Unlike RFC 8259 JSON, lexical XML carries a comment layer; DOM can represent Comment nodes; whitespace significance follows infoset/XML rules."
      notes: |
        One XML format family; many interoperating schema grammars (XSD, RELAX NG, DTDs). Schematron (ISO 19757-3) is a
        different layer: XPath-based assertions and reporting on the instance—business rules, co-constraints, and
        diagnostics that pure grammars do not express; often used together with XSD or RELAX NG (structure vs rules).
        The registry lists xml-schema and relax-ng; gateways.yml documents translation and tooling (e.g. xsd-relax-ng, xml-json).
        For document-shaped artifacts, stepping from JSON or YAML back to XML can be practical when comments and markup-native tooling matter.
      many_grammars_one_syntax: true

    sgml:
      notes: "Historical precursor to XML; XML-oriented mechanisms often apply in spirit; legacy DTD and SGML-specific tooling live outside this stub—extend per project."

  systems_beyond_formats:
    index: "schemas/systems.yml"
    note: |
      Version control, forges, and hubs (git, GitHub, …) are not “formats” alone—they span VCS DAGs,
      interchange APIs, timelines, and social layers. See registry families vcs and collaboration and systems.yml.

  interoperable_toolchains:
    purpose: |
      Formats and mechanisms in this repo inherit a long SGML/XML/JSON history—many designers built on each
      other’s ideas (grammar languages, rule layers, tree addressing, transformation). This section picks
      **still-useful** pieces that **compose through gateways** and are mostly **open source** with **CLI** or
      scriptable entry points—good candidates for **shell-orchestration** skills and thin agent wrappers.
      Not exhaustive; extend per project.

    json_and_yaml:
      mechanisms: [json-schema, zod, yaml-jazz]
      gateways: [json-schema-to-zod, json-schema-with-yaml-jazz]
      typical_tools:
        - { name: jq, role: "Filter and reshape JSON instances (RFC 8259)." }
        - { name: ajv-cli, role: "Validate JSON against JSON Schema (Node ecosystem)." }
        - { name: yq, role: "Query/transform YAML and JSON; verify comment preservation when using YAML Jazz." }
        - { name: ruamel.yaml, role: "Python YAML with round-trip comment preservation." }

    xml_grammar_translation_rules:
      mechanisms: [xml-schema, relax-ng]
      gateways: [xsd-relax-ng, xml-json]
      layers:
        grammar: "Structure: W3C XSD, RELAX NG (compact or XML syntax), DTDs where still required."
        rules: "Schematron (ISO 19757-3): XPath assertions on the instance—pairs with XSD or RELAX NG; not registered as its own mechanism id (see `xml` notes above)."
      typical_tools:
        - { name: xmllint, role: "libxml2: DTD/XSD validation, common XML ops." }
        - { name: jing, role: "RELAX NG validation (James Clark; relaxng.org)." }
        - { name: trang, role: "RNG ↔ XSD translation in common cases; same lineage." }
        - { name: xmlstarlet, role: "XML command-line toolkit (edit, select, canonicalize)." }
      schematron_practice: |
        Rule validation is often wired as an XSLT pipeline (Skeleton/Saxon) or language bindings; fewer
        single-binary installs than xmllint/jing—still automatable from shell-orchestration when you pin the runner.

    transformation:
      notes: |
        XPath 1 underpins early XSLT and Schematron 1.x; XPath 2+ with XSLT 2/3 for heavier transforms.
        Bridges to JSON/YAML are design-time (xml-json gateway), not lossless one-liners.
      typical_tools:
        - { name: xsltproc, role: "libxslt: XSLT 1.0 transforms." }
        - { name: saxon-he, role: "XSLT 2/3, XPath 2+; common host for Schematron and complex pipelines." }

    sgml_legacy:
      notes: |
        DSSSL, Jade, and heavy SGML-only stacks are **legacy** for new pipelines; keep for migration and archives.
        OpenSP (`onsgmls`, `osgmlnorm`) remains relevant when normalizing SGML→XML for tooling that expects XML.
      typical_tools:
        - { name: opensp, role: "SGML parse and normalize toward XML where old corpora must move." }
