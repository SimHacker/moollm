# Convention — schemapedia mechanism profiles (plugins)
# Each mechanism is one directory schemas/mechanisms/<registry-id>/ with canonical file MECHANISM.yml.
# Depth: self-contained in that file, or an index into zero or more deeper MOOLLM skills.
# Peer mechanisms are never nested as subdirectories: reuse the same mechanism id from many profiles.
# Formal edges are listed in gateways.yml; each MECHANISM.yml may declare mechanism_relations (below)
# pointing at peers, optional gateway_ref, protocol text, and parameters.

plugin_profile:
  version: 3

  kinds:
    standalone:
      description: |
        The single MECHANISM.yml is sufficient for registry and tooling: specs, hooks, nomenclature.
        deeper_skills is empty or omitted. External URLs are fine; MOOLLM skills are not required.
      deeper_skills: []

    ensemble:
      description: |
        Theory or practice cannot fit one interchange-shaped plugin alone. MECHANISM.yml indexes
        one or more MOOLLM skills (ordered for reading in list order when it matters).
        The registry entry should list the same ids under delegate_skills for quick lookup.

  fields:
    kind:
      required: true
      values: [standalone, ensemble]
    deeper_skills:
      required: false
      type: list_of_skill_ids
      meaning: "MOOLLM skills/ directory names; zero means standalone index in-file only."
    delegate:
      required: false
      meaning: "Optional map of role → path (theory, tooling, examples) when ensemble uses split entry points."

  registry_mirror:
    note: |
      schemas/registry.yml uses delegate_skills on mechanisms for the same set as deeper_skills
      in MECHANISM.yml when kind is ensemble. Keep them in sync when you add or remove a depth link.

  cli_affordances:
    description: |
      Optional on each MECHANISM.yml: command-line tools that commonly pair with that plugin for agents
      (jq with JSON, sqlite3 with SQLite, yq with YAML, xmllint with XML, etc.). Not exhaustive; declare what you rely on.
    fields:
      cli_tools:
        required: false
        type: list
        item_shape: { name: string, role: string }
        meaning: "Human-readable binary or well-known CLI name; role is one line (filter, validate, dump schema, …)."

mechanism_relations:
  version: 1
  description: |
    Optional top-level block in any MECHANISM.yml: declares how this mechanism relates to other registered
    mechanisms (and optionally to itself in a different role). This is the per-plugin view of composition:
    protocols, parameters, and pointers to shared bridges. skills/ are reusable prototypes; files in the repo
    instantiate them; the registry plus MECHANISM.yml relations state how schema-shaped mechanisms may be
    combined—meta-level wiring, not runtime validators.

  block_shape:
    description: "Optional top-level key `mechanism_relations` in MECHANISM.yml."
    children:
      version:
        required: false
        meaning: "Optional; block version."
      relations:
        required: true
        type: list
        item_fields:
          target:
            required: true
            type: mechanism_id
            meaning: "Registry id of the other mechanism (kebab-case); may repeat for multiple roles."
          kind:
            required: true
            type: string
            meaning: |
              Relationship shape: complementary, translation, cross_stack, application_bridge, dialect_port,
              persistence_pattern, data_store, observability, or project-specific labels. Align with
              gateways.yml bridge `kind` when gateway_ref is set.
          protocol:
            required: true
            type: string
            meaning: "Human-readable contract: what is shared, ordered, or handed off between mechanisms."
          gateway_ref:
            required: false
            type: string
            meaning: "When a formal bridge exists, id of gateways.yml bridges[].id (optional but preferred)."
          parameters:
            required: false
            type: map
            meaning: "Optional knobs: source_of_truth, boundary, tool_invocation, fidelity_notes, etc."

  alignment_with_gateways:
    note: |
      gateways.yml remains the canonical list of bridges (from, to, tools, fidelity). MECHANISM.yml relations
      are symmetric views from each plugin: declare outgoing edges; keep gateway_ref in sync when you add a bridge.

  optional_format_capabilities:
    description: |
      Mechanisms may include a format_capabilities (or mechanism-specific) block documenting semantic layers,
      what text formats carry (e.g. JSON without comments), round-trip expectations, and tooling notes—especially
      when pairing interchange (json-schema) with notation (yaml-jazz).

schemapedia_augment:
  version: 1
  description: |
    Optional companion beside MECHANISM.yml: SCHEMAPEDIA- plus registry id in UPPER-KEBAB plus -AUGMENT.yml in the same
    directory (big-endian: **SCHEMAPEDIA** scopes the domain, then the mechanism token matches registry id in
    UPPER-KEBAB, e.g. json-schema → SCHEMAPEDIA-JSON-SCHEMA-AUGMENT.yml).
    Use it for long-form links, standards-body indexes, cross-cutting problem-space narrative, and YAML Jazz
    improvisation (comment-shaped guidance for humans/LLMs) without bloating the core profile.
  reference_from_profile:
    field: moollm_hooks.augment
    example: "schemas/mechanisms/json-schema/SCHEMAPEDIA-JSON-SCHEMA-AUGMENT.yml"
  shape:
    schemapedia_augment:
      version: "optional int"
      mechanism_id: "registry id (kebab-case)"
      family: "registry family key"
      cross_cutting: "map: problem_space, standards_track, body_sites (lists of {name, url})"
      improvisation: "map: llm_notes, extend_mechanism_here_vs_augment"
      external_refs: "list of {role, title, url} — spec, book, tutorial, tooling"
