# Schemapedia — master index (multiple families of "schema")
# Version 10: + com-xpcom (component_interop: Microsoft COM, Mozilla XPCOM, deCOM history).

registry:
  version: 10
  title: MOOLLM schemapedia
  description: |
    One index for many senses of "schema": wire interchange, causal learning,
    situation frames, activation symbols, relational DDL, notation (YAML Jazz, COP),
    execution (shell / sister-script composition), introspection (cursor-mirror data model and DBs),
    vcs (git), collaboration (GitHub), component interop (COM, XPCOM), and links to the SoM meta-model.
    MOOLLM’s self-object system (skills as prototypes, repo files as instances) is the core kernel; this registry
    is meta-wiring over schema mechanisms, not a replacement for it.
    Each mechanism plugin lives under schemas/mechanisms/<id>/MECHANISM.yml; deep theory stays in delegated skills.
    delegate_skills on each mechanism mirrors plugin_profile.deeper_skills in that mechanism’s MECHANISM.yml.
    Cross-cutting bridges (gateways, Drescher↔payload mapping, formats) stay at schemas/*.yml — not inside mechanism dirs.

  plugin_convention: "schemas/plugin-convention.yml"

  families:
    interchange:
      summary: "Serialized instance shapes and validation (JSON, XML, …)."
    causal:
      summary: "Drescher units: Context → Action → Result, learning and reliability."
    situational:
      summary: "Minsky frames: slot/default structure for kinds of situations."
    activation:
      summary: "K-lines and protocol symbols: names that load a competence bundle."
    relational:
      summary: "Tables, constraints, dialects, migrations, physical catalogs."
    meta_model:
      summary: "Architectures for minds-as-agents (Society of Mind); not a file format."

    notation:
      summary: "Authoring conventions on top of YAML (YAML Jazz, COP): comments as data and code, parallel lenses, three audiences—not instance validation alone."

    execution:
      summary: "Shell pipelines, sister scripts, orchestration—compose commands and skills toward bash-shaped automation."

    introspection:
      summary: "Cursor IDE session data—SQLite stores, reverse-engineered schemas, chat/tool/model introspection (cursor-mirror)."

    vcs:
      summary: "Version control: object stores, commit DAG, refs, diffs, hooks—timeline and provenance for files (git)."

    collaboration:
      summary: "Forges and hubs: hosted repos, HTTP APIs, issues/PRs, review, social graph, CI—often JSON interchange over git (GitHub)."

    component_interop:
      summary: "Binary component models (COM, XPCOM): IDL-style interfaces, platform history, and lessons from large-scale embedding—not JSON wire validation."

  mechanisms:
    json-schema:
      family: interchange
      id: json-schema
      profile: "schemas/mechanisms/json-schema/MECHANISM.yml"
      primary_names: [JSON Schema]
      summary: "JSON instance validation; OpenAPI and tool APIs."

    zod:
      family: interchange
      id: zod
      profile: "schemas/mechanisms/zod/MECHANISM.yml"
      primary_names: [Zod]
      summary: "TypeScript-first runtime schemas."

    relax-ng:
      family: interchange
      id: relax-ng
      profile: "schemas/mechanisms/relax-ng/MECHANISM.yml"
      primary_names: [RELAX NG, Relax NG]
      summary: "XML schema language; compact and XML syntaxes."

    xml-schema:
      family: interchange
      id: xml-schema
      profile: "schemas/mechanisms/xml-schema/MECHANISM.yml"
      primary_names: [W3C XML Schema, XSD]
      summary: "W3C XSD; enterprise XML stacks."

    drescher:
      family: causal
      id: drescher
      profile: "schemas/mechanisms/drescher/MECHANISM.yml"
      delegate_skills: [schema-mechanism, schema-factory]
      primary_names: [Drescher schema, schema mechanism, CAR schema]
      summary: "Learned causal units; lint/compose in schema-factory."

    minsky-frame:
      family: situational
      id: minsky-frame
      profile: "schemas/mechanisms/minsky-frame/MECHANISM.yml"
      delegate_skills: [knowledge-frames]
      primary_names: [Minsky frame, frame, situation frame]
      summary: "Structured expectations and slots; not wire or SQL DDL."

    k-lines:
      family: activation
      id: k-lines
      profile: "schemas/mechanisms/k-lines/MECHANISM.yml"
      delegate_skills: [k-lines]
      primary_names: [K-line, protocol symbol]
      summary: "Symbols that reactivate a constellation of practice; see PROTOCOLS/INDEX."

    society-of-mind:
      family: meta_model
      id: society-of-mind
      profile: "schemas/mechanisms/society-of-mind/MECHANISM.yml"
      delegate_skills: [society-of-mind]
      primary_names: [Society of Mind, SoM]
      summary: "Minsky’s agent society architecture; frames and K-lines are parts, not synonyms."

    sql:
      family: relational
      id: sql
      profile: "schemas/mechanisms/sql/MECHANISM.yml"
      primary_names: [SQL, ANSI SQL]
      summary: "DDL/DML language family; dialects differ (Postgres, MySQL, etc.)."

    sqlite:
      family: relational
      id: sqlite
      profile: "schemas/mechanisms/sqlite/MECHANISM.yml"
      primary_names: [SQLite]
      summary: "Embedded engine, file DB, sqlite_master catalog, type affinity, migrations."

    yaml-jazz:
      family: notation
      id: yaml-jazz
      profile: "schemas/mechanisms/yaml-jazz/MECHANISM.yml"
      delegate_skills: [yaml-jazz]
      primary_names: [YAML Jazz, semantic YAML]
      summary: "Schemapedia plugin: comment-first YAML practice; pairs with interchange validators when needed."

    shell-orchestration:
      family: execution
      id: shell-orchestration
      profile: "schemas/mechanisms/shell-orchestration/MECHANISM.yml"
      delegate_skills: [sister-script, plan-then-execute, mooco, runtime]
      primary_names: [shell orchestration, sister script pipeline, bash composition]
      summary: "Doc-first procedures, frozen plans, orchestrator, dual runtime—compose shell and skills (Cursor agents)."

    cursor-mirror:
      family: introspection
      id: cursor-mirror
      profile: "schemas/mechanisms/cursor-mirror/MECHANISM.yml"
      delegate_skills: [cursor-mirror]
      primary_names: [cursor-mirror, Cursor introspection, CURSOR-SQLITE-MODEL]
      summary: "SQLite-backed Cursor data + YAML document model; timeline, tools, thinking, context-sources."

    git:
      family: vcs
      id: git
      profile: "schemas/mechanisms/git/MECHANISM.yml"
      primary_names: [Git, git]
      summary: "Distributed VCS: objects, DAG, refs, diffs, hooks; repo timeline and provenance."

    github:
      family: collaboration
      id: github
      profile: "schemas/mechanisms/github/MECHANISM.yml"
      primary_names: [GitHub, GitHub.com]
      delegate_skills: [moocroworld, moo]
      summary: "Forge: git hosting, APIs, issues/PRs, social graph, Actions; branch-as-object and Issue_<id> via moocroworld + moo."

    com-xpcom:
      family: component_interop
      id: com-xpcom
      profile: "schemas/mechanisms/com-xpcom/MECHANISM.yml"
      primary_names: [COM, Component Object Model, XPCOM, XP/COM]
      summary: "Binary COM and Mozilla XPCOM; decomification, decomtamination, outparamdelling—historical component interop, not interchange JSON."

gateways_index: "schemas/gateways.yml"
formats_index: "schemas/formats.yml"
systems_index: "schemas/systems.yml"
drescher_bridge: "schemas/drescher-mapping.yml"
