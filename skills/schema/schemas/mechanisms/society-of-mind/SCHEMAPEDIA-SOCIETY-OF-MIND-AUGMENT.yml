      Collect secondary literature, critique, and course syllabi here; keep MECHANISM.yml as the registry stub.

  external_refs:
    - { role: book, title: "The Society of Mind (publisher page)", url: "https://www.simonandschuster.com/books/The-Society-of-Mind/Marvin-Minsky/9780671657130" }
    - { role: author, title: "Marvin Minsky", url: "https://en.wikipedia.org/wiki/Marvin_Minsky" }
