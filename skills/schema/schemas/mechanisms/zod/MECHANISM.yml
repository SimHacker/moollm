# Zod — MOOLLM conventions (stub)
# Path: schemas/mechanisms/zod/MECHANISM.yml — indexed in registry (id: zod)
# Use where TypeScript skills define runtime validation.

plugin_profile:
  kind: standalone
  deeper_skills: []

cli_tools:
  - { name: npx, role: "run zod or codegen without global install" }
  - { name: ts-node, role: "execute TS schemas in dev" }

zod:
  purpose: "Runtime-parse TS-adjacent configs and tool boundaries."
  cross_cutting:
    scope: "TypeScript-native runtime validation; bridge to json-schema via codegen; not a portable IETF wire standard by itself."
    standards_anchors: [TypeScript, Zod library API, project-specific codegen to/from JSON Schema]
  notes:
    - "Colocate .ts types with z.infer<typeof Schema> where applicable."
    - "Not a substitute for Drescher schemas (schema-mechanism)."

moollm_hooks:
  cross_link: "skills/schema/SKILL.md"
  registry: "skills/schema/schemas/registry.yml"
  augment: "schemas/mechanisms/zod/SCHEMAPEDIA-ZOD-AUGMENT.yml"
