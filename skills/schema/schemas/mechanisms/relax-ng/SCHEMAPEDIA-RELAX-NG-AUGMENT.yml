# SCHEMAPEDIA-RELAX-NG-AUGMENT — augment layer
# Mechanism: relax-ng | family: interchange

schemapedia_augment:
  version: 1
  mechanism_id: relax-ng
  family: interchange

  cross_cutting:
    problem_space: |
      RELAX NG describes XML document classes; compact and XML syntaxes are equivalent. Often paired with
      XSD via Trang; Jing validates. Different ergonomics than XSD for large grammars—pick per project policy.
      Interchange peer: xml-schema (W3C XSD)—same XML infoset domain; gateways.yml may document translation fidelity.
      Schematron (ISO 19757-3) is orthogonal: XPath assertions on the instance for rules and reporting, not a third grammar—pairs with RNG or XSD.
    oasis_and_iso:
      - { name: "RELAX NG (OASIS)", url: "https://relaxng.org/" }
      - { name: "ISO 19757-2 (RELAX NG)", url: "https://www.iso.org/standard/52348.html" }

  improvisation:
    mech_yml_vs_augment: |
      Catalog OASIS test suites, editor plugins, namespace strategies, and Trang/Xerces pipeline notes here.

  external_refs:
    - { role: tooling, title: "Jing", url: "https://relaxng.org/jclark/jing.html" }
    - { role: tooling, title: "Trang (RNG↔XSD)", url: "https://relaxng.org/jclark/trang.html" }
    - { role: overview, title: "Wikipedia RELAX NG", url: "https://en.wikipedia.org/wiki/RELAX_NG" }
    - { role: moollm, title: "xml-schema mechanism (W3C XSD peer)", path: "skills/schema/schemas/mechanisms/xml-schema/README.md" }
    - { role: iso, title: "Schematron (ISO 19757-3; XPath rules on XML)", url: "https://schematron.com/" }
