# Drescher schema mechanism — profile (delegates to causal skills)
# Path: schemas/mechanisms/drescher/MECHANISM.yml

drescher:
  id: drescher
  family: causal
  plugin_profile:
    kind: ensemble
    deeper_skills: [schema-mechanism, schema-factory]
  purpose: "Learned Context → Action → Result units; marginal attribution, composition."
  cross_cutting:
    scope: "Causal ‘schema’ ≠ JSON/XML wire schema; serialize via drescher-mapping.yml when needed; delegates schema-mechanism + schema-factory."
    standards_anchors: [MOOLLM schema-mechanism protocol, schema-factory pipelines, optional Gary Drescher vocabulary]
  delegate:
    theory: "skills/schema-mechanism/SKILL.md"
    tooling: "skills/schema-factory/"
  relationship_to_interchange: |
    Same word "schema" as JSON/XML; different job. Bridge only via drescher-mapping.yml when you serialize causal records.

moollm_hooks:
  cross_link: "skills/schema/SKILL.md"
  registry: "skills/schema/schemas/registry.yml"
  augment: "schemas/mechanisms/drescher/SCHEMAPEDIA-DRESCHER-AUGMENT.yml"
