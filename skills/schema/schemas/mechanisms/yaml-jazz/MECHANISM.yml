# YAML Jazz — schemapedia mechanism (notation family)
# Path: schemas/mechanisms/yaml-jazz/MECHANISM.yml

yaml_jazz:
  id: yaml-jazz
  family: notation
  plugin_profile:
    kind: ensemble
    deeper_skills: [yaml-jazz]
  cli_tools:
    - { name: yq, role: "YAML/JSON query and transform (prefer engines that preserve comments if round-tripping)" }
  role_in_schemapedia: |
    Registered as a schema plugin: MOOLLM’s convention for semantic YAML—comments as data,
    documentation by example, parallel lenses, three audiences (human, machine, LLM).
    Comments are instance-specific code and data: they travel with the YAML file as first-class cargo,
    not dead decoration. A comment may state a constraint to maintain or a transformation to apply when
    the tree changes—executable or procedural intent beside the parsed value.
    Not an interchange validator; pairs with JSON Schema / Zod when you need both tree shape and source-file meaning.

  comment_oriented_programming:
    acronym: COP
    definition: |
      Comment Oriented Programming: the comment channel is a first-class programming surface beside the
      parsed YAML tree—instance-specific code and data, constraints to maintain, transformations to apply,
      and procedural hooks. COP is what YAML Jazz makes explicit; interchange-only formats (e.g. JSON) have no COP channel.

  format_capabilities:
    family_role: notation
    semantic_layers:
      - block_and_end_of_line_comments
      - parallel_lens_or_sibling_files
      - intent_and_history_in_prose_adjacent_to_machine_fields
      - comments_as_instance_cargo_code_and_data
      - constraints_and_transformations_authored_in_comments
      - comment_oriented_programming_COP
    interchange:
      yaml_text_carries: [parsed_tree, comment_graph, layout_conventions]
      json_text_carries: [parsed_tree_only]
    comment_round_trip: |
      Possible only when read/write uses YAML libraries that preserve comments in an AST or equivalent
      (e.g. ruamel.yaml in Python; other stacks vary—libyaml-based tools often drop comments on round-trip).
    audiences_for_comments: [human, llm, script]
  tooling_notes:
    - "Prefer YAML parsers/serializers that preserve comments when the source file is the authority."
    - "yq implementations differ: verify comment preservation before relying on round-trip."
    - "Treat JSON emitted from YAML as lossy for commentary unless you also store or regenerate prose elsewhere."

  delegate:
    skill: "skills/yaml-jazz/SKILL.md"
    examples: "skills/yaml-jazz/examples/"

  relationship_to_interchange: |
    JSON Schema and Zod describe the data that survives a parse. YAML Jazz describes the file as authored:
    block and EOL comments, intent vs validation sibling files, history in prose. Same YAML tree; layered concerns.
    Interchange validators ignore the comment channel; YAML Jazz keeps constraints, transforms, and
    instance-specific instructions that must round-trip with the document if the file is source of truth.

  relationship_to_registry: |
    Listed in schemas/registry.yml under family "notation" so tooling and docs can resolve "yaml-jazz" as a first-class mechanism id.

mechanism_relations:
  relations:
    - target: json-schema
      kind: complementary
      protocol: |
        YAML text and JSON text interchange on the parsed value tree: you can translate between them as
        wire shapes, but there is no lossless two-way round-trip at the text level when JSON is the only
        artifact—JSON has no comment channel, so the semantic comment layer (YAML Jazz) cannot be
        reconstructed from JSON alone. YAML→JSON drops commentary by definition; JSON→YAML can restore
        structure for tooling but not original comments unless you merge from a YAML-canonical source.
        JSON Schema validates the parsed tree; YAML Jazz owns source-file meaning (comments, lenses)
        including instance-specific code/data and constraint/transform maintenance authored in comments.
      gateway_ref: json-schema-with-yaml-jazz
      parameters:
        validates: parsed_value_after_yaml_load
        authors: source_text_and_comment_graph
        interchange_tree: translatable
        round_trip_text: lossy_for_semantic_layer_when_json_is_canonical
        comment_preservation: requires_comment_aware_yaml_tooling
        comments_may_carry: [constraints, transforms_to_maintain, procedural_intent]
    - target: zod
      kind: complementary
      protocol: "When the stack is TypeScript-first, Zod can validate the same tree YAML Jazz documents; notation still owns comments and intent."
      parameters:
        boundary: project_convention

moollm_hooks:
  cross_link: "skills/schema/SKILL.md"
  registry: "skills/schema/schemas/registry.yml"
