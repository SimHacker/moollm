# JSON Schema — MOOLLM conventions (stub)
# Path: schemas/mechanisms/json-schema/MECHANISM.yml — indexed in registry (id: json-schema)
# Extend per project; keep interchange schema here, Drescher causality in schema-mechanism.

plugin_profile:
  kind: standalone
  deeper_skills: []

cli_tools:
  - { name: jq, role: "filter and reshape JSON instances" }
  - { name: ajv-cli, role: "validate JSON against JSON Schema (Node ecosystem)" }

json_schema:
  purpose: "Validate and document wire-format payloads, OpenAPI bodies, tool IO."
  draft: "https://json-schema.org/draft/2020-12/schema"
  notes:
    - "Prefer explicit $id and $defs for shared subschemas."
    - "Keep examples alongside schemas for three-audience YAML Jazz docs."

  format_capabilities:
    family_role: interchange
    semantic_layers:
      - validated_instance_shape
    interchange:
      json_text_carries: [parsed_tree]
      carries_comments: false
    paired_with_yaml: |
      When the authored file is YAML, JSON Schema still applies to the parsed value. The YAML source may
      carry YAML Jazz commentary; that layer is orthogonal to JSON Schema and is lost if the system
      collapses to JSON-only artifacts.

mechanism_relations:
  relations:
    - target: yaml-jazz
      kind: complementary
      protocol: |
        JSON (RFC 8259) and YAML interchange as text formats for the same logical tree, but JSON
        cannot carry YAML’s semantic comment layer. Translation is possible for data; full text round-trip
        that preserves commentary requires YAML as canonical source and comment-preserving YAML tooling.
        JSON Schema validates the tree; YAML Jazz documents human/LLM/script-oriented meaning not in JSON.
      gateway_ref: json-schema-with-yaml-jazz
      parameters:
        schema_applies_to: parsed_value_after_parse
        json_cannot_encode: yaml_jazz_commentary
        round_trip_text: lossy_when_json_only_is_source_of_truth
        bridge_tools: [jq, ajv-cli, comment_aware_yaml_parsers_when_authoring_yaml]
    - target: zod
      kind: translation
      protocol: "Codegen or hand port between JSON Schema and Zod for TS stacks; subset and feature gaps are project-defined."
      gateway_ref: json-schema-to-zod
    - target: sqlite
      kind: application_bridge
      protocol: "At API boundaries validate bodies with JSON Schema; persist rows under SQLite DDL; keep the two contracts linked in docs."
      gateway_ref: json-row-sqlite
      parameters:
        contract_split: http_body_schema_vs_create_table

moollm_hooks:
  skill_exports: "Some skills may emit JSON Schema fragments for tool arguments."
  cross_link: "skills/schema/SKILL.md"
