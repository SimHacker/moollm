# SCHEMAPEDIA-MINSKY-FRAME-AUGMENT — augment layer
# Mechanism: minsky-frame | family: situational

schemapedia_augment:
  version: 1
  mechanism_id: minsky-frame
  family: situational

  cross_cutting:
    problem_space: |
      Minsky frames: slots, defaults, and procedures for situation kinds. Not XSD—organizational and cognitive
      structure. Delegates to knowledge-frames; YAML files often look frame-like without formal slot discipline.
      Contrast: interchange mechanisms validate bytes; Drescher units are causal; frames are situational
      expectations—do not treat them as interchangeable “schemas.”
    ai_history:
      - { name: "Frame (AI) — Wikipedia", url: "https://en.wikipedia.org/wiki/Frame_(artificial_intelligence)" }
      - { name: "Marvin Minsky", url: "https://en.wikipedia.org/wiki/Marvin_Minsky" }

  improvisation:
    mech_yml_vs_augment: |
      Park example frame YAML snippets, domain slot catalogs, and comparison tables vs JSON Schema here;
      keep MECHANISM.yml delegate and mechanism_relations stable.

  external_refs:
    - { role: skill, title: "knowledge-frames SKILL", path: "skills/knowledge-frames/SKILL.md" }
    - { role: paper, title: "A Framework for Representing Knowledge (Minsky, MIT AI Memo 306)", url: "https://dspace.mit.edu/handle/1721.1/4199" }
    - { role: moollm, title: "society-of-mind mechanism (architecture context)", path: "skills/schema/schemas/mechanisms/society-of-mind/README.md" }
    - { role: moollm, title: "drescher mechanism (causal vs situational)", path: "skills/schema/schemas/mechanisms/drescher/README.md" }
