# SCHEMAPEDIA-SQLITE-AUGMENT — augment layer
# Mechanism: sqlite | family: relational

schemapedia_augment:
  version: 1
  mechanism_id: sqlite
  family: relational

  cross_cutting:
    problem_space: |
      Embedded SQL engine: single file, :memory:, sqlite_master catalog, type affinity, STRICT, JSON1 for
      hybrid document-in-row. Pairs with cursor-mirror (Cursor stores) and json-schema at API boundaries.
      Registry peer sql names the abstract language family; sqlite names this engine and file format—see
      gateways.yml for json-row-sqlite and cursor-mirror-to-sqlite.
    project:
      - { name: "SQLite", url: "https://www.sqlite.org/" }
      - { name: "SQLite SQL syntax", url: "https://www.sqlite.org/lang.html" }
      - { name: "JSON1 extension", url: "https://www.sqlite.org/json1.html" }
    gateways_in_repo:
      - { name: "gateways.yml (mirror ↔ sqlite, JSON ↔ rows)", path: "skills/schema/schemas/gateways.yml" }

  improvisation:
    mech_yml_vs_augment: |
      Bench-specific PRAGMA recipes, WASM deployment notes, and ORM migration snippets belong here.

  external_refs:
    - { role: docs, title: "Schema (sqlite_master)", url: "https://www.sqlite.org/schematab.html" }
    - { role: book, title: "SQLite Documentation (official)", url: "https://www.sqlite.org/docs.html" }
    - { role: moollm, title: "sql mechanism (language family peer)", path: "skills/schema/schemas/mechanisms/sql/README.md" }
    - { role: moollm, title: "cursor-mirror mechanism (SQLite-backed IDE data)", path: "skills/schema/schemas/mechanisms/cursor-mirror/README.md" }
