# Gateways between schema mechanisms (interchange, relational, causal)
# With registry.yml and per-plugin mechanism_relations, this is an explicit graph: mechanisms are nodes,
# bridges are directed edges (translation, complementary, application-bridge, dialect-port, …). Use that
# topology to drive code generation, multi-layer validation (wire, world, plans), and execution wiring—
# always with stated fidelity and source-of-truth per pipeline.
# Lossy vs lossless depends on feature overlap; document assumptions per bridge.

gateways:
  version: 9

  notes:
    - "Prefer explicit 'source of truth' mechanism per pipeline; generate others if needed."
    - "Registry + gateways + mechanism_relations = a network topology of schema senses; edges are transforms/translations with documented fidelity—not a single universal schema."
    - "Drescher causal schemas are not interchangeable with XSD/JSON Schema without a project-specific mapping (see drescher-mapping.yml)."
    - "Relational DDL is not a drop-in substitute for JSON/XML interchange; map at application boundaries."
    - "Each mechanism may declare mechanism_relations in MECHANISM.yml (protocol, parameters, gateway_ref)—per-plugin view of the same bridges listed here."
    - "VCS and collaboration (git, GitHub) are not wire formats; see systems.yml and the git/github mechanism profiles."
    - "Open-source CLI stacks that align with bridges (jq, xmllint, jing, trang, …) live in formats.yml interoperable_toolchains—skill-friendly, not duplicate edges here."

  bridges:
    - id: json-schema-to-zod
      from: json-schema
      to: zod
      kind: translation
      typical_tools:
        - "Community codegen: json-schema-to-zod style packages (verify freshness per ecosystem)."
      fidelity: "Often good for common subsets; edge cases need manual review."

    - id: json-schema-with-yaml-jazz
      from: json-schema
      to: yaml-jazz
      kind: complementary
      note: "JSON Schema constrains the parsed tree; YAML Jazz governs the source file (comments, lenses). Use both; neither replaces the other."
      fidelity: |
        YAML text and JSON text can represent the same parsed value, but JSON has no comment channel—
        YAML Jazz’s semantic layer is not round-trippable through JSON-only artifacts. Preserve YAML as
        canonical when comments matter; use comment-aware YAML parsers/serializers when round-tripping source.
      typical_tools:
        - "ajv / json-schema validators on parsed value from YAML or JSON."
        - "ruamel.yaml (Python) and other comment-preserving YAML stacks when the file is authoritative."
        - "yq (verify comment preservation per implementation)."
        - "jq on JSON instances; does not restore YAML commentary."

    - id: xsd-relax-ng
      from: xml-schema
      to: relax-ng
      kind: translation
      typical_tools:
        - "Trang (RNG compact/XML ↔ XSD interconversion in common cases)"
      fidelity: "Structural overlap is large; XSD features may not round-trip."

    - id: xml-json
      from: relax-ng
      to: json-schema
      kind: cross-stack
      typical_tools:
        - "Custom mappings; no universal standard bridge."
      fidelity: "Model XML and JSON differently; treat as new schema design, not automatic port."

    - id: json-row-sqlite
      from: json-schema
      to: sqlite
      kind: application-bridge
      typical_tools:
        - "ORMs (Drizzle, Prisma, SQLAlchemy) map types to columns; hand DDL for edge cases."
        - "SQLite JSON1 for hybrid document-in-table when strict tables are awkward."
      fidelity: "Contract is split: JSON Schema for API, CREATE TABLE for persistence; keep them linked in docs."

    - id: sql-dialect-sqlite
      from: sql
      to: sqlite
      kind: dialect-port
      typical_tools:
        - "Vendor guides; sqlite diff tools; integration tests on target engine."
      fidelity: "ANSI core ports; server-specific types and locks do not."

    - id: drescher-rows
      from: drescher
      to: sqlite
      kind: persistence-pattern
      typical_tools:
        - "Tables for schema id, context, action, result, reliability; ingest from schema-factory logs."
      fidelity: "Logical model is project-defined; not a standard interchange format."

    - id: cursor-mirror-to-sqlite
      from: cursor-mirror
      to: sqlite
      kind: data-store
      note: "Cursor’s local stores are SQLite files; cursor-mirror documents the model in reference/universal and reverse-engineered/*.yml; use relational plugin for generic SQL semantics."

    - id: sqlite-to-datasette
      from: sqlite
      to: datasette
      kind: application-bridge
      note: |
        Datasette takes the same path as sqlite3: one on-disk .db, no second published copy ("zero copy" in the
        sense of no duplicate database file). HTTP and JSON API are read-only; writers use sqlite3 or application code.
        Metadata YAML adds facets and canned queries without changing the file.
      typical_tools:
        - "datasette my.db -m metadata.yml"
        - "datasette *.db --crossdb"
      fidelity: |
        Same file as the sqlite mechanism: live publishing means refresh/reopen sees committed data from other writers
        (WAL is the usual pattern). For a frozen snapshot, use a copy or Datasette --immutable on a file you do not mutate.

    - id: cursor-mirror-to-datasette
      from: cursor-mirror
      to: datasette
      kind: application-bridge
      note: "export_datasette() materializes a consolidated cursor-mirror.db; ship with reference/universal/datasette-metadata.yml and optional cursor-model.db using --crossdb."
      typical_tools:
        - "python -c \"from pathlib import Path; from lib.datasette_export import export_datasette; export_datasette(Path('cursor-mirror.db'))\""
        - "datasette cursor-mirror.db cursor-model.db --crossdb -m reference/universal/datasette-metadata.yml"
      fidelity: "Export is a projection of live Cursor data; schema matches datasette_export._SCHEMA."

    - id: shell-then-mirror
      from: shell-orchestration
      to: cursor-mirror
      kind: observability
      note: "After composed bash/orchestration runs, inspect sessions: timeline, tools, thinking, context-sources."

    - id: git-hooks-execution
      from: git
      to: shell-orchestration
      kind: application-bridge
      note: "Git hooks (pre-commit, post-receive, …) invoke shell scripts; policy and automation sit beside the object model."
      typical_tools:
        - "husky, pre-commit frameworks, custom hooks in .git/hooks"

    - id: github-over-git
      from: github
      to: git
      kind: application-bridge
      note: "GitHub hosts git objects and refs; issues, PRs, reviews, and GraphQL are layers above raw VCS."
      typical_tools:
        - "gh, git remote, GitHub REST/GraphQL"

    - id: github-api-json-schema
      from: github
      to: json-schema
      kind: complementary
      note: "GitHub HTTP APIs use JSON bodies; validate with JSON Schema / OpenAPI where applicable—not the whole forge."
