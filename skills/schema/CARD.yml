# schema — CARD (schemapedia)

name: schema
version: 1.13.0
status: active

summary: |
  Multi-family registry: interchange, causal, situational, activation, relational, execution,
  introspection, vcs (git), collaboration (GitHub), component_interop (com-xpcom), meta-model, registry_meta (mechanism), notation. formats.yml, systems.yml, gateways, supersession-suggestions (toward_now / upwardish / sideways / roots).
  Each mechanism: schemas/mechanisms/<id>/MECHANISM.yml + README.md + optional SCHEMAPEDIA-*-AUGMENT.yml.

interfaces:
  reads:
    - skills/schema/README.md
    - skills/schema/templates/MECHANISM.yml
    - skills/schema/schemas/README.md
    - skills/schema/schemas/mechanisms/README.md
    - skills/schema/schemas/registry.yml
    - skills/schema/schemas/gateways.yml
    - skills/schema/schemas/plugin-convention.yml
    - skills/schema/schemas/drescher-mapping.yml
    - skills/schema/schemas/formats.yml
    - skills/schema/schemas/supersession-suggestions.yml
    - skills/schema/schemas/systems.yml
    - skills/schema/schemas/mechanisms/*/MECHANISM.yml
    - skills/schema/schemas/mechanisms/*/README.md
    - skills/schema/schemas/mechanisms/*/SCHEMAPEDIA-*-AUGMENT.yml
  writes: []

files:
  - README.md
  - SKILL.md
  - templates/MECHANISM.yml
  - schemas/README.md
  - schemas/mechanisms/README.md
  - schemas/registry.yml
  - schemas/plugin-convention.yml
