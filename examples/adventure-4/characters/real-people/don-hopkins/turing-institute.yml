# GLASGOW CULTURE

glasgow_culture:

  pure_dead_brilliant: |
    "PdB" — Arthur van Hoff's C to PostScript compiler.
    
    The name stands for: "Pure Dead Brilliant"
    — a popular Glasgow expression meaning absolutely fantastic.
    
    💬 Pete Mowforth, email 10 Apr 2026 (PRIMARY):
    **Named by Doug Scoular.**
    
    💬 arethuza (HN): "One of my favourite's was the name
    of the C to PostScript compiler PDB - being Glasgow:
    'Pure Dead Brilliant'."
    
    The compiler was used on HyperLook and SimCity.
    Glasgow slang compiled into history.
    ANSI C into PostScript. Pure. Dead. Brilliant.
    
  pick_a_window: |
    Another Glasgow expression from the era:
    
    "Pick a window, you're leaving!"
    
    Meaning: You're about to be thrown out of this pub.
    Choose which window you'd like to exit through.
    
    Glasgow hospitality: direct, physical, architectural.
    This is the culture that produced HyperLook.
    No wonder the code was robust.
    
  irn_bru: |
    Scotland's other national drink.
    Orange. Fizzy. Made from girders (supposedly).
    
    When you're coding until 3am in Glasgow,
    when it's raining AGAIN,
    when the expert system won't converge —
    
    Irn Bru. The programmer's fuel.
    "Scotland's other national drink."
    
  the_accent: |
    "It's Donald, as in Duck, and Michie, as in Mouse."
    
    💬 Shouted down the phone by Penny Montgomery — Pete Mowforth
    eyewitness, July 1982 era Institute founding onward.
    
    The Turing Institute ran on:
    - PostScript
    - LISP
    - Prolog
    - And untranslatable Glaswegian wit

# FIRST ROBOT OLYMPICS

robot_olympics:

  summary: |
    The Turing Institute hosted the
    FIRST INTERNATIONAL ROBOT OLYMPICS
    September 27-28, 1990
    University of Strathclyde Sports Complex
    
    68 robots from 12 countries.
    2,500+ visitors.
    Guinness World Record: First Robot Olympics.
    
    💬 Origin (Pete Mowforth, PRIMARY, 10 Apr 2026):
    Pete was "sort of" responsible — it actually came from a
    *Telegraph* article. He'd organised a robot gathering to use up
    spare European travel money; the University wrote about it in
    the University magazine; the paper picked it up and named it
    "The Robot Olympics." The Olympic Committee threatened to sue
    when he printed 1000 posters and sent them to every robot lab
    around the world. He gave one of the originals to Arthur for
    his 60th birthday — hopes Arthur framed it.
    
    The Seventh Doctor (Sylvester McCoy) opened it.
    A two-wheeled robot carried the Olympic torch.
    A walking pizza box fascinated children.
    ROBUG II got disqualified for trying to mount a Russian.
    (Don asked Pete to confirm that one — book material!)
    
  legacy: |
    The Robot Olympics led to:
    - Robot Wars (1994, Marc Thorpe)
    - Robot Wars TV (1998)
    - BattleBots (1999)
    
    Marc Thorpe later worked at Stupid Fun Club
    with Will Wright, who also helped found Robot Wars.
    
    Don Hopkins programmed robots at Stupid Fun Club.
    
    EVERYTHING CONNECTS.
    
  see_also: "turing-institute-robot-olympics.yml"

# THE SONG

the_song: |
  
  🎵 VERSE 1
  In Glasgow town when rain would fall,
  The Turing Institute stood tall.
  Named for Alan, brave and true,
  Where AI dreams came shining through!
  
  CHORUS
  PostScript in the rain, HyperLook alive!
  Arthur built the cards, Don made cities thrive!
  The winter couldn't stop us, we coded through the gray —
  The Turing Institute lives on in MOOLLM today!
  
