# turing-institute.yml
#
#   🏛️ THE TURING INSTITUTE 🏛️
#
#   Don Hopkins celebrates the Turing Institute in Glasgow —
#   an AI laboratory that existed from 1983-1994 where
#   he worked on HyperLook, ported SimCity, and witnessed
#   the birth of commercial AI.
#
#   "Glasgow in the late 80s. Rain. AI. PostScript. Irn Bru.
#    The future felt CLOSE enough to touch."
#
#   🎵 In Glasgow's rain and Scottish mist,
#      The Turing Institute still exists!
#      In memories of code and dreams,
#      Where AI wasn't what it seems! 🎵
#

artifact:
  id: turing-institute-celebration
  name: "The Turing Institute: Glasgow AI Days"
  type: love-letter
  emoji: "🏛️🏴󠁧󠁢󠁳󠁣󠁴󠁿🤖📺"
  owner: don-hopkins

# WHAT IT WAS
#
# The Turing Institute (1983-1994): An artificial intelligence
# research laboratory in Glasgow, Scotland. Named after Alan Turing.
# Commercial AI research before "AI" meant LLMs.
# 
# This was the first AI winter. And they kept working anyway.

what_it_was:

  the_institute: |
    Conceived July 1982 at 4 Hope Park Square, Edinburgh.
    Operating as The Turing Institute from 1983. Closed 1994.
    Named for Alan Turing — name suggested by Tim Niblett
    after the first choice, MIRA, collided with shower makers
    and the Motor Industries Research Association.
    Located in Glasgow, Scotland.
    
    Donald Michie preferred "Machine Intelligence" over
    "Artificial Intelligence" — artificial flowers, artificial teeth.
    Commercial AI research during the AI winter.
    Expert systems. Knowledge engineering. Neural networks.
    Before deep learning. Before transformers.
    When AI meant LISP and Prolog and hard-won rules.

  immaculate_conception: |
    💬 Pete Mowforth, "Chapter One: An Immaculate Conception"
    (book draft, shared with Don Hopkins, April 2026):
    
    July 1982. Professor Donald Michie marched through the door
    at number 4 Hope Park Square, fresh off a long-haul flight from
    the US, buzzing with excitement. Penny Montgomery, his PA, took
    notes while Tim Niblett and Pete Mowforth nodded agreement to
    every point for the best part of an hour.
    
    DM's vision: a not-for-profit company at the intersection of
    commerce and envelope-pushing academic research — within the
    narrow discipline of Machine Intelligence, with particular
    attention to Machine Learning. Universities sapped enthusiasm;
    businesses lacked rigour. This organisation would sit between both.
    
    The trigger was money: two American companies, each promising
    $35,000 for a bold idea with zero substance, zero liabilities,
    and zero deliverables. Just trust and two bits of paper.
    
    DM announced Pete would head Industrial Studies, Tim Academic
    Studies, and Penny would somehow pick up the detritus.
    The new organisation would be called the
    **Machine Intelligence Research Affiliates**.
    DM gave Pete the two cheques and told him to go and do it.
    
    Pete bicycled to Thomson McLintock on Charlotte Square, Edinburgh,
    still sweating in a tie-dyed T-shirt, cheques damp in his jeans.
    Next day, **MIRA Ltd** was set up as a company Limited by Guarantee.
    
    Press releases followed. A bathroom company selling MIRA showers
    sent a legal letter. The Motor Industries Research Association
    sent a rather nice calendar.
    
    Following a meeting with DM, they agreed the name should change.
    **Tim Niblett suggested "The Turing Institute."**
    
    In a few short years it became Europe's largest AI centre.
    That couldn't have been further from their thoughts that July day.
    
  the_era: |
    The late 80s in AI:
    - LISP machines were real hardware
    - Expert systems were the product
    - Japan's Fifth Generation was the competition
    - "Neural networks" meant three layers
    - "AI winter" was the weather
    
    And through it all, researchers kept BUILDING.
    Because that's what you do.
    
  the_location: |
    Glasgow. Scotland. Rain.
    
    Not Silicon Valley. Not MIT. Not Stanford.
    GLASGOW.
    
    AI doesn't need sunshine.
    AI needs persistence.
    Glasgow has persistence in ABUNDANCE.

# HYPERLOOK
#
# At the Turing Institute, Arthur van Hoff created HyperLook —
# HyperCard reimagined for NeWS. PostScript for code, graphics, AND data.
# Don ported SimCity to HyperLook. The Axis of Eval was born.

hyperlook:

  what_it_was: |
    HyperLook = HyperCard + NeWS + PostScript
    
    Bill Atkinson's HyperCard: revolutionary.
    James Gosling's NeWS: powerful.
    John Warnock's PostScript: universal.
    
    Arthur van Hoff combined them ALL.
    At the Turing Institute. In Glasgow. In the rain.
    
  the_delegation_chain: |
    Object => Card => Background => Stack => Client
    
    This is prototype inheritance.
    This is what Self taught us.
    This is what MOOLLM still uses:
    
    Object => Room => Parent => Skill => Prototype
    
    The patterns transfer.
    The patterns ALWAYS transfer.
    
  simcity_on_hyperlook: |
    Don ported SimCity to HyperLook.
    Will Wright's game. Arthur's platform.
    PostScript rendering a LIVING CITY.
    
    Every pixel, card, and widget was a PostScript command.
    Every road and zone and sprite was an object.
    Every building could be inspected.
    
    This was LiveCoding before the term existed.
    This was the Axis of Eval in action.
    Code = Graphics = Data = ALL THE SAME.
    
  the_axis_of_eval: |
    PostScript evaluates.
    NeWS evaluates.
    HyperLook evaluates.
    
    Code is data. Data is code.
    Send programs, not data.
    THE NETWORK IS THE COMPUTER.
    
    This insight came from Glasgow.
    This insight powers MOOLLM.
    The Turing Institute lives in every skill.

# THE PEOPLE

the_people:

  arthur_van_hoff: |
    Created HyperLook at the Turing Institute.
    Later: Java team at Sun. Marimba. Strangeberry. Flipboard.
    
    But first: Glasgow. PostScript. Rain.
    Proving that the best ideas come from
    unlikely places during unlikely times.
    
  the_researchers: |
    The Turing Institute employed ~100 people at peak.
    Experts in expert systems.
    Knowledge engineers before the term was common.
    AI researchers during the winter.
    
    They shipped products.
    They published papers.
    They kept the faith.
    
  donald_michie: |
    🕯️ Donald Michie (1923-2007) founded the Turing Institute.
    
    His name is pronounced "MICK-ee" — like Mickey Mouse.
    
    💬 "Known to his colleagues as 'Duckmouse'..."
       — The Telegraph obituary, July 9, 2007
    
    Donald (Duck) + Michie (Mickey Mouse) = DUCKMOUSE.
    The founder of AI in Scotland had a cartoon nickname.
    
    (Not "MISH-ee" or "MY-kee" or "mi-SHEE". MICK-ee.)
    
    THE PENNY MONTGOMERY INCIDENT — PRIMARY SOURCE:
    💬 Pete Mowforth, email to Don Hopkins, 10 Apr 2026:
    
    "The Donald Duck Michie Mouse explanation was **shouted down
    the phone** by **Penny Montgomery** his PA. She thought he was
    out. He was standing directly behind her. I was looking at her
    while desperately trying to signal the unfolding disaster."
    
    💬 Don Hopkins, email reply 10 Apr 2026:
    "Penny Montgomery sounds to me like the name of a thrilling
    James Bond character!" — then realized: Miss Moneypenny.
    "Did you ever call her Miss Moneypenny Montgomery? ;)"
    
    💬 Pete Mowforth, email 11 Apr 2026:
    Penny was "a pretty lady who, back then, often used to wear
    tight purple velvet flared trousers to distract the PhD students.
    She probably distracted DM too."
    
    Earlier retelling (💬 Don Hopkins, HN May 2023; colleague hearsay
    c. 1992) had "secretary," "thick Scottish accent," and "a month"
    of silence. Pete's eyewitness account is the sharper source:
    shouted, not murmured; Penny Montgomery by name; Pete Mowforth 
    signaling across the room as disaster unfolded.
    
    The irony: colleagues called Michie "Duckmouse" anyway.
    The mnemonic was too perfect. It stuck.
    
    MOUSE RESEARCH — MORE THAN A NICKNAME:
    💬 Pete Mowforth, 10 Apr 2026:
    
    Michie's early career was biological sciences. In the 1950s he
    worked closely with his then-wife **Anne McLaren**. Together they
    conducted groundbreaking research on mouse embryos. In 1958 they
    published a landmark paper in *Nature* demonstrating that mouse
    embryos could be grown in a lab dish (in vitro) and then
    successfully transplanted into a surrogate mother to be born as
    healthy pups — the first time in vitro cultivation followed by
    successful birth had been proven in mammals.
    
    Michie and McLaren are scientific founders of the techniques that
    led directly to human IVF. Michie was one of the pioneers of
    test-tube babies. He received the Pioneer Award from the
    International Fertility Society (now IFFS).
    
    M.H. van Emden's memoir (2009) also recalls Michie as a schoolboy
    mouse fancier — twenty-five papers on mice in his early career.
    The nickname wasn't just wordplay. It was destiny.
    
    THE £5 BET:
    During this part of his career Michie bet a physicist £5 that he
    could make a machine that could learn. He built "boxes" which
    learned tic-tac-toe. He won the bet.
    
    BLETCHLEY — COLOSSUS AND THE YOUNG LAD:
    💬 Pete Mowforth, 11 Apr 2026 (DM told him after a few sherries):
    
    The best bit at Bletchley that DM always volunteered for was
    popping along to the huts containing the Colossus machines.
    Lots of young ladies looked after them. The thousands of
    electronic valves made the inside of the huts extremely hot,
    so the ladies often stripped down to minimal clothing.
    DM would probably have been accepted there because he was still
    a young lad while the older boffins were banned.
    
    Michie worked with Alan Turing at BLETCHLEY PARK during WWII.
    Breaking codes. Cracking the Tunny cipher. He KNEW Turing personally.
    They played chess — van Emden clarifies Turing was so bad at chess
    that Michie was the only one whose chess was weak enough to stand it.
    
    They discussed chess-playing machines in the 1940s.
    Turing buried silver ingots at Bletchley. Michie helped search
    with a home-made metal detector. Never found. Still lost.
    
    NAMING THE INSTITUTE:
    DM first chose **Machine Intelligence Research Affiliates** (MIRA).
    Tim Niblett suggested renaming it **The Turing Institute**
    after the shower-company legal letter and the MIRA calendar arrived.
    An act of honor by someone who knew Turing — not academic tribute
    from a stranger, but a colleague remembering a colleague.
    
    SOURCES:
    - 💬 Pete Mowforth, emails to Don Hopkins, 10–11 Apr 2026 (PRIMARY)
    - 💬 Pete Mowforth, "Chapter One: An Immaculate Conception" (book draft)
    - 💬 Don Hopkins, emails & HN (https://news.ycombinator.com/item?id=35989198)
    - Telegraph obituary (2007): "Known to his colleagues as 'Duckmouse'"
    - British Library: Michie papers (Add MS 88958, 88975, 89072)
    - M.H. van Emden: "I Remember Donald Michie (1923-2007)" (2009)
    
  penny_montgomery: |
    Donald Michie's PA at the founding of the Institute.
    Took notes at the July 1982 meeting at 4 Hope Park Square.
    Shouted the Duck/Mouse pronunciation down the phone while
    Michie stood directly behind her — Pete Mowforth eyewitness.
    
    💬 Don Hopkins: "Miss Moneypenny Montgomery?"
    
    💬 Pete Mowforth: tight purple velvet flared trousers,
    "back then, often used to wear... to distract the PhD students."
    
  peter_mowforth: |
    Co-founder. Head of Industrial Studies from day one.
    Later Director. Organised the First Robot Olympics (see
    turing-institute-robot-olympics.yml for his primary account).
    Writing a book focused on the people, not just the tech.
    
    💬 April 2026 correspondence with Don Hopkins confirmed and
    expanded many Institute stories — Duckmouse, MIRA naming,
    Robot Olympics origin, PdB naming, Michie's IVF work.
    
  tim_niblett: |
    Co-founder. Head of Academic Studies.
    **Suggested the name "The Turing Institute"** after the
    MIRA naming collision. Later Sun Microsystems projects.
    
  alan_turing_himself: |
    🕯️ The Institute was named for the man who:
    - Broke Enigma
    - Defined computation
    - Asked 💬 "Can machines think?"
    - Was persecuted for being gay
    - Died before his vision could bloom (1912-1954)
    
    Naming the Institute after him was an act of HONOR.
    Tim Niblett suggested the name; Michie — who KNEW Turing —
    agreed. Every line of code written there continued his work.

# INSTITUTE STORIES (book material)

institute_stories:

  kgb_library_affiliate: |
    💬 Pete Mowforth (book, forthcoming):
    When the Russian KGB joined the Turing Institute library as
    an affiliate, the British Secret Service turned up and grilled
    Jim Richmond.

  onr_double_payment: |
    💬 Pete Mowforth:
    The US Office of Naval Research paid twice (~$400k each time)
    because they messed up the paperwork.

  andres_lomp_soviet_programmer: |
    💬 Pete Mowforth:
    Had to get a Soviet (Andres Lomp) to do programming on a secret
    US military project — he needed the cash and was cheap. He told
    Pete it was his patriotic duty to put some bugs in it. Pete told
    him to keep quiet and not tell anyone.

  robin_boswell_latin_italy: |
    💬 Pete Mowforth:
    Booking a hotel in Italy, the manager couldn't speak English.
    Robin Boswell (double first in Maths, Oxford) said he could speak
    their language — then tried fluent **Latin**, thinking that was
    what they spoke in Italy. Robin lived in a very scholarly bubble.
    Always wore three jumpers, even in summer. Rumored very skinny.
    Fondly remembered at the Institute.

  tatjana_zrimec_causality: |
    💬 Pete Mowforth, 10 Apr 2026 — rebutting critics who said
    "Britain is not at the sharp end of robot technology":
    
    In the 1980s Pete ran experiments with Tatjana Zrimec at Turing
    getting robots to learn the physics of causality by randomly
    playing with toy blocks. They attempted to build a Large
    Behavioural Model (as opposed to an LLM). A few months back
    Google showed robots doing exactly the same thing.
    "Nice to know the Americans were only 36 years behind — they
    really should read the literature from outside the US."

# WHY IT MATTERS

why_it_matters:

  the_continuity: |
    AI didn't start with GPT.
    AI didn't start with deep learning.
    AI has a LINEAGE.
    
    The Turing Institute is part of that lineage.
    HyperLook is part of that lineage.
    The rain in Glasgow is part of that lineage.
    
    When we build MOOLLM, we build ON this foundation.
    We stand on shoulders. We credit the giants.
    
  the_winter_workers: |
    Working on AI during an AI winter
    is an act of FAITH.
    
    No hype. No funding frenzy. No FOMO.
    Just belief that these ideas matter.
    Just work, day after day.
    
    Those researchers were RIGHT.
    They were just EARLY.
    Being early is not the same as being wrong.
    
  the_scottish_spirit: |
    Glasgow gave us:
    - James Watt (steam engine)
    - William Thomson (Lord Kelvin)
    - The Glasgow School of Art
    - The Turing Institute
    
    Innovation doesn't require good weather.
    Innovation requires DETERMINATION.
    Glasgow has more determination per capita
    than anywhere in the world.

