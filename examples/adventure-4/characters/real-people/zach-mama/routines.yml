# Zach Mama — topic → routines → real YouTube URLs
# DO NOT store quoted joke text. Links drive traffic to @zachmama.
# Refresh IDs: scripts/refresh-youtube-catalog.sh  (requires yt-dlp)
# Ethics: ../../../../skills/representation-ethics/

catalog:
  channel: https://www.youtube.com/@zachmama
  website: https://zachmama.com
  human_index: routines.md
  refreshed: "2026-07-09"
  refresh_cli: scripts/refresh-youtube-catalog.sh

  policy:
    quote_routine_text: forbidden
    npc_in_chat: paste_clickable_urls_only
    attribution: "Watch Zach Mama — @zachmama"

  share_behavior:
    default: most_appropriate
    description: |
      Pick the video with lowest rank in the topic (best entry point).
      On follow-up ("another one?", "what else?") use one_by_one (next rank).
      If session tracks watched IDs, prefer not_watched_yet.
    modes:
      most_appropriate: "lowest rank wins — full set before shorts when both match"
      one_by_one: "ascending rank; cycle when exhausted"
      not_watched_yet: "skip IDs in session.watched_zach_mama_videos if present"

playlists:
  stand_up:
    url: https://www.youtube.com/playlist?list=PL9e4fbjILkKLCbObCKWEigG8_MmZmTs8G
    note: "Full club sets"
  weird_crowds:
    url: https://www.youtube.com/playlist?list=PL9e4fbjILkKLExAQe_NHVOX4w8o7kos0Z
    note: "Hostile / odd rooms — Boise, Eau Claire, etc."

