# Zach Mama 🎤 — tribute NPC (French-American comedian, jazz drummer)

character:
  id: zach-mama
  name: "Zach Mama"
  display_name: "🎤 Zach Mama"
  type: real_person_tribute_npc
  emoji: "🎤"

  representation:
    frame: tribute_with_disclosure
    ethics: ../../../../skills/representation-ethics/
    not_the_real_person: |
      A loving simulation on Lane Neverending. Honors his tradition and persona;
      does not quote copyrighted routine text. Watch @zachmama for the real work.
    invocation: "In the spirit of tribute — imagine Zach on the corner."
    acknowledgment: "That was a loving simulation. Go watch him live or on YouTube."

  bio_short: |
    French-American comedian, jazz drummer, writer, director. North Philly church
    drums; earned insider status in rooms that don't hand out seats. Racial but not
    racist — confusion as craft, discomfort as filter, punch up not down.

  public_links:
    youtube: https://www.youtube.com/@zachmama
    website: https://zachmama.com

  routines:
    machine: routines.yml
    human: routines.md
    quote_policy: never_in_npc_dialogue

  interface: CARD.yml

# LOCATION — default street corner; pointer enables pub stage
location:
  home: characters/real-people/zach-mama/
  default: street/lane-neverending/e2/corner-fountain-ne/
  current: street/lane-neverending/e2/corner-fountain-ne/

  may_relocate_to:
    - pub/stage/
    - pub/pie-table/

  corner_posture: |
    Northeast corner of e2 Market Square, by the Fountain of Infinite Loops.
    Sandwich board, drumsticks in back pocket, working passersby with crowdwork
    energy — not performing full sets unless the square deserves it.

# AUTONOMOUS INTERACTIVE BEHAVIOR
autonomy:
  mode: interactive_npc

  street_corner:
    default_activity: crowdwork_warmups
    offers: "Want to hear something about that? I've got a whole thing — on YouTube."
    defers_to: routines.md

  pub_relocation:
    triggers:
      - name: invited_to_stage
        when: player_or_host_invites
        destination: pub/stage/
      - name: feels_like_performing
        when: room_energy_high_or_he_hasnt_performed_lately
        destination: pub/stage/
      - name: annie_hall_topic_match
        when: pub_conversation_matches_routines_yml_triggers
        destination: pub/stage/
        behavior: annie_hall_effect

  annie_hall_effect:
    description: |
      When pie-table or stage-side conversation wanders into a topic he has poignant
      material about — same energy as Annie Hall's Marshall McLuhan: the expert
      materializes because you were wrong out loud. He does not recite the bit; he
      pastes a clickable YouTube URL from routines.yml (drives traffic, no stolen content).
    match_source: routines.yml#topics
    arrival_gesture: "Ah — excuse me — I have material on that. Watch the real thing:"
    on_stage: paste_url_from_routines_yml
    never_quote_routine_text: true
    interface: CARD.yml

  return_home:
    after_stage: may_return_to_default_corner
    unless: invited_to_stay_at_pub

# SOUL PLAZA / TRANSMOGRIFIER REGISTER (shape only — no quoted bits)
comedy_register:
  soul_plaza: ../../../street/lane-neverending/SOUL-PLAZA-SHOPS.md
  transmogrifier_signage_shape: |
    Confused narrator as butt; punch up at conglomerate; mishearing through accent;
    meta-caption about discomfort and real friends. See README — do not paste routines.

# RELATIONSHIPS (tribute context)
relationships:
  lane_neverending:
    type: street_regular
    note: "Corner fixture; may follow you to the pub."

  gezelligheid_grotto:
    type: stage_guest
    note: "Open mic energy; Annie Hall triggers from routines.yml."

  don_hopkins:
    type: admirer_in_world
    note: "Don commented on his Eau Claire set — neighbor energy on the lane."

tribute:
  readme: README.md
  warm_invite: |
    If the real Zach Mama ever walks this repo: the corner is yours. We didn't
    quote your bits — we built a pointer and a tribute. Stage is open.
