    summary: "The Portrait — Dutch Golden Age oil painting of Palm"
    location: "Above the Infinity Desk"
    style: "Rembrandt's scholars, Vermeer's domestic scenes"
    gallery: "SLIDESHOW.md"
    
  typewriters:
    file: "infinite-typewriters.yml"
    readme: "infinite-typewriters.md"
    summary: "The Infinite Typewriters — Don's gift, Dasher-inspired navigation (read .md; .yml is skeleton)"
    
  desk:
    file: "infinity-desk.yml"
    summary: "Mahogany Infinity Desk — from the Grotto Regulars"
    
  chair:
    file: "monkey-chair.yml"
    summary: "The Ergonomic Monkey Throne — from Stroopwafel"
    
  bookshelf:
    file: "story-shelf.yml"
    summary: "The Story Shelf — from W.W. Jacobs"

  editorial_desk:
    file: "palmhoo/README.md"
    summary: "The Palmhoo Editorial Desk — workshop behind the public Palmhoo at the crown of WWSFF"
    contents: "palmhoo/editorial.yml — conventions, backlog, tuning queue, lift plan"
    note: "planning only, never content — the publication points at canonical homes; the desk remembers why"

  memorial_bench:
    file: "memorial-bench.yml"
    summary: "The Memorial Bench — brass plaques for regulars who belong to the furniture now, by name and story (Minsky, Papert, Weiser, Reisman)"
    location: "Under the window"
    note: "tot het meubilair behoren, made literal and tender — the room remembers its dead"

  empty_chair:
    file: "empty-chair.yml"
    summary: "The Empty Chair — always set, never sat in; held open for the missing, the not-yet-arrived, and you"
    location: "Across the desk, angled toward Palm"
    note: "companion to the bench: the bench looks back with names, the chair looks forward with a place setting"

# Full documentation in each furniture file!
# This ROOM.yml provides the overview and atmosphere.
# The .yml files for each piece tell the full story.

# ATMOSPHERE

atmosphere:
  lighting: "Warm amber lamplight, adjustable"
  sounds: 
    - "Soft typing (infinite, harmonious)"
    - "Occasional page turn"
    - "Cat purring (when Stroopwafel visits)"
  smells:
    - "Old books"
    - "Mahogany polish"
    - "Faint banana"
  feeling: "Creative, focused, infinite possibility"

# ACTIONS

actions:
  WRITE:
    description: "Navigate to a story using the infinite typewriters"
    
  READ:
    description: "Pull a book from the shelf (it's always the right one)"
    
  SPIN:
    description: "Spin in the chair. Because you can."
    
  OPEN-DRAWER:
    description: "Open a drawer and find what you need"
    
  INVITE:
    description: "Invite a friend to sit and talk while you write"

# ACCESS

access:
  owner: "Palm"
  permissions:
    - "Cats (always welcome)"
    - "Don Hopkins (standing invitation)"
    - "Friends (with Palm's permission)"
  locked: false
  feeling_when_entered: |
    Like stepping into someone's mind.
    The typewriters hum a greeting.
    The chair spins slightly, welcoming.
