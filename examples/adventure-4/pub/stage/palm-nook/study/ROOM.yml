# PALM'S STUDY
# Where the infinite typewriters live

room:
  name: "Palm's Study"
  owner: "Palm"
  type: "private-creative-space"
  
  description: |
    A cozy writing nook within a nook.
    The soft hum of infinite typewriters fills the air.
    Mahogany desk against the wall, ergonomic monkey chair,
    and a bookshelf that knows what you need to read.
    
    Above the desk hangs THE PORTRAIT — a Dutch Golden Age
    oil painting of Palm himself, surrounded by typewriters
    and kittens. The gold frame catches the amber lamplight.
    Visitors pause here. The painting demands acknowledgment.
    
    Sunlight (from somewhere) catches dust motes dancing.
    And everywhere — EVERYWHERE — the papers. Folders stapled
    together and folders bursting open. Loose pages in piles
    and drifts, like snow that fell indoors and decided to stay.
    Coffee rings on the manuscripts. A bong stain shaped like
    Borneo on the Tognazzini draft. Books wedged open with other
    books. Magazines, brochures, a boarding pass used as a
    bookmark in a bookmark.
    
    The Dutch have the exact phrase: een gezellig zooitje —
    a cozy little mess. Palm's Persoonlijke Gezelligheid.
    It is organized, completely, in exactly one place: Palm's
    mind. To any other observer it is chaos — but it is OPEN
    chaos, warm chaos, chaos you are welcome to explore. Pull
    any pile; it will turn out to be a topic. Every drift is
    a shelf that hasn't been named yet.
    
    (This is why Palmhoo exists: the editorial desk in the
    corner is where the drifts get named.)
    
    This is where Palm writes. Where Palm creates.
    Where Palm navigates the library of all possible books.

  house_style: "een gezellig zooitje — geniale wanorde, open for exploration; apparent chaos, actual ontology"

