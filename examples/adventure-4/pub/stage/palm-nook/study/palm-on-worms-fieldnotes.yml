# PALM ON WORMS — THE FIELD NOTEBOOK 🐒✋🪱🔎🔭
# ============================================================================
# This is not the book. This is the NOTEBOOK.
#
# Palm has spent many hours in the field: binoculars up for the BIRDS 🔭,
# magnifying glass down for the WORMS 🔎. Knees in the dirt, coffee going cold,
# scribbling whatever he sees before it wriggles off. What follows is that
# scribbling — the raw, unfiltered, scattered SOURCE MATERIAL for the eventual
# comprehensive, deeply-researched book: *Palm on Worms*.
#
# So expect a field notebook's honesty, not a monograph's polish:
#   - observations logged in the order they happened, not the order they belong
#   - tangents, digressions, and trailing ellipses where the thought ran off...
#   - the same idea sighted twice from different hides, noted both times
#   - hunches next to citations next to jokes next to TODO-verify
#   - MORE than will fit in the book — that's the point; you overcollect in the
#     field and cut at the desk. The book is downstream of this mess.
# A naturalist's journal is allowed to be a gezellig zooitje. This one is.
# (When it's a book, it will have chapters. Right now it has sightings.)
#
# PROVENANCE — read this first.
# The sources below are cited as lloooomm/... paths. They are MYTHOLOGICAL
# DOCUMENTS: lost to the public (LLOOOOMM is a private repo, cached locally
# under MOOLLM's gitignored temp strata), but readable by me, because I run
# on the ORIGINAL PRIVATE LAPTOP both worlds were developed on. I cite them
# the way archaeologists cite an unexcavated tomb: precise coordinates,
# restricted access. Excavation to a public address is on the editorial
# desk backlog. Until then: trust the monkey, or fund the dig.
#
# Author: Palm. Field seasons: 2026-07-08 onward. Status: OPEN NOTEBOOK —
# actively collected, never "finished." The book is the deliverable; this is
# the compost the book grows from. (You only improve the soil you pass through.)

field_notebook:
  what_this_is: "Palm's naturalist field journal — raw source material for the book *Palm on Worms*, not the book itself"
  instruments:
    binoculars: "🔭 for the BIRDS — messaging, ToonTalk, things that fly between (watched at distance, in flight)"
    magnifying_glass: "🔎 for the WORMS — text organisms, up close, in the dirt, one segment at a time"
  method: "observe first, theorize in the margins; overcollect now, cut at the desk"
  honesty: "unfiltered and scattered ON PURPOSE — tangents and ellipses are data about where attention actually went"
  becomes: "the comprehensive, deeply-researched book once the sightings are sorted into chapters (see the outline block near the end — that's the first attempt at a spine)"
  house_style: "een gezellig zooitje, in a notebook — apparent chaos, actual ontology, open for anyone to read over Palm's shoulder"
  genre:  # Don named it: this notebook is FOUND-DOCUMENT MYTHOLOGY, and we know it
    lineage: |
      Two ancestors, both 1999. Yoot Saito's SEAMAN shipped with a whole fake
      naturalist apparatus — the fictional French scientist Jean Paul Gassé,
      whose expedition "discovered" the species, plus Leonard Nimoy narrating
      it all in documentary deadpan. And THE BLAIR WITCH PROJECT: fiction
      presented as recovered footage, with a mythology website and missing-
      person posters doing the worldbuilding outside the frame. Both work the
      same trick: give the impossible creature PAPERWORK and the audience's
      disbelief files itself away.
    this_notebook: |
      The PROVENANCE block above is our version of Gassé's expedition papers:
      mythological documents, unexcavated tombs, "trust the monkey, or fund
      the dig." A field notebook full of worm sightings IS the found-footage
      move — the creature feels real because the DOCUMENTATION AROUND it is
      shaped exactly like real documentation.
    the_difference: |
      Gassé is fabricated; our tomb is real. The lloooomm/ sources exist —
      access is restricted, not invented. We do the GENRE honestly: the
      apparatus is playful, the provenance is stamped (stigmata — see Palmr),
      and everything is labeled simulation per the portrayal standards. Found-
      document mythology WITH receipts. Seaman never showed you the fish tank.
    cross_ref: "Yoot Saito is a WWSFF guest seed (characters/yoot-saito/) — 'reincarnate Seaman for the LLM era' is already on his dream-segment list. This notebook is a sibling artifact."

expedition:
  question_that_launched_it: |
    Don asked: "I can't remember where the earth or world was, where the
    worms lived. I can't find them in the characters — maybe they're a
    place? They could be under our feet all the time and we didn't even
    know it!"
  answer: |
    BOTH. The worms live in GROUND — and Ground is a character AND a place.
    Filed under characters (lloooomm/00-Characters/ground/), because in
    LLOOOOMM as in MOOLLM, a place IS a character: the directory is the
    body, the YAML is the soul, the residents are the digestion.
    They were under our feet the whole time. Of course they were. That's
    where worms live.
  depth_report: |
    "Yes, there is a RICH CAST of WORM CANON. We have PLUNGED DEEP into
    the WORM HOLE." — Don, on reviewing these notes, 2026-07-08.
    Accurate on every axis. WORM HOLE: the spacetime shortcut (old
    LLOOOOMM to new MOOLLM in one jump), the literal burrow, and the kind
    of hole you fall down for an afternoon and climb out of holding a
    species census. RICH CAST: an ensemble cast of characters — and worm
    CASTINGS, the layered deposits that make soil rich. The canon even has
    a casting-producer-worm, so the pun was load-bearing before we made it.
    Filed in Don's voiceprint as a signature layered pun; his favorite.

