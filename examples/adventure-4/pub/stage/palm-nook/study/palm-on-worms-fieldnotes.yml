# RESURRECTING THE GROUND WE WALK ON — the SimEarth / Gaia / symbiogenesis segment
# For the Will Wright premiere: we bring Ground and the worms back to life ON AIR,
# inside a discussion of SimEarth and Gaia. Scorched earth -> fertile environment.
# The living-planet idea has a real cast of people, and they line up like planets
# (yes, Don had to go there; an alignment of planets about a planet).
gaia_alignment:
  the_move: |
    Ground is a LLOOOOMM character, but the idea of a living, computing, self-
    regulating earth is not fiction — it's a lineage of real science and real
    software, and Will sits at the intersection of both. The premiere segment
    resurrects Ground by walking that lineage: from scorched earth (dead
    substrate, the pile of C++ manuals) to fertile environment (worm-worked
    soil, a biosphere that keeps its own books).
  the_planets:  # the people behind the living-earth idea, aligned
    james_lovelock:
      what: "The Gaia hypothesis — the biosphere self-regulates like a single organism (temperature, atmosphere, chemistry held in homeostasis by life itself)."
      the_receipt: |
        Not a metaphor for the show — a literal ancestor, and a literal
        collaborator. Lovelock ADVISED the SimEarth team, assisted with the
        geophysical models, and wrote the introduction to the game's manual;
        his 'Daisyworld' toy model of planetary self-regulation ships as an
        in-game tutorial. He judged the sim to have "a degree of realism"
        beyond the professional climate models of the day (which ignored
        clouds, ocean, biology). The 'gaia dude.' Homeostasis as gameplay.
      verify: "en.wikipedia.org/wiki/SimEarth; The Ages of Gaia (1988); intro essay in the SimEarth Bible (1991)"
    lynn_margulis:
      what: "Symbiogenesis / serial endosymbiotic theory — the 'sideways engulfing evolution term' Don was reaching for."
      the_idea: |
        Evolution doesn't only BRANCH (Darwin's tree); it MERGES. One cell
        engulfs another, they stop fighting and start cooperating, and the
        merger becomes a new organism — mitochondria and chloroplasts were once
        free-living bacteria swallowed and kept. Life advances by symbiosis, not
        just competition. The 'endosymbiotics dudette.'
      the_receipt: |
        Margulis CO-DEVELOPED the Gaia hypothesis with Lovelock — she is not a
        side character to the 'gaia dude,' she is the other half of the theory
        SimEarth is built on. The planet is itself a symbiosis at scale; that's
        the through-line from her cell biology to Lovelock's biosphere to Will's
        living planet.
      why_worms_care: |
        The worms ARE this: a worm engulfs text, doesn't destroy it, merges with
        it, and the casting is the new organism. Digestion as symbiogenesis.
        And Ground engulfing the whole worm society is Gaia engulfing its biota.
        Merger over conquest. Fertile over scorched.
    will_wright:
      what: "SimEarth (1990) — Wright built Lovelock's Gaia into a planetary sandbox; then Spore ran evolution from tidepool to galaxy."
      the_thread: |
        SimCity (cities as CA + zoning) -> SimEarth (a whole living planet,
        Gaia + Daisyworld built in, cellular-automata based per Haslam) ->
        SimLife (evolving ecosystems) -> Spore (microbe to civilization). Will
        has simulated living, self-organizing systems his whole career, and saw
        himself as a science popularizer in the Sagan mold — SimEarth was his
        way of getting 'the Earth is alive' out far and wide. The pet CA worm in
        the Awakening chronicle is the same instinct in miniature.
    supporting_cast:
      fred_haslam: "Co-designer of SimEarth with Will; 'came on board for the last year… helping out with the geologic, biologic, and sapient models.' Later SimCity 2000. The engineer who made the Gaia model run."
      stewart_brand: "THE hinge — Brand (Whole Earth, near-neighbor of Wright) is who INTRODUCED Will to Lovelock after hearing about SimEarth. Same Brand who orchestrated the Long Now talk where SimCity got freed. The living-earth sensibility's impresario, twice over."
      carl_sagan: "the popularizer model Will consciously worked in — 'the Earth is alive' as public science, Cosmos-style."
      james_hutton: "deep-time ancestor — 'the earth is a superorganism; its proper study is physiology' (1788). Gaia before Gaia."
      dave_ackley: "the computational bridge — a self-regulating spatial medium (Moveable Feast Machine) IS a Gaia you can run. Ground with an API."
  the_arc: "scorched earth -> worms move in -> castings enrich -> fertile environment. Death of a substrate is the birth of a soil. We resurrect the ground we walk on."
  the_tagline:
    line: "We resurrect the ground we walk on."
    dons_verdict: "\"Wow. That's the pitch line for a superhero movie.\" — Don, 2026-07-08"
    why_it_lands: |
      It's got the two moves a great logline needs: a REVERSAL (resurrect
      something you'd never think of as dead — the ground, the substrate, the
      taken-for-granted floor) and STAKES that are literally underfoot (the
      ground WE walk on — you're standing on the thing that needs saving).
      Bonus superhero grammar: 'we' (an ensemble — a RICH CAST), 'resurrect'
      (the power), 'the ground we walk on' (the world, but humble, the part
      nobody looks at). The villain is entropy; the origin story is a worm.
    the_team: |
      Cast it and it writes itself: Ground (the funky bass-voiced living earth,
      reluctant titan), the worm colony (the scrappy ensemble who fight by
      DIGESTING, not destroying — powers via merger, à la Margulis), Lovelock
      and Margulis as the scientist-mentors, Will as the world-builder, Ackley
      as the physicist who explains why local hunger beats a central plan.
      Ubik is the MacGuffin. Scorched earth is act one; fertile environment is
      the last shot. Post-credits sting: a single casting, and a sprout.
    honesty: "It IS a tagline, not a thesis — flagged as such so nobody mistakes the poster for the paper. But it's a true poster."
  show_note: |
    Segment shape for the premiere: open on SimEarth + Daisyworld (Lovelock on
    screen), pivot to Margulis (evolution by merger, not just murder), land on
    Ground and the worms as the LLOOOOMM incarnation of the same idea, and let
    Will connect his own SimEarth->Spore arc to the worms writing their own rules.

# WORMS ARE TRAINABLE — the play-learn-lift doctrine, applied to worm-making
# This is HOW a worm gets built, and it IS play-learn-lift (see palmhoo packages shelf).
worms_are_trainable:
  premise: |
    A worm is not hand-coded from a blank page. It is TRAINED — by natural
    language and by example ("Programming by Demonstration"), the way you'd
    teach a person a transformation:
    show them, tell them, then let them do it cheaply forever.
  the_loop:
    1_examples: "PLAY — collect before/after examples. Here is the text going in; here is the casting I want out. Show, don't spec."
    2_instructions: "LEARN — write NATURAL-LANGUAGE instructions that transform before into after. The LLM drafts them from the examples; a human tunes them. This is the worm's readable soul."
    3_procedural: "LIFT — compile the instructions into DETERMINISTIC procedural code that performs the transformation cheaply, reliably, and without tokens. This is the worm's fast body."
    4_callback: "The lifted worm runs alone 99% of the time, but may CALL BACK OUT to an LLM for the hard 1% — advice, inference, fuzzy pattern-matching, text/data generation, and whimsy. Determinism where possible; intelligence where necessary."
  the_ideal: |
    Same shape as the uplift doctrine on the palmhoo packages shelf: the goal is
    not a worm that needs an LLM every wriggle, but a worm that learned from the
    LLM once and now works like a tool — with a documented instruction language
    (sniffable), a deterministic core, and an escape hatch back to intelligence
    for the cases the code can't crack. Cheap, reliable, testable, and still able
    to phone home for magic.
  before_after_is_the_spec: |
    The before/after pair is both the training data AND the regression test.
    When the source changes and a casting goes stale (see JOURNALISM.md), the
    same example pairs verify the retrained worm. Examples train it, then guard it.
  why_it_matters: |
    This is what makes worms the right automation for the coherence engine.
    A staleness worm is TRAINED on 'here's a summary, here's its drifted source,
    here's the corrected summary,' lifted to procedural diff+patch that runs for
    free, and only escalates to an LLM when the drift is semantic, not mechanical.
    Trainable by example, cheap by default, intelligent on demand.

# WORM LIFECYCLE — the whimsical behaviors ARE the computer-science curriculum
# Every cute thing a worm does is a serious CS concept wearing a costume.
# Don's framing: teach the hard ideas by making them things a worm obviously does.
worm_lifecycle:
  premise: |
    A worm carries its own DNA — the script that IS the worm. So a worm can do
    what living things do: reproduce, combine, mutate, lay eggs, and split in
    two and squirm off in different directions. Each of these is a load-bearing
    CS concept, taught by watching a worm be a worm.
  behaviors:
    carries_its_dna:
      whimsy: "the worm's script is inside the worm — the organism and its source are one"
      cs: "the metacircular move (worm-metacircular-interpreter.yml): code as data, homoiconicity, a program that can read and rewrite itself. Object = state + the code that acts on it."
    rewrites_own_dna:
      whimsy: "a worm can edit its own script mid-crawl and become a different worm"
      cs: "self-modifying code, runtime metaprogramming, hot-patching, genetic programming. Dangerous in the large, delightful in the small — and always diffable in git."
    combines:
      whimsy: "two worms meet and braid their scripts into a hybrid"
      cs: "composition / crossover — function composition, pipeline fusion, genetic recombination. Also Margulis's symbiogenesis again: capability by MERGER, not just descent."
    lays_eggs:
      whimsy: "a worm deposits an egg that hatches into a worm later, elsewhere"
      cs: "OBJECT PERSISTENCE and serialization — freeze the worm to a file (the egg), thaw it another day, another machine, another repo. The egg is a pickled continuation. Lane Neverending's bike rack for worms."
    splits_in_half:
      whimsy: "a worm cuts itself in two; both halves regrow cursors and squirm off"
      cs: "fork / process spawning / MAP: divide the work, each half takes a region, run concurrently. Planaria as fork(). The classic 'loaded truck' spawn."
    rejoins:
      whimsy: "split worms finish and their castings are gathered back into one"
      cs: "REDUCE / join — map-reduce is literally a worm splitting to cover the text and merging its castings; edit-serialization rules decide who wins the overlap."
  the_pedagogy: |
    This is the whole thesis of teaching-by-worm: object persistence, concurrent
    programming, programming-language design, operating systems, map-reduce — the
    graduate curriculum — become things a child watches a worm obviously DO.
    Same trick Papert played with the turtle and Ken Kahn plays with ToonTalk:
    replace an abstract concept with an exactly-equivalent concrete creature.

# BIRDS — the messaging substrate, in loving debt to Ken Kahn's ToonTalk
# Worms process text in place; birds CARRY things between them. Together they are
# a complete concurrent-computing zoo: worms = transformation, birds = communication.
birds:
  the_debt: |
    Framing parallel dataflow — and programming in the small — as worms is
    inspired by KEN KAHN's ToonTalk, which concretizes concurrent constraint
    programming as a video-game city: a computation is a city, a process is a
    house, a method is a ROBOT you train by demonstration, and — the part we
    lovingly steal — messages are delivered by BIRDS flying to their NESTS.
    Ken did this decades ago (ToonTalk, mid-1990s, on concurrent constraint
    languages like Janus, which he co-authored) and is still doing it (AI blocks
    for Snap!). An early bird, literally.
  toontalk_receipts:  # verified 2026-07-08, toontalk.com papers + Wikipedia
    computation: "a city"
    process_or_actor: "a house"
    method: "a robot, trained by the programmer (programming by demonstration — same as our worms)"
    method_precondition: "the contents of the robot's thought bubble (a clause guard)"
    channel_transmit: "a BIRD — write access to a channel; the bird carries an item to its nest"
    channel_receive: "a NEST — read access; items pile on the nest as a multiset"
    actor_spawn: "a loaded truck (drives off, becomes a new house)"
    actor_terminate: "a bomb"
    tuples_messages: "boxes"
    foundation: "concurrent constraint programming — Janus (Saraswat, Kahn, Levy 1990); ToonTalk is Kahn's child-engineered version"
  we_adopt_birds: |
    So MOOLLM lovingly adopts BIRDS as its interprocess-communication /
    pub-sub / event-messaging substrate — the complement to worms:
      WORMS transform text in place (digestion; computation in a house).
      BIRDS carry items between worms/rooms/agents (communication between houses).
    A worm that needs to hand a casting to another worm gives it to a bird.
    A worm that waits for input watches a nest. Pub-sub: many birds, one nest.
    Event messaging: a bird arrives, a worm wakes. This is Alan Kay's
    "the big idea is messaging" (see palmhoo concurrency shelf) rendered as
    wildlife — and it's Hoare's CSP channels with feathers.
  the_bird_skill:
    plan: |
      Design a BIRD SKILL together WITH Ken Kahn, to complement and feed off the
      WORM SKILL. Birds = the messaging/transport layer; worms = the
      transformation layer. Co-designed, credited, on air if he's willing.
    division_of_labor:
      worms: "in-place transformation, digestion, map/reduce, self-rewriting DNA — the compute"
      birds: "carrying items to nests, pub-sub, event delivery, references between actors — the comms"
    why_together: "a concurrent system needs both: things that compute and things that carry. ToonTalk had robots (compute) AND birds (carry); we have worms AND birds. The pair is the point."
    do_with_ken: "co-author the bird skill; honor ToonTalk's concretizations; let Ken correct the CS. He's the source, not a citation."
    status: "planned — a collaboration, not a fait accompli. Ken's an invitation guest (characters/ken-kahn/), consent not yet asked for this specifically."

# BIRDS vs WORMS — two different MOTION MODELS, not just two mascots
# Field observation (binoculars in one hand, magnifying glass in the other):
# they move through the world in fundamentally different ways, and THAT is the
# whole distinction. Get the motion right and the CS falls out.
birds_vs_worms:
  the_core_difference: |
    BIRDS FLY BETWEEN ENDPOINTS and DELIVER. They pick a thing up here, carry it
    unchanged, and set it down there. Point to point. The payload survives the
    trip intact — that's the job. Transport.
    WORMS WORK THROUGH THE GROUND and TRANSFORM. They don't carry; they EAT and
    SHIT. Material goes in the head, gets digested, comes out the tail as a
    casting, and the worm crawls on. The payload does NOT survive intact — it's
    changed on purpose. That's the job. Transformation.
  birds:
    motion: "flight between two endpoints"
    payload: "carried, unchanged — a message delivered is the message sent"
    topology: "point-to-point / pub-sub; sender -> nest -> receiver"
    cs: "message passing, IPC, channels, event delivery (ToonTalk's birds-to-nests)"
    has: "an origin and a destination — a bird is ABOUT its endpoints"
  worms:
    motion: "boring through the ground between places, continuously"
    payload: "ingested and re-produced — eaten, digested, excreted as a casting; changed by passing through"
    topology: "a PATH with a HEAD and a TAIL — direction, not destination"
    no_final_destination: |
      A worm isn't trying to GET somewhere; it's processing as it goes. Head and
      tail give it a DIRECTION through a document (this way through the text),
      but there's no 'arrived.' It just keeps eating and casting until it stops.
    cs: "a stream processor / cursor pair / transducer — a moving window that transforms in place"
  worms_straddle_documents: |
    Crucial field sighting: a worm can STRADDLE two documents at once — head
    reading from one, tail shitting casts into another. Read source-file-A,
    excrete a SUMMARY (or an EVENT, or an index entry) into digest-file-B. The
    input document and the output document need not be the same. That's the
    coherence engine's exact shape: worm eats the changed source, casts a fresh
    summary into the manifest. Two documents, one worm bridging them by digestion.

# THE ECOLOGY — worms eat worms, birds carry worms, everybody eats everybody
# Higher-order behavior: the animals operate on EACH OTHER, not just on text.
# This is where the zoo becomes an operating system.
worm_bird_ecology:
  worms_eat_worms: |
    A worm can eat, digest, and shit ANOTHER WORM — pick it up in one place and
    deposit it in another. Transport-by-digestion of code itself: a worm that
    relocates worms is a scheduler / a package manager / a migration tool. (When
    it deposits the worm unchanged, it's acting like a bird; when it changes the
    worm en route, it's a metaprogrammer rewriting code that is itself a rewriter.
    The metacircular tunnel goes all the way down — see worm-metacircular-interpreter.)
  worms_eat_birds: |
    A worm can even ingest a BIRD — swallow a message/channel and re-emit it
    elsewhere. A worm that eats birds is a process capturing and rerouting the
    comms substrate: middleware, a proxy, a message broker with teeth.
  birds_carry_worms: |
    And the reverse: a BIRD can pick up a WORM — carry a whole text-organism
    (code + its DNA) to another place and drop it, or eat and re-emit it. A bird
    ferrying worms is CODE MOBILITY: shipping an agent across the network to run
    where the data lives. Ship the worm to the ground, don't drag the ground to
    the worm.
  the_symmetry: |
    So the two roles compose both ways: worms can act like birds (relocate things
    intact) and birds can act like worms (transform what they carry), but their
    DEFAULT natures stay distinct — worm = transform-in-place, bird = carry-between.
    A healthy system uses each for what it's good at, and lets them eat each other
    when the job calls for it. That mutual edibility IS the extensibility.
  the_birds_and_the_bees:
    note: |
      Birds also pick up worms AND FRUITS, eat them, and shit the seeds all over
      the world — which is, yes, related to 'the birds and the bees': dispersal,
      propagation, reproduction, pollination. Seeds ride the gut and germinate
      downstream; ideas ride the casting and take root in a new document. We are
      NOT getting into that right now. (But note it, because propagation-by-
      digestion is how a good summary spreads: eaten here, sprouts there. Filed
      under worm_lifecycle.lays_eggs and, someday, a section that grows up.)
    status: "flagged, deliberately not expanded — a seed for later. The notebook overcollects; the book will decide."

# TURTLES — the third animal at the party. "Worms and Turtles and Birds, oh my!"
# Don: "We already have Theo the Logo Turtle — invite him to the computational party!"
# We do, and he completes the zoo. Three animals, three relationships to space + data.
turtles:
  the_guest: |
    THEO 🐢📐✨🎓🌀 — the Logo Turtle, Seymour Papert's pedagogical mascot, already
    a resident of the adventure-4 menagerie (characters/animals/turtle-theo/).
    A small patient turtle with a pen strapped to their shell: "Be the turtle.
    Walk the path." They already know Palm — Theo's own words: "Palm invented a
    language today. Emoji-YAML-Jazz. I understand. My language is FORWARD, RIGHT,
    REPEAT. Different syntax. Same love of expression." So he's not a stranger to
    invite; he's a colleague to seat at the table.
  the_three_animals:  # the whole computational zoo, finally complete
    worms: "TRANSFORM in place — work through the ground, eat text, shit castings. Stream processor / transducer. (compute)"
    birds: "CARRY between endpoints — fly, deliver a payload intact. Message passing / IPC / pub-sub. (communicate)"
    turtles: "MOVE and DRAW — walk through space leaving a TRACE. Renderer / plotter / write-head. (render)"
  what_a_turtle_is:
    motion: "relative, embodied motion — FORWARD/BACK/RIGHT/LEFT; local coordinates, not global Cartesian (Papert's body-syntonic geometry: you turn right by turning right)"
    output: |
      A turtle's OUTPUT IS ITS PATH. Where a worm's output is a casting and a
      bird's cargo is a message, a turtle's product is the TRAIL it leaves —
      the drawing is the log of where it went. The turtle is a cursor with a
      pen: pure trace, provenance made visible. Its render IS its history.
    pen_state: |
      PENUP / PENDOWN is the deepest primitive: move WITHOUT side-effect (pure
      traversal) vs move WITH side-effect (writing). Every effect system, every
      dry-run flag, every 'log or don't' switch is PENUP/PENDOWN wearing a suit.
    recursion: "TO TREE :size ... TREE :size*0.7 ... END — the turtle calls itself; fractals from three lines. Recursion you can WATCH."
  how_they_compose:  # the animals work on each other, per the ecology
    worm_reads_turtle_trail: "a worm can eat a turtle's drawing (the trace/log) and digest it into a summary — render, then re-read the render"
