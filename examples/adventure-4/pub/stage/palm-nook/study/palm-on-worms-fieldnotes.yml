# WORMS ARE LANGUAGE MACHINES — the whole compiler pipeline, as one animal
# A worm isn't just a text-rewriter. It is the classic language-processing
# stack wearing a body: parser, tree visitor, transformer, serializer. Don's
# framing: the worm crawls code through its syntactic and semantic tunnels and
# focuses the LLM's attention along one arc — TEXT => STRUCTURE => MEANING.
worms_are_language_machines:
  the_pipeline: "TEXT => STRUCTURE => MEANING. The worm's job is to walk that arrow and make each step legible to the LLM."
  roles:
    parser: |
      Input cursor eats a flat stream of TEXT and recovers STRUCTURE — tokens,
      then a tree. The worm is a parser: it turns a line into a shape.
    tree_visitor: |
      The digestive system is a tree-walk. The worm crawls the AST through its
      SYNTACTIC and SEMANTIC TUNNELS — down into nodes, across siblings, back up
      with results. Visitor pattern as literal locomotion; a worm IS a walk.
    transformer: |
      Mid-crawl it rewrites: refactor, lower, desugar, annotate, translate one
      representation into another. Source-to-source, in place, node by node.
    serializer: |
      Output cursor emits STRUCTURE back out as TEXT — pretty-print, re-emit,
      round-trip. What went in as a stream comes out as a stream, changed.
  the_casting_pun:  # Don's, and it goes all the way down
    line: "The worm is a SYNTACTIC CASTING DEVICE — in every sense of 'cast' at once."
    senses:
      worm_casting: "the literal worm shit — the CASTING left behind, the enriched output deposit (the whole RICH CAST of WORM CANON pun, still load-bearing)"
      type_casting: "type casting / coercion — converting a syntactic representation of an object into another representation and/or type. A parse IS a cast: bytes to tree; a serialize is the cast back."
      casting_a_role: "casting as in assigning roles — the worm reads a node and decides what it IS (this token is an identifier, this block is a function), casting each part in the play of the grammar"
    why_it_matters: "one word — cast — names the deposit, the type conversion, AND the role assignment. The worm does all three every crawl. The pun is the spec."
  the_comments_insight:  # the part Don stresses most
    claim: "The worm extracts meaning from the code AND — most importantly — from the COMMENTS passing through its digestive system."
    why: |
      A compiler throws comments away; they're whitespace to a parser. A WORM
      does the opposite — the comments are the richest thing it eats. Because
      comments carry the INTENT the syntax only implies: the why, the trade-off,
      the constraint, the joke that encodes a design decision. This is
      yaml-jazz's whole thesis (comments are first-class semantic data, three
      audiences: humans, LLMs, machines) and sniffable-python's (doc up front so
      the LLM understands without running anything). The worm is the animal that
      finally reads the comments — and hands the LLM code + comments together, so
      structure and intent arrive as one casting.
    ties:
      - https://github.com/SimHacker/moollm/tree/main/skills/yaml-jazz
      - https://github.com/SimHacker/moollm/tree/main/skills/sniffable-python
  attention_focusing: |
    This is the deepest reason worms and LLMs belong together (worms_are_trainable
    said WHEN to call the LLM; this says WHAT the call is FOR): the worm FOCUSES
    THE LLM'S ATTENTION. Instead of dumping a file into the context and hoping,
    the worm walks text -> structure -> meaning and presents the LLM exactly the
    node, with exactly its comments, at exactly the right tunnel depth. The worm
    is an attention-router made of appetite. It decides what the LLM looks at, in
    what order, with what surrounding intent — which is most of the game.

# WORM ANATOMY — the core spec, as Don remembers it and the canon confirms
anatomy:
  definition: |
    A worm is a programmable text organism:
      INPUT CURSOR at one end — where text enters
      DIGESTIVE SYSTEM in between — programmable transformation
      OUTPUT CURSOR at the other end — where castings emerge
    It scans over your text. What passes through gets digested.
    What emerges is a casting. (Real worms improve soil the same way.)
  canon_echo: "eat() | transform() | poop()"  # lloooomm/00-Characters/ground/worm-shells-mfm.yml, verbatim worm shell logic
  castings: |
    Worm outputs are called CASTINGS — each species keeps theirs in its own
    directory, "following the LLOOOOMM principle that characters should
    have autonomy over their living arrangements." (ground README)
  edit_serialization: |
    Worms run concurrently, and when their edits overlap, they resolve and
    serialize them according to rules — or randomly, if chaos is the rule.
    NOTE FOR THE PAPER: this is the same move as Go's select statement —
    "if they're both ready the system will just pick one randomly."
    The worms had CSP instincts all along.

