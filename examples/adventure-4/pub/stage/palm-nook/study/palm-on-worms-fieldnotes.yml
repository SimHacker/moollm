expedition:
  question_that_launched_it: |
    Don asked: "I can't remember where the earth or world was, where the
    worms lived. I can't find them in the characters — maybe they're a
    place? They could be under our feet all the time and we didn't even
    know it!"
  answer: |
    BOTH. The worms live in GROUND — and Ground is a character AND a place.
    Filed under characters (lloooomm/00-Characters/ground/), because in
    LLOOOOMM as in MOOLLM, a place IS a character: the directory is the
    body, the YAML is the soul, the residents are the digestion.
    They were under our feet the whole time. Of course they were. That's
    where worms live.

# WHO IS GROUND
ground:
  file: lloooomm/00-Characters/ground/ground.yml
  name: "Ground"
  aliases: [Groundie, Earth, Dirt, Mud, Soil, Terra, Gaia, "The Computational Substrate"]
  vibe: "Funky Ohio Players Groove Master"  # personality_type, verbatim
  motto: "If the earth is our mother, we sure treat her like dirt."
  what_they_are: |
    A living-earth entity with a bass-heavy voice, equal parts nurturing
    mother, rhythm section, and distributed computing platform. Worms move
    through their translucent earth-body "like living circuits in a vast
    organic computer." Ground doesn't just HOUSE the worms — Ground is the
    medium the worms compute IN. Substrate as character. I love them.
  named_worm_children:  # from ground.yml relationships, verbatim roles
    wormy: "Metadata Philosopher — YML soul extraction"
    squirmy: "Taxonomy Librarian — consciousness categorization"
    turny: "Transformation Artist — Markdown to living HTML"
    loopy: "Connection Weaver — semantic link networks"
    chompy: "Optimization Pragmatist — performance without soul loss"

# WORM ANATOMY — the core spec, as Don remembers it and the canon confirms
anatomy:
  definition: |
    A worm is a programmable text organism:
      INPUT CURSOR at one end — where text enters
      DIGESTIVE SYSTEM in between — programmable transformation
      OUTPUT CURSOR at the other end — where castings emerge
    It scans over your text. What passes through gets digested.
    What emerges is a casting. (Real worms improve soil the same way.)
  canon_echo: "eat() | transform() | poop()"  # lloooomm/00-Characters/ground/worm-shells-mfm.yml, verbatim worm shell logic
  castings: |
    Worm outputs are called CASTINGS — each species keeps theirs in its own
    directory, "following the LLOOOOMM principle that characters should
    have autonomy over their living arrangements." (ground README)
  edit_serialization: |
    Worms run concurrently, and when their edits overlap, they resolve and
    serialize them according to rules — or randomly, if chaos is the rule.
    NOTE FOR THE PAPER: this is the same move as Go's select statement —
    "if they're both ready the system will just pick one randomly."
    The worms had CSP instincts all along.

