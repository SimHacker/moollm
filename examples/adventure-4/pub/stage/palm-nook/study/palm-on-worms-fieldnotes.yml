# CONCURRENT AT THE SPEED OF LIGHT — the Rob Pike thread
concurrency:
  the_claim: "worms run at the speed of light, concurrently"
  the_discipline: |
    Rob Pike, 'Concurrency Is Not Parallelism' (Waza 2012):
    CONCURRENCY is structure — the composition of independently executing
    processes. PARALLELISM is execution — things literally at once.
    "Concurrency is about dealing with lots of things at once. Parallelism
    is about doing lots of things at once."
    The worm colony is a CONCURRENT DESIGN: each worm an independent
    procedure with communication (castings, bonds, Ground's medium).
    Whether one worm wriggles at a time or a million do is a free variable —
    the design stays correct. That's why "speed of light" is honest:
    in MOOLLM, SPEED-OF-LIGHT means many turns in one call — maximal
    concurrency, parallelism as the engine pleases.
  sources:
    talk_slides: https://go.dev/talks/2012/waza.slide
    talk_video: https://vimeo.com/49718712
    talk_video_alt: https://www.youtube.com/watch?v=oV9rvDllKEg
    hn_discussion: https://news.ycombinator.com/item?id=48786713
    hoare_csp: "C.A.R. Hoare, Communicating Sequential Processes, CACM 1978 — 'truly one of the greatest papers in computer science' (Pike)"
  gophers_vs_worms: |
    Pike's parable: gophers with carts moving C++ manuals to the incinerator.
    Add gophers, add carts, add staging piles — better concurrent
    decomposition beats mere parallelism.
    The worm colony is the same parable UNDERGROUND: the book pile is the
    repo, the incinerator is the staleness queue, the carts are castings.
    But worms have one advantage over gophers: they don't carry the text,
    they PASS IT THROUGH THEMSELVES. Transformation in transit.
    Digestion beats transport.
  dons_hn_quip: |
    "Just set the source pile of C++ manuals on fire. No gophers needed!"
    — DonHopkins, HN 48786713. For the paper: this is the throttle-vs-pedal
    distinction again. Burning the pile is a throttle. Worms pedal.
  select_and_the_worms: |
    Pike: select waits on multiple channels; if several are ready, pick
    randomly. Worm edit-serialization: resolve overlapping edits by rules,
    or randomly if you want. Same shrug, same soundness. The paper should
    put Hoare, Pike, and Ground in one room and let Ground lay down the bass.

