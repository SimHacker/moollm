# THE DEEP THEORY SHELF — what the paper must engage
theory:
  moveable_feast_machine:
    source: lloooomm/00-Characters/ground/worm-shells-mfm.yml
    who: "Dave Ackley — robust-first computing"
    what: |
      Computational elements in a spatial medium, LOCAL INTERACTIONS ONLY,
      no global synchronization, indefinitely scalable. The lloooomm doc
      implements a 1D MFM in markup documents: worms as atoms, ASCII shells
      as molecular bonds, self-replication, emergence from simple rules.
    why_it_matters: |
      Ackley is already an ambient influence in MOOLLM (robust-first skill).
      The worms are his physics rendered as fauna. When the staleness queue
      gets worm-powered (see palmhoo JOURNALISM.md), it inherits this:
      no central scheduler, just local hunger.
  metacircular:
    sources:
      - lloooomm/00-Characters/ground/worm-resources/worm-metacircular-interpreter.yml
      - lloooomm/00-Characters/ground/worm-resources/ps-interpreter-worm-synthesis.yml
      - lloooomm/00-Characters/ground/worm-resources/brain-worm-pipeline-examples.md
      - lloooomm/00-Characters/ground/worm-resources/worm-witnesses-transclusion.yml
    note: |
      Worms that interpret worms; a PostScript interpreter synthesized in
      worm; pipelines ("brain worms that process text like Perl but without
      the syntactic syrup of ipecac" — Don, in the Awakening chronicle);
      worms witnessing transclusion. PSIBER's grandchildren, wriggling.
  the_awakening:
    source: lloooomm/00-Characters/ground/the-worm-awakening.md
    chronicle: |
      The origin story, as told by Hunter, Digital Chronicler. Cast includes:
