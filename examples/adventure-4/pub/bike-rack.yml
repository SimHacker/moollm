# Front bike rack — Gezelligheid Grotto, Lane Neverending side
# Just outside the north door. Amsterdam coffeeshop theme.

object:
  id: pub-front-bike-rack
  name: "Front Bike Rack"
  type: [street_furniture, bike_parking, outdoor]
  emoji: "🚲🔒"
  portable: false

  location: |
    Cobblestones directly outside the pub's north door.
    Brass plaque on the brick wall: "7 Lane Neverending."
    Rack bolted to the façade between the door and the window box.

  description: |
    A heavy Dutch cast-iron wave rack — the kind Amsterdam landlords
    install once and forget for forty years. Eight loops. Room for
    eight normal bikes. One cargo trike currently occupies three loops
    and part of the sidewalk. Nobody is complaining. Goliath-sized
    vehicles get gezelligheid immunity.

    Marieke keeps a spare Abus key behind the bar. The regulars know.
    The dogs know. Carrie knows where the rack is (bite radius: two meters).

  examine: |
    FRONT BIKE RACK
    
    Cast iron, painted matte black, chipped in places. A small enamel
    sticker: "Leela Municipal Bike Infrastructure (discontinued 1987)."
    Someone added a handwritten label in Marieke's hand: "NO ACME
    DELIVERY ZONE — they never listen anyway."
    
    CURRENT OCCUPANTS:
    → Road Runner Family Max Cargo Plus (locked, GPS active)
      See: parked[0] below
    
    EMPTY LOOPS: 5 (theory)
    
    Smell: wet cobblestone, chain oil, faint anvil.

  parked:
    - id: road-runner-bakfiets-fmcp
      prototype: ../street/lane-neverending/w1/acme-bakfiets-of-holding.yml
      model_code: RR-BFH-FMCP
      order_code: ACME-RR-BFH-FMCP-0702
      locked: true
      lock:
        type: "Abus Granit X-Plus"
        key_holder: "Marieke (spare behind bar)"
        cable: "Through frame and front box hasp"
      gps:
        active: true
        tracker: "Road Runner WhereAmI™ Premium"
        recovery: "ACME Gorilla Suit Team Theft Recovery Service"
      delivered_at: "2026-07-02"
      parked_at: "2026-07-02"
      parked_by: "ACME delivery (self-parked after assembly)"
      condition: |
        Assembled. One brake pad still missing. Bell says MEEP MEEP when
        touched. Cargo box empty — dogs stayed in Cat Cave. GPS blinks green.
      malfunction_roll: passed
      note: "Delivery boy declined to test MEEP MEEP mode. Wise."

  actions:
    LOCK:
      usage: "LOCK BAKFIETS"
      effect: "See prototype actions.LOCK — three locks, ABUS, gorilla nod."

    UNLOCK:
      usage: "UNLOCK BAKFIETS"
      effect: "Need key from Marieke or your pocket. Dogs gather if they hear the click."

    EXAMINE-BAKFIETS:
      usage: "EXAMINE BAKFIETS / EXAMINE ROAD RUNNER"
      effect: "Read prototype at street/lane-neverending/w1/acme-bakfiets-of-holding.yml"

    HONK:
      usage: "HONK"
      effect: "See prototype actions.HONK — MEEP MEEP, pigeons, Clipboard #4."

    GPS-TRACK:
      usage: "TRACK BAKFIETS"
      effect: "See prototype actions.TRACK — 96% Front Rack, 4% painted tunnel."

  gorilla_suit_recovery:
    service: "ACME Gorilla Suit Team™ Premium Theft Recovery"
    tagline: "We go ape. You get bike. Terms apply."
    protocol: |
      1. GPS pings ACME dispatch
      2. Three men in gorilla suits exit painted tunnel — GorillaCams™ chest-mounted, recording
      3. They beat chest at thief and thump him until bike is returned
      4. Thief signs waiver on camera. Bike may have banana sticker.
      5. GorillaCam footage auto-uploads for insurance rider verification
      6. ACME social posts highlight reel within the hour (hashtag: #GorillaGotIt)
      7. You receive invoice for "Premium Recovery Event"
    gorilla_cams:
      model: "ACME GorillaCam™ Pro (chest mount, faux fur compatible)"
      purpose:
        - "Insurance rider verification — proves recovery was 'within spec'"
        - "Viral video post — ACME Marketing retains perpetual MEEP rights"
      disclaimer: |
        Footage may include chest-beating, thumping, and waiver signature.
        Thief's face blurred in EU. Unblurred in ACME B-roll package.
    surge_pricing:
      national_gorilla_suit_day: "September 24"
      reference: https://en.wikipedia.org/wiki/Gorilla_suit#National_Gorilla_Suit_Day
      status: "High call volume — surge pricing in effect"
      multiplier: "3.7×"
      high_call_volume_surcharge: "+47 gold"
      app_message: |
        Unusually high demand for Gorilla Suit Team™ in your area.
        National Gorilla Suit Day. Many gorillas. Fewer tunnels.
      fine_print: "Accept surge to confirm recovery. Decline to remain in queue."
    bicycle_day_discount:
      date: "April 19"
      holiday: "Bicycle Day"
      reference: "https://en.wikipedia.org/wiki/Bicycle_Day_(psychedelic_holiday)"
      status: "Promotional pricing — unusually low call volume"
      multiplier: "0.69×"
      discount: "-19 gold"
      app_message: |
        Happy Bicycle Day. Gorilla Suit Team™ riding banana bikes. On LSD.
        Chest-beating at 12 mph. Thieves unsure which gorilla is real.
        Recovery ETA: whenever the wheels stop being wiggly.
      fine_print: "Discount valid April 19 only. GorillaCam footage may require a sitter."
    warning: "Gorilla suits not actual gorillas. Carrie still suspicious."
