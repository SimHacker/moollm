  warning: |
    Do not place cargo box inside another Bag of Holding.
    Do not exceed rated cuteness while moving.
    Do not let Ziggy conduct from the handlebars.
    Hydraulic fluid is not butterscotch. Scotch knows. Biscuit learned.

  horn:
    sounds:
      first: "MEEP!"
      second: "MEEP MEEP!"
      third: |
        A distant coyote yelps.
        You gain the uneasy feeling something has accepted a quest.

  malfunction: |
    Roll on delivery (45%):
    - Motor ignites. You do not move. Smoke ring. Then reverse at cliff-edge speed
    - Transmission finds one ratio: MEEP MEEP. Brakes sold separately. Still true — plot override
    - Belt snaps mid-bridge. Handlebars keep spinning. You keep going anyway
    - Front wheel locks. Rear wheels keep rolling. Trike folds like a card table
    - Cargo box interior larger than exterior. Dogs exit before you opened it
    - Painted tunnel delivery: solid for you. Actual Road Runner not included. You try anyway
    - Canal bridge is a flat painting. You run in at full speed. Pause. Look down. Fall
    - Suspended in air. Small sign: "YIKES." Gravity invoices on landing
    - Anvil arrives on schedule. Coyote decal on bell was never decorative
    - Charred silhouette. Ten dogs unharmed. Trike totaled. ACME invoice: paid in full

  actions:
    LOAD:
      description: "Load the Biscuit family (or other cargo)"
      usage: "LOAD [dog|all] INTO BAKFIETS"
      effect: |
        Dash produces clipboards. Pepper claims throne. Mochi sits on
        the rim like a cat. Goliath enters sideways; the box expands
        politely. Biscuit tail wags. Whole trike wags.

    RIDE:
      description: "Pedal or throttle through Amsterdam lanes"
      usage: "RIDE BAKFIETS TO [destination]"
      effect: |
        Motor assists. Belt whispers. Planetary transmission finds the
        ratio between gezellig and urgent. Ziggy waves to pedestrians.

    BRAKE:
      description: "Stop"
      usage: "BRAKE"
      effect: |
        FMCP trim: hydraulic discs engage. Usually. All wheels. Ideally.
        Family slides forward 6 inches in unison. Pepper remains on throne.
        Lower trims: nothing happens. Brakes sold separately. Still true.

    HONK:
      description: "Sound the bell"
      usage: "HONK"
      effect: |
        MEEP MEEP!
        Every pigeon within 30 meters files a noise complaint.
        Dash records the complaint on Clipboard #4.

    LOCK:
      description: "Secure the bakfiets"
      usage: "LOCK BAKFIETS"
      effect: |
        Three locks. One chain. One suspiciously large ABUS padlock.
        WhereAmI™ blinks green.
        A gorilla somewhere nods approvingly.

    UNLOCK:
      description: "Release the locks"
      usage: "UNLOCK BAKFIETS"
      effect: |
        Need key from Marieke or your pocket. Dogs gather if they hear the click.

    TRACK:
      description: "Check GPS location"
      usage: "TRACK BAKFIETS"
      effect: |
        WhereAmI™ (gps) reports:
          Status: PARKED
          Location: Front Rack, 7 Lane Neverending (south sidewalk)
          Confidence: 96%
          Remaining 4%: "Possibly inside a painted tunnel."

    INSURANCE:
      description: "Read policy abstract and riders"
      usage: "EXAMINE INSURANCE / READ POLICY"
      effect: |
        insurance_policy.abstract
        GPS clause: binds to gps.ref
        Attached riders: Gorilla Suit recovery — protocol, GorillaCams,
        surge pricing (Sept 24), Bicycle Day discount (April 19).

    UNLOAD:
      description: "Disembark at destination"
      usage: "UNLOAD BAKFIETS"
      effect: |
        Full-body wiggle exit protocol. Biscuit last — he checks everyone
        got out. Box returns to normal size. Smells like happy dogs.

  relationships:
    marieke_reaction: |
      "You ordered WHAT? …Fine. I know a guy. You don't want to know a guy.
      Bring them back dry. All ten. Especially Goliath."
    carrie_precedent: "May bite ACME delivery person. Fair."
    leela_rivalry: |
      Leela Manufacturing notes: dimensional cargo violates three ISO standards
      and one municipal bike ordinance. ACME notes: sold.

  delivery_flavor: |
    *2-4 turns pass. A low rumble from the painted tunnel at Lane Neverending.*
    
    The ACME delivery truck emerges — briefly — then retreats into the
    painting. On the cobblestones: one crate, one trike (partially
    assembled), one delivery boy already running back through solid plywood.
    
    You finish assembly (Sumerian page 3 of 4). MEEP MEEP! once. No cliff.
    Good omen.
    
    Abus lock through frame. WhereAmI™ blinks green. Parked in the front
    rack. Three loops. Marieke watches from the window. Nods once.
    
    Crate stamp: ROAD RUNNER — FAMILY MAX CARGO PLUS — RR-BOF-FMCP — MEEP MEEP!
    Missing: one brake pad. Extra: Road Runner helmet (coyote ears).
    Gorilla Suit Team welcome packet tucked under the seat.
