  description: |
    ACME Road Runner™ Bakfiets of Holding — Family Max Cargo Plus edition.
    Dutch-style cargo trike with an impossibly deep front box.

    From outside: normal bakfiets proportions. Amsterdam brown paint.
    ACME orange pinstripes. Frame badge: ROAD RUNNER. Bell: MEEP MEEP.

    From inside the box: Cat Cave rules apply. Ten dogs fit. Goliath
    does not look cramped. Physics files a complaint.

  examine: |
    ACME ROAD RUNNER™ BAKFIETS OF HOLDING
    Family Max Cargo Plus (RR-BOF-FMCP)
    Custom build. Your specifications. Our problem. MEEP MEEP!

    BADGING: Road Runner logo on down tube. Coyote on bell. Not a mistake.

    FRAME: Reinforced steel trike, three wheels, low center of gravity
    (theory). Sticker: "Rated for gezelligheid."

    MOTOR: Road Runner TorqueHamster™ 2500W heavy-duty hub motor.
    Silent until it isn't. Smells faintly of anvils when hot.

    TRANSMISSION: Road Runner PlanetaryMaybe™ — automatic continuous planetary.
    No gears. No gaps. One sport mode: MEEP MEEP.
    The shifter knob is decorative. ACME insists it helps morale.

    DRIVE: Road Runner WhisperSnap™ carbon fiber belt drive.
    Lighter than chain. Quieter than chain. Snaps louder than chain
    if you look at it wrong or if Amsterdam rains sideways.

    BRAKES: Road Runner SqueezeFirst™ hydraulic disc — FMCP trim only.
    Finally includes brakes. Usually. All wheels. All at once.
    Fluid is orange. Don't ask what's in it. One pad missing. ACME standard.

    CARGO BOX: Family Max Cargo Plus — Bag of Holding interior.
    Exterior dimensions: 90×60 cm. Interior dimensions: "Yes." Depth: "More."
    Weight limit: "Family."

    BELL: MEEP MEEP. Legally distinct. Dash will organize who beeped last.

    INSURANCE: Policy ACME-RR-INS-0702. GPS-linked. Gorilla Suit rider attached.
    See insurance_policy.abstract for coverage, protocol, and seasonal pricing.

  gps:
    model: "Road Runner WhereAmI™ Premium GPS"
    add_on_cost: 29
    app_status: "Parked — 7 Lane Neverending — south sidewalk, front rack"
    blink_codes:
      green: parked
      red: stolen
      orange: confused

  insurance_policy:
    policy_number: "ACME-RR-INS-0702"
    order_code_ref: "ACME-RR-BOF-FMCP-0702"
    carrier: "ACME Indemnity — Painted Tunnel Division"
    abstract: |
      Comprehensive theft and recovery for one (1) Road Runner Family Max Cargo Plus.
      Coverage active when WhereAmI™ (see gps) reports PARKED or STOLEN.
      Premium Recovery Events billed per attached rider. GorillaCam footage
      satisfies rider verification and ACME Marketing MEEP rights.
      Excludes: cliffs, anvils, coyote bell decals, kaleidoscopic tunnel overlay.
    gps:
      ref: gps
      clause: |
        Policy binds to the WhereAmI™ unit on the frame. Unauthorized movement
        pings dispatch. Orange = confused; confused is still billable.
    attached_riders:
      - id: RDR-GST-001
        name: "ACME Gorilla Suit Team™ Premium Theft Recovery"
        premium_gold: 49
        tagline: "We go ape. You get bike. Terms apply."
        if_stolen: |
          GPS pings dispatch. Three men in ill-fitting gorilla suits emerge
          from the painted tunnel. Chest-beating and thumpingensues. Bike returns with
          optional banana sticker. Premium Recovery Event invoiced separately.
        protocol: |
          1. GPS pings ACME dispatch (via gps.ref)
          2. Three punks in gorilla suits exit painted tunnel — GorillaCams™ chest-mounted, recording
          3. They beat chest at thief and thump him until bike is returned
          4. Thief signs waiver on camera. Bike may have banana sticker.
          5. GorillaCam footage auto-uploads for insurance rider verification
          6. ACME social posts highlight reel within the hour (hashtag: #GorillasGotIt)
          7. You receive invoice for "Premium Recovery Event"
        gorilla_cams:
          model: "ACME GorillaCam™ Pro (chest mount, faux fur compatible)"
          purpose:
            - "Insurance rider verification — proves recovery was 'within spec'"
            - "Viral video post — ACME Marketing retains perpetual MEEP rights"
          disclaimer: |
            Footage may include chest-beating, thumping, and waiver signature.
            Thief's face blurred in EU. Unblurred in ACME B-roll package.
        pricing:
          surge:
            national_gorilla_suit_day: "September 24"
            reference: https://en.wikipedia.org/wiki/Gorilla_suit#National_Gorilla_Suit_Day
            status: "High call volume — surge pricing in effect"
            multiplier: "3.7×"
            high_call_volume_surcharge: "+47 gold"
            app_message: |
              Unusually high demand for Gorilla Suit Team™ in your area.
              National Gorilla Suit Day. Many gorillas. Fewer tunnels.
            fine_print: "Accept surge to confirm recovery. Decline to remain in queue."
          bicycle_day_discount:
            date: "April 19"
            holiday: "Bicycle Day"
            reference: "https://en.wikipedia.org/wiki/Bicycle_Day_(psychedelic_holiday)"
            status: "Promotional pricing — unusually low call volume"
            multiplier: "0.69×"
            discount: "-19 gold"
            app_message: |
              Happy Bicycle Day. Gorilla Suit Team™ riding banana bikes. On LSD.
              Chest-beating at 12 mph. Thieves unsure which gorilla is real.
              Recovery ETA: whenever the wheels stop being wiggly.
            fine_print: "Discount valid April 19 only. GorillaCam footage may require a sitter."
        warning: "Gorilla suits not actual gorillas. Carrie still suspicious."

