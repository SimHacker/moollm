  description: |
    ACME Road Runner™ Bakfiets of Holding — Family Max Cargo Plus edition.
    Dutch-style cargo trike with an impossibly deep front box.

    From outside: normal bakfiets proportions. Amsterdam brown paint.
    ACME orange pinstripes. Frame badge: ROAD RUNNER. Bell: MEEP MEEP.

    From inside the box: Cat Cave rules apply. Ten dogs fit. Goliath
    does not look cramped. Physics files a complaint.

  examine: |
    ACME ROAD RUNNER™ BAKFIETS OF HOLDING
    Family Max Cargo Plus (RR-BFH-FMCP)
    Custom build. Your specifications. Our problem. MEEP MEEP!

    BADGING: Road Runner logo on down tube. Coyote on bell. Not a mistake.

    FRAME: Reinforced steel trike, three wheels, low center of gravity
    (theory). Sticker: "Rated for gezelligheid."

    MOTOR: Road Runner TorqueHamster™ 2500W heavy-duty hub motor.
    Silent until it isn't. Smells faintly of anvils when hot.

    TRANSMISSION: Road Runner PlanetaryMaybe™ — automatic continuous planetary.
    No gears. No gaps. One sport mode: MEEP MEEP.
    The shifter knob is decorative. ACME insists it helps morale.

    DRIVE: Road Runner WhisperSnap™ carbon fiber belt drive.
    Lighter than chain. Quieter than chain. Snaps louder than chain
    if you look at it wrong or if Amsterdam rains sideways.

    BRAKES: Road Runner SqueezeFirst™ hydraulic disc — FMCP trim only.
    Finally includes brakes. Usually. All wheels. All at once.
    Fluid is orange. Don't ask what's in it. One pad missing. ACME standard.

    CARGO BOX: Family Max Cargo Plus — Bag of Holding interior.
    Exterior dimensions: 90×60 cm. Interior dimensions: "Yes." Depth: "More."
    Weight limit: "Family."

    BELL: MEEP MEEP. Legally distinct. Dash will organize who beeped last.

  gps_and_recovery:
    tracker: "Road Runner WhereAmI™ Premium GPS"
    app_status: "Parked — 7 Lane Neverending — Front Rack"
    recovery_service: "ACME Gorilla Suit Team™ Premium Theft Recovery"
    recovery_tagline: "We go ape. You get bike. Terms apply."
    if_stolen: |
      GPS pings dispatch. Three men in ill-fitting gorilla suits emerge
      from the painted tunnel. Chest-beating ensues. Bike returns with
      optional banana sticker. Premium Recovery Event invoiced separately.

