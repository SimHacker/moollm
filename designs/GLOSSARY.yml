            - "Magic: The Gathering — https://en.wikipedia.org/wiki/Magic:_The_Gathering"
            - "Baseball card — https://en.wikipedia.org/wiki/Baseball_card"
            - "Pokémon Trading Card Game — https://en.wikipedia.org/wiki/Pok%C3%A9mon_Trading_Card_Game (evolution chains: cards that upgrade into other cards)"
            - "HeroClix — https://en.wikipedia.org/wiki/HeroClix (the click dial: stats change with state — a card whose numbers move as it plays)"

      - term: BIG-CARD
        kind: coined
        origin: "WWSFF, July 2026 — 'size constraints are released'"
        means: "Semantic mipmap exception for people like Minsky and Kurzweil: the card grows until it fits the person, not the other way around."
        kid: "Some people need a bigger card. Marvin gets twelve superpowers."
