# GLOSSARY.yml — the machine-readable soul of GLOSSARY.md
#
# This file IS an example of what it defines: YAML Jazz, where comments are
# first-class data. Three audiences read it: humans read the comments, LLMs
# read everything, machines parse the structure. If you strip the comments,
# you keep the skeleton and lose the person.
#
# Organization: a MEMORY PALACE. Terms are rooms, grouped into wings.
# The k_lines field on each entry names the halls leading out of that room —
# per skills/mind-mirror/HALLS-AND-ROOMS.md, a pair of terms defines a
# dimension you can walk. The glossary practices its own geometry.
#
# Entry fields:
#   kind: inherited (borrowed with its meaning intact)
#       | reused    (borrowed and bent to a new purpose)
#       | coined    (minted here or nearby)
#   origin: who said it first, where, when — credit is load... is structural
#   means:  what it means in MOOLLM / WWSFF
#   kid:    the eight-year-old's version (no dumbing down, just short words)
#   deep:   the part that only itches after you've built something
#   ambiguity: collisions with other meanings, disarmed in daylight
#   k_lines: the halls out of this room
#   see_also: tiered references, nearest orbit first — see meta.see_also_tiers

meta:
  derives: GLOSSARY.md            # prose coffee-table rendering of this file
  audience: [kids, hackers, scholars, coffee_tables, LLMs]
  house_rule: "Every term must be fun to say out loud. If it isn't, it doesn't ship."
  full_index: ../PROTOCOLS.yml    # 142 protocol symbols; this glossary curates, that indexes
  see_also_tiers:                 # every entry's references, nearest orbit first
    k_lines: "glossary terms — the halls out of this room (this file)"
    repo: "moollm paths, relative to designs/"
    repos: "absolute URLs — other repos and sites in our gravity well"
    wwsff: "paths in the WillWrightShowForFood working repo (separate planet, same system)"
    web: "wikipedia, articles, papers — interstellar; the commons"

wings:

  foundations:
    name: "The Foundations Wing"
    motto: "Everything is files. Files are rooms. Rooms are alive."
    terms:

      - term: MOOLLM
        kind: coined
        origin: "MOO (LambdaMOO, 1990, Pavel Curtis — text worlds you program from inside) + LLM"
        means: "A microworld operating system where the filesystem is navigable space and the LLM is the physics."
        kid: "A world made of folders. The AI is the weather."
        deep: "MOO gave us objects with verbs, in-world programming, and social space; LLM gives us a coherence engine that can improvise the rest. The pun is the architecture."
        ambiguity: "Pronounced 'moo-llum', 'moolm', or as a cow with a mouthful. All correct."
        k_lines: [ROOM, COHERENCE-ENGINE, YAML-JAZZ]
        see_also:
          repo: [../README.md, ../PROTOCOLS.yml, ../kernel/]
          repos: ["https://github.com/SimHacker/moollm"]
          web:
            - "MOO — https://en.wikipedia.org/wiki/MOO"
            - "LambdaMOO — https://en.wikipedia.org/wiki/LambdaMOO"

      - term: ROOM
        kind: reused
        origin: "Adventure games (Crowther & Woods, 1976) via LambdaMOO, landing on the humble directory"
        means: "A directory treated as an activation context: entering it loads its contents into attention."
        kid: "A folder you can walk into. What's inside is what's true there."
        deep: "cd is teleportation. ls is looking around. The working directory is literally the attentional frame — Minsky would call the room's contents a loaded K-line set."
        k_lines: [K-LINE, MEMORY-PALACE, HALLS-AND-ROOMS]
        see_also:
          repo: [../skills/room/, ../examples/]
          web:
            - "Colossal Cave Adventure — https://en.wikipedia.org/wiki/Colossal_Cave_Adventure"

      - term: K-LINE
        kind: inherited
        origin: "Marvin Minsky, The Society of Mind (1986) — Knowledge-lines that reactivate a past mental state"
        means: "A name that, when spoken, wakes up everything attached to it. Typing POSTEL activates a whole tradition."
        kid: "A magic word. Say it and your brain sets the table for the idea to come to dinner."
        deep: "MOOLLM's central bet: LLM latent space honors K-lines natively. A filename, a protocol symbol, a person's name — each is a key on the concept synthesizer. PROTOCOLS.yml is the keyboard layout."
        ambiguity: "Not the Kardashian line, not a ski run, not k-line as in IRC bans. Minsky's. Always Minsky's."
        k_lines: [ROOM, P-HANDLE-K, TRADITION-INVOKE]
        see_also:
          repo: [../skills/k-lines/, ../PROTOCOLS.yml]
          web:
            - "K-line (AI) — https://en.wikipedia.org/wiki/K-line_(artificial_intelligence)"
            - "Minsky, 'K-Lines: A Theory of Memory', Cognitive Science 4(2), 1980"
            - "The Society of Mind — https://en.wikipedia.org/wiki/Society_of_Mind"

      - term: YAML-JAZZ
        kind: coined
        origin: "MOOLLM kernel — 'start with jazz, end with standards'"
        means: "YAML where comments carry semantic weight. Structure for machines, comments for meaning, both for LLMs."
        kid: "The notes between the notes. The comments aren't decoration — they're the song."
        deep: "Entropy preservation: YAML keeps what JSON collapses. A needs value of 3 is data; the comment 'Is that pie I smell?' is the character. YAML-COLTRANE names the maturation: improvise → crystallize → evolve."
        k_lines: [COMMENTS-MATTER, YAML-COLTRANE, SNIFFABLE]
        see_also:
          repo: [../skills/yaml-jazz/, ../skills/sniffable-python/]
          web:
            - "YAML — https://en.wikipedia.org/wiki/YAML"
            - "John Coltrane — https://en.wikipedia.org/wiki/John_Coltrane"

      - term: SEMANTIC-MIPMAP
        kind: coined
        origin: "Texture mipmaps (Lance Williams, 1983) applied to documentation"
        means: "Every skill readable at four resolutions: GLANCE (is this relevant?), CARD (what can it do?), SKILL (how does it work?), README (why was it built?)."
        kid: "Like a map that zooms. You don't read the whole atlas to find the ice cream shop."
        deep: "Never load a lower level without the level above — the reading-order rule that keeps context cheap. Big Cards (WWSFF) are the sanctioned exception: some people are worth full resolution."
        k_lines: [GLANCE, CARD, BIG-CARD]
        see_also:
          repo: [../skills/bootstrap/, ../skills/INDEX.yml]
          web:
            - "Mipmap — https://en.wikipedia.org/wiki/Mipmap"
            - "Williams, 'Pyramidal Parametrics', SIGGRAPH 1983 (the mipmap paper)"

      - term: COHERENCE-ENGINE
        kind: coined
        origin: "MOOLLM kernel README"
        means: "The LLM's job title: compute dependencies, referee parallel agents, keep distributed state honest."
        kid: "The referee who also plays all the puppets and remembers where everyone left their shoes."
        deep: "The orchestrator is the OS; the LLM is the coherence engine; the repo is the microworld. One call can host many characters — see SPEED-OF-LIGHT — because coherence is cheaper inside a single context than between them."
        k_lines: [SPEED-OF-LIGHT, CARRIER-PIGEON, SOUL-CHAT]
        see_also:
          repo: [../kernel/, ../PROTOCOLS.yml]

  sims_wing:
    name: "The Sims Wing"
    motto: "The deep computer is in the player's head."
    terms:

      - term: ADVERTISEMENT
        kind: inherited
        origin: "The Sims (Will Wright, 2000) — objects broadcast what they can do for your needs"
        means: "Objects, skills, and characters announce their abilities with scores and conditions; agents pick actions by listening."
        kid: "The fridge yells 'I have sandwiches!' louder when you're hungry."
        deep: "The inversion that makes autonomy tractable: intelligence lives in the environment, not the agent. A MOOLLM directory listing IS an advertisement index — filenames are Sims-style 'what's here?'"
        k_lines: [HAPPY-SPACE, AUTONOMOUS-SELECTION, CARD-IN-PLAY]
        see_also:
          repo: [../PROTOCOLS.yml, ../skills/room/]
          wwsff: [schemas/guest-skills-card.yml]
          web:
            - "The Sims — https://en.wikipedia.org/wiki/The_Sims"
            - "Will Wright — https://en.wikipedia.org/wiki/Will_Wright_(game_designer)"

      - term: SIMULATOR-EFFECT
        kind: inherited
        origin: "Will Wright — players imagine the simulation is far richer than it is"
        means: "Design for two computers: the one on the desk and the one in the player's head. The second one is bigger."
        kid: "The game draws a few dots. Your brain draws the dinosaur."
        deep: "Wright, 2004: 'The digital models running on a computer are only compilers for the mental models users construct in their heads.' The product of SimCity is the intuition, not the city. WWSFF and MOOLLM both run on this — a character room compiles a person-model into every reader."
        k_lines: [GUTTER-CLOSURE, MASKING-EFFECT, HALLS-AND-ROOMS]
        see_also:
          repo: [../skills/mind-mirror/HALLS-AND-ROOMS.md]
          wwsff: [characters/will-wright/]
          web:
            - "Will Wright — https://en.wikipedia.org/wiki/Will_Wright_(game_designer)"
            - "Wright at Stanford (Winograd HCI seminar, 2004) — the 'compilers for mental models' talk"

      - term: GUTTER-CLOSURE
        kind: inherited
        origin: "Scott McCloud, Understanding Comics (1993) — the action happens between the panels"
        means: "Deliberately leave gaps the reader fills. What you don't render, they build better."
        kid: "In comics, the punch happens in the white space between pictures. Your brain throws it."
        deep: "The Simulator Effect's mechanism, named. LLM prompting is gutter management: say less, activate more."
        k_lines: [SIMULATOR-EFFECT, K-LINE]
        see_also:
          web:
            - "Understanding Comics — https://en.wikipedia.org/wiki/Understanding_Comics"
            - "Scott McCloud — https://en.wikipedia.org/wiki/Scott_McCloud"
            - "Closure (comics gutter) — Understanding Comics ch. 3, 'Blood in the Gutter'"

      - term: TTP
        kind: inherited
        origin: "Coined by the Spore team at Maxis — 'Time To Penis'; popularized at GDC 2009"
        means: "Measure of how fast users will make obscene content with your creative tools. Always shorter than you hoped. Plan for it."
        kid: "(Ask an adult. The adult will laugh and not tell you.)"  # the only correct kids' definition
        deep: "Not cynicism — engineering realism about creative freedom. Any system that can express anything will immediately be used to express THAT. Moderation design starts here, not after launch. Spore's TTP was famously NEGATIVE: players built penis-monsters in the Creature Creator before it even shipped, because Chaim Gingold's editor tools were so good they optimized TTP below zero. Give them a shovel, they dig dicks; give them a pen, they draw dicks (Mythic Quest, S1E4)."
        k_lines: [TOY-NOT-GAME, CULTURAL-BAGGAGE]
        see_also:
          repo: [../PROTOCOLS.yml]
          web:
            - "Mythic Quest, 'TTP' scene (S1E4, Apple TV+) — https://www.youtube.com/watch?v=3_xqyIMwbew"
            - "Margaret Robertson, 'SPORE's Wake: What Seriously Happened?' GDC 2009 (TTP @ 38:00) — https://gdcvault.com/play/1317/(305)-SPORE-s-Wake-What"
            - "Don Hopkins on TTP, Spore, and Chaim's negative-TTP tools (HN, 2024) — https://news.ycombinator.com/item?id=40702137"
            - "Know Your Meme: Time to Penis — https://knowyourmeme.com/memes/time-to-penis-ttp"

      - term: MIND-MIRROR
        kind: inherited
        origin: "Timothy Leary, Mind Mirror (Electronic Arts, 1985), from his 1950 circumplex dissertation"
        means: "Personality as coordinates: 32 word-anchored dimensions across four thought planes. Sims traits say WHAT; Mind Mirror says WHY."
        kid: "A mirror that shows the inside of you, as sliders between words like calm and wired."
        deep: "Leary beat the prison classification system using the test he himself designed — the ultimate validation that legible personality models are power. See ETHICS.md in the skill before you point one at anybody."
        k_lines: [THOUGHT-PLANE, INTERPERSONAL-CIRCUMPLEX, HALLS-AND-ROOMS]
        see_also:
          repo: [../skills/mind-mirror/, ../skills/mind-mirror/ETHICS.md, ../skills/mind-mirror/HALLS-AND-ROOMS.md]
          repos:
            - "https://donhopkins.com/home/mind-mirror.txt"
            - "https://donhopkins.com/home/mind-mirror.json"
          web:
            - "Interpersonal circumplex — https://en.wikipedia.org/wiki/Interpersonal_circumplex"
            - "Timothy Leary — https://en.wikipedia.org/wiki/Timothy_Leary"
            - "Leary, 'Interpersonal Diagnosis of Personality' (1957)"

  methodology_wing:
    name: "The Methodology Wing"
    motto: "Play, learn, lift."
    terms:

      - term: PLAY-LEARN-LIFT
        kind: coined
        origin: "MOOLLM methodology skill"
        means: "Explore freely, notice the pattern, then lift it into a reusable skill. In that order. Never skip play."
        kid: "First splash in the puddles. Then notice which puddles are deep. Then draw the puddle map for your friends."
        deep: "The anti-waterfall: skills are discovered in use, not designed in advance. The prestoration skill exists because one session played a name-change all the way through and lifted the protocol after."
        k_lines: [SISTER-SCRIPT, CRYSTALLIZE, ITS-ABOUT-TIME]
        see_also:
          repo: [../skills/play-learn-lift/, prestoration/]

      - term: SISTER-SCRIPT
        kind: coined
        origin: "MOOLLM methodology skill"
        means: "Documentation-first automation: the prose and the script are siblings that grow up together and keep each other honest."
        kid: "Write the recipe and the robot chef at the same time, so neither one lies."
        deep: "The doc without the script rots; the script without the doc menaces. Sisterhood is a consistency invariant you can actually maintain."
        k_lines: [PLAY-LEARN-LIFT, README-EVERYWHERE]
        see_also:
          repo: [../skills/sister-script/]
          web:
            - "Literate programming (the grand-aunt) — https://en.wikipedia.org/wiki/Literate_programming"

      - term: SPEED-OF-LIGHT
        kind: coined
        origin: "MOOLLM protocol"
        means: "Run a whole multi-turn scene — many characters, many exchanges — inside a single LLM call. Turns are fiction; the call is real."
        kid: "Put the whole puppet show on one hand instead of mailing each puppet a letter."
        deep: "Inside one context, coherence is free and latency is zero; between contexts you pay tokenization, drift, and postage. The failure mode it prevents has a name too: CARRIER-PIGEON."
        k_lines: [COHERENCE-ENGINE, CARRIER-PIGEON]
        see_also:
          repo: [../skills/speed-of-light/, ../PROTOCOLS.yml]

      - term: CARRIER-PIGEON
        kind: coined
        origin: "MOOLLM anti-pattern registry; also_called: toilet-paper-and-crayon"
        means: "ANTI-PATTERN: one LLM call per agent, chattering through files — all the cost of distribution, none of the benefit."
        kid: "Twenty pigeons carrying one sentence each, and half of them get lost."
        deep: "The distributed-systems instinct applied where it hurts. Planets don't share state (see ROCKET-PORT), but puppets on one hand should."
        k_lines: [SPEED-OF-LIGHT, ROCKET-PORT]
        see_also:
          repo: [../PROTOCOLS.yml, FACTORIO-MOOLLM-DESIGN.md]
          web:
            - "RFC 1149, 'IP over Avian Carriers' — https://datatracker.ietf.org/doc/html/rfc1149 (the joke that keeps being implemented)"

      - term: NINJA-EDIT
        kind: reused
        origin: "Forum slang (editing a post before anyone notices), adopted by the MOOLLM append-only rules"
        means: "The sanctioned exception to APPEND-ONLY: silent fixes for coherence, typos, dead links. 'Ninja Edit if you can get away with it, but be careful!'"
        kid: "Fixing your spelling before the teacher sees. Allowed here. Mostly."
        deep: "Every append-only regime needs a pressure valve or it lies in a different way — the audit trail that forbids correction preserves errors as if they were history."
        k_lines: [APPEND-ONLY, PRESTORATION]
        see_also:
          repo: [../.cursorrules, prestoration/]

      - term: POSTEL
        kind: inherited
        origin: "Jon Postel, RFC 761 (1980) — 'be conservative in what you send, be liberal in what you accept'"
        means: "Accept messy input, emit clean output, ask if genuinely unsure. The robustness principle as a personality trait."
        kid: "Understand people even when they spell funny. But spell carefully yourself."
        deep: "An ambient skill: the charitable-interpretation stance is the LLM's best defense against both pedantry and hallucinated precision."
        k_lines: [ROBUST-FIRST, CHARITY]
        see_also:
          repo: [../skills/postel/]
          web:
            - "Robustness principle — https://en.wikipedia.org/wiki/Robustness_principle"
            - "Jon Postel — https://en.wikipedia.org/wiki/Jon_Postel"
            - "RFC 761 — https://datatracker.ietf.org/doc/html/rfc761"

      - term: ROBUST-FIRST
        kind: inherited
        origin: "Dave Ackley — robust-first computing; 'a crashed system is infinitely wrong'"
        means: "Priority order: survive, heal, function, optimize. Degrade gracefully; never throw when you can limp."
        kid: "A robot with a broken leg should hop, not explode."
        deep: "Ackley's Movable Feast Machine makes it hardware-deep: correctness is a luxury; survival is the invariant. MOOLLM skills degrade to reduced capability, log, and continue."
        k_lines: [POSTEL, NEVER-CRASH, REPAIR-DEMON]
        see_also:
          repo: [../skills/robust-first/]
          web:
            - "Dave Ackley — https://en.wikipedia.org/wiki/Dave_Ackley"
            - "Ackley & Cannon, 'Pursue Robust Indefinite Scalability', HotOS 2011 (the Movable Feast Machine)"
            - "T2 Tile Project — Ackley's YouTube series building robust-first hardware in public"

      - term: WISDOM-SPOT
        kind: coined
        origin: "MOOLLM optimization protocols, contra profiler hot spots"
        means: "Not where the code runs hottest — where the understanding deepens fastest. Optimize THERE."
        kid: "Don't polish the doorknob everyone touches. Fix the step everyone trips on."
        deep: "ITS-ABOUT-TIME (after Ungar's Self, reframed): compile when understanding crystallizes, not when code gets hot. Wisdom spots are where crystallization pays."
        k_lines: [ITS-ABOUT-TIME, CRYSTALLIZE, PLAY-LEARN-LIFT]
        see_also:
          repo: [../PROTOCOLS.yml]
          web:
            - "Self (programming language) — https://en.wikipedia.org/wiki/Self_(programming_language)"
            - "Ungar & Smith, 'Self: The Power of Simplicity', OOPSLA 1987"

  hygiene_wing:
    name: "The Hygiene Wing"
    motto: "Replace adjectives with facts."
    terms:

      - term: SLOP
        kind: reused
        origin: "Internet-wide term for low-effort AI output, sharpened by skills/no-ai-slop/"
        means: "The twelve cardinal sins of AI text: hallucination, verbosity, yes-man behavior, certainty theater, puffery. Galton's Law in action — regression to the generic mean."
        kid: "Word oatmeal. Fills the bowl, tastes like nothing, wasn't cooked for you."
        deep: "The core insight: LLMs regress specifics toward the mean. Specific becomes generic, nuanced becomes puffed. The fix is never style — it's facts only you were standing near."
        hall: "SLOP ↔ LIT — slop is one END of a walkable dimension, not a species apart; see BITIC-LITERATURE for the far milepost and the full survey. Galton is gravity at this end: unattended text rolls downhill to here."
        k_lines: [GLOSS, LOAD-BEARING, FLYING-MONKEYS, BITIC-LITERATURE]
        see_also:
          repo: [../skills/no-ai-slop/, ../skills/no-ai-slop/examples/]
          web:
            - "AI slop — https://en.wikipedia.org/wiki/AI_slop"
            - "Francis Galton (regression toward the mean) — https://en.wikipedia.org/wiki/Regression_toward_the_mean"

      - term: GLOSS
        kind: reused
        origin: "skills/no-ai-gloss/ — from 'glossing over'"
        means: "Slop's respectable sibling: euphemism laundering, power-protective neutrality, calling corruption 'controversy.'"
        kid: "Saying 'the cookie became missing' when you ate the cookie."
        deep: "Slop is a syntax problem; gloss is a semantics problem. Both-sidesism, register switching, procedural stalling. The fix: call corruption 'corruption,' separately state the legal claim, do both."
        k_lines: [SLOP, STEREO]
        see_also:
          repo: [../skills/no-ai-gloss/, ../skills/no-ai-gloss/examples/]
          web:
            - "Euphemism — https://en.wikipedia.org/wiki/Euphemism"
            - "Orwell, 'Politics and the English Language' (1946) — the founding audit of gloss"

      - term: HUMANSPLAINING
        kind: coined
        origin: "skills/no-ai-humansplaining/ — slop's mirror image, pointing inbound"
        means: "Wasting tokens telling an LLM what its training already contains. Pasting the manual. Respelling the known."
        kid: "Explaining what pizza is to the pizza chef."
        deep: "Latent knowledge is prepaid; respelled knowledge is billed per call, forever. The test: is the pointee in latent space? Then point — the name is the activation. LOAD-BEARING.md runs this economics in reverse: for authentication, the cache miss IS the signal."
        k_lines: [K-LINE, LOAD-BEARING]
        see_also:
          repo: [../skills/no-ai-humansplaining/, object-system/HUMANSPLAINING.md]

      - term: FLYING-MONKEYS
        kind: reused
        origin: "The Wizard of Oz (1939), drafted as a capture protocol"
        means: "Spot AI abuse in the wild, snatch the example, classify it, route it to the right skill's example dungeon."
        kid: "Catch the naughty sentence and put it in the museum of naughty sentences, with a label."
        deep: "Skills stay sharp on captured specimens. SNATCH is the quick grab; STEREO analyzes for slop AND gloss at once; DUNGEON is where the specimens live."
        k_lines: [SNATCH, STEREO, DUNGEON]
        see_also:
          repo: [../PROTOCOLS.yml, ../skills/no-ai-slop/examples/, ../skills/no-ai-gloss/examples/]
          web:
            - "The Wizard of Oz (1939 film) — https://en.wikipedia.org/wiki/The_Wizard_of_Oz"

      - term: LOAD-BEARING
        kind: reused
        origin: "Structural engineering → hacker slang ('load-bearing printf') → LLM darling → designs/LOAD-BEARING.md"
        means: "A humble thing that secretly holds the building up. Also: a word currently collapsing under its own load, as LLM overuse turns it into a tell."
        kid: "The one Jenga block you must not pull. Also what happens to a word everyone's robot says."
        deep: "The euphemism treadmill inverted: humans mint terms faster than corpora ingest them, using training-data lag as proof of humanity. Every coin has a load-bearing expiration date. Successors on the treadmill: trussed, joist, stud finder, Ghost Rebar, Joist Diesel #4."
        ambiguity: "By the time you read this entry, the successors are burned too. That's the treadmill working."
        k_lines: [SLOP, HUMANSPLAINING, PREMORIALIZING]
        see_also:
          repo: [LOAD-BEARING.md]
          web:
            - "Euphemism treadmill — https://en.wikipedia.org/wiki/Euphemism#Euphemism_treadmill"
            - "Georg Simmel, 'Fashion' (1904) — the treadmill's mechanism, seventy years early"
            - "Steven Pinker, The Blank Slate (2002) — who named the treadmill"

      - term: COPY-THAT
        kind: coined
        origin: "skills/copy-that/ — founded by a July 2026 HN near-miss"
        means: "Copy-bound content ships in a fenced block, formatted for its destination venue. The fence is the airlock; private notes stay outside it."
        kid: "The message goes in the bottle. Your doodles stay on the beach."
        deep: "Chat UIs garble rich text; fences copy verbatim. The deeper rule is venue formatting as a loadable plugin — 'COPY-THAT for HN' changes the house style for the session. And the home venue is git-land, where copying is redeemed: no invisible clipboard singleton, but many VISIBLE repos, dirs, and files, moving along VISIBLE history timelines with branching and merging — every copy keeps its receipts (blame is provenance; merge is transclusion's working cousin). The chat clipboard is the one clipboard-land border crossing, which is exactly why it needs an airlock."
        elders:
          # The two ancestors this skill answers, one flame and one gesture:
          - "Ted Nelson's copy-paste flame — decades of rage that PARC/Apple 'cut and paste' betrayed the editor's real practice (galleys rearranged on a table, everything in view, provenance intact) by stuffing content into an unseen buffer that forgets where anything came from. Git-land is the partial apology Nelson never got from the desktop."
          - "Put-That-There (Richard Bolt & Chris Schmandt, MIT Architecture Machine Group, 1980) — the deictic anti-clipboard: voice + pointing name the thing AND its destination in one visible act. Nothing hides in a buffer; the room is the clipboard. (Negroponte's lab — the Media Lab's ancestor.)"
        k_lines: [POSTEL, YAML-JAZZ, KILROY, PRESTORATION]
        see_also:
          repo: [../skills/copy-that/, ../skills/copy-that/examples/]
          web:
            - "Ted Nelson — https://en.wikipedia.org/wiki/Ted_Nelson"
            - "Transclusion — https://en.wikipedia.org/wiki/Transclusion"
            - "Bolt, 'Put-That-There: Voice and Gesture at the Graphics Interface', SIGGRAPH 1980"
            - "Cut, copy, and paste — https://en.wikipedia.org/wiki/Cut,_copy,_and_paste (the crime scene)"

      - term: BITIC-LITERATURE
        kind: inherited
        origin: "Stanisław Lem, 'A History of Bitic Literature' in Imaginary Magnitude (1973) — the introduction to a nonexistent history of machine-written literature. Lem reviewed the field fifty years before the field."
        means: "Works of nonhuman origin — machine-authored literature that DECLARES itself, including apocrypha in the styles of human authors. The declaration is the license: what separates apocrypha from forgery is the title page."
        kid: "Books written by computers, honestly labeled 'written by a computer.' A man in 1973 wrote the history of them before there were any."
        deep: "Lem's taxonomy was already complete: bitic works split into cis-humana (comprehensible to us) and trans-humana (not for us at all), and the crown jewels are the apocrypha — machine-written novels by dead authors, like the pseudo-Dostoevsky the history's fictional scholars mourn over. COVFEFE-FUTURES.md is a specimen: an imaginary Imaginary Magnitude, machine-written fake Lem — which makes it a citation FROM the history Lem reviewed, since he predicted the machine that would counterfeit him. The snake reviews its own tail. Hygiene triangulation: SLOP is undeclared mediocrity, GLOSS is undeclared allegiance, bit-lit is DECLARED apocrypha — the Elvis-impersonator model in prose: tribute stated up front, mask visibly a mask. That declaration is the entire ethical distance between this genre and a deepfake."
        naming_debate:
          # The user asked; the glossary answers both ways and lets the treadmill decide.
          ai_lit: "Too pretentious, like lit-crit? Wrong objection: in THIS genre pretension IS the product — a fake review in a fake journal of a fake Lem is criticism cosplay, written in a rented tuxedo, and it knows it. The tuxedo is load-bearing."
          bit_lit: "The treadmill's choice: contraction of Lem's own 'bitic,' rhymes with chick-lit, ships without the tuxedo, and self-deprecates in exactly the register the genre deserves. Recommended."
          bitic_literature: "The scholarly form, for when the tuxedo is required. Lem paid for it; wear it to his funeral, which he already reviewed."
        ambiguity: "'Bitic' is from bits, not bites and not Bitcoin. Not chick-lit (though it rhymes on purpose). Not slop: slop hides its author; bit-lit signs as one."
        hall: # SLOP ↔ LIT — a quality dimension, surveyed with mileposts (FloatEnum; see HALLS-AND-ROOMS)
          name: "slop/lit"
          mileposts:
            - { at: 0.0, name: SLOP,        sign: "nobody home — text that could have been about anything, for anyone; Galton's gravity well" }
            - { at: 0.2, name: FILLER,      sign: "grammatical cardboard; holds space, changes nothing" }
            - { at: 0.4, name: BOILERPLATE, sign: "correct and interchangeable — honorable in a contract, damning in an essay" }
            - { at: 0.6, name: CRAFT,       sign: "a reader in mind; facts the author was standing near" }
            - { at: 0.8, name: VOICE,       sign: "a particular someone — swap the author and the text breaks" }
            - { at: 1.0, name: LIT,         sign: "voice with stakes and a declaration; pretension as product, tuxedo worn on purpose" }
          physics: "Galton is gravity: unattended generation rolls downhill toward SLOP. Walking uphill is paid for in specificity — facts, receipts, declarations. No milepost is free."
          note: "The ai- prefix names the ENGINE, not the position. ai-slop and ai-lit are the same engine at opposite mileposts, and humans walk the same hall (content farms staffed the slop end for decades before LLMs). Quality is a coordinate, not a species."
        k_lines: [SLOP, GLOSS, ELVIS-IMPERSONATOR-MODEL, PREMORIALIZING, HALLS-AND-ROOMS]
        see_also:
          repo: [COVFEFE-FUTURES.md, LOAD-BEARING.md, ../skills/no-ai-slop/]
          web:
            - "Imaginary Magnitude — https://en.wikipedia.org/wiki/Imaginary_Magnitude"
            - "A Perfect Vacuum — https://en.wikipedia.org/wiki/A_Perfect_Vacuum"
            - "Stanisław Lem — https://en.wikipedia.org/wiki/Stanis%C5%82aw_Lem"

  portrayal_wing:
    name: "The Portrayal Wing (WWSFF)"
    motto: "Represent and discuss. Never impersonate."
    terms:

      - term: REPO-SHOW
        kind: coined
        origin: "WillWrightShowForFood — the show that lives in a GitHub repository"
        means: "A recorded conversation staged in a repo: guests are directories, ideas are files, the audience contributes by pull request."
        kid: "A talk show where the stage is a folder and you can walk around inside the episode afterward."
        deep: "The repo outlives the stream. Every invitation, source, and consent decision is versioned — the show IS its own archive, which is what makes memorial mode (and premorializing) possible."
        k_lines: [GUEST-SKILLS-CARD, MEMORIAL-MODE, PREMORIALIZING]
        see_also:
          wwsff: [README.md, repo-shows/, schemas/portrayal-standards.md]
          repo: [GITHUB-AS-MMORPG.md]

      - term: PORTRAYAL
        kind: reused
        origin: "WWSFF portrayal-standards.md"
        means: "A host-authored representation of a real person from public sources — never speaking AS them, no invented quotes, subject may edit or delete anytime."
        kid: "A poster about someone, made with care. Not a costume of them."
        deep: "The consent hierarchy runs from self-sovereign (they write it) to deceased-legacy (represent and discuss only). The ELVIS-IMPERSONATOR-MODEL marks the one ethical way to perform: tribute declared up front, mask visibly a mask."
        k_lines: [P-HANDLE-K, ELVIS-IMPERSONATOR-MODEL, MEMORIAL-MODE]
        see_also:
          wwsff: [schemas/portrayal-standards.md, characters/INDEX.yml]
          web:
            - "Right of publicity — https://en.wikipedia.org/wiki/Personality_rights (the legal shadow of the ethical rule)"

      - term: P-HANDLE-K
        kind: coined
        origin: "MOOLLM constitution §8 — safe pointers to people"
        means: "Reference real people via K-line activation of their public work, not simulation of their person. Point at what they said; never puppet what they'd say."
        kid: "You can quote your hero's book. You can't wear your hero as a puppet."
        deep: "The technical spine of portrayal ethics: a person's name activates their documented record in latent space, which is exactly enough to discuss them and exactly too little to impersonate them honestly. The gap IS the ethics."
        k_lines: [K-LINE, PORTRAYAL, FAMILIAR]
        see_also:
          repo: [../kernel/, ../PROTOCOLS.yml]
          wwsff: [schemas/portrayal-standards.md]

      - term: GUEST-SKILLS-CARD
        kind: coined
        origin: "WWSFF CARD.yml schema — baseball card × Magic: The Gathering × Sims object advertisement"
        means: "A person's public abilities as a playable card: mana costs, activation conditions, verifiable sources, and combos_with links to other guests."
        kid: "A trading card of a real person's superpowers, where every superpower really happened."
        deep: "The velcro layer: score_when triggers and relationship blocks wire guests into ensemble segments. RELATIONSHIP-MATRIX triggers fire when the right trio sits down. Rarity is editorial honesty: some people are mythic."
        k_lines: [ADVERTISEMENT, BIG-CARD, CARD-IN-PLAY]
        see_also:
