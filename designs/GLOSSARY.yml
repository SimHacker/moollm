  logistics_wing:
    name: "The Logistics Wing"
    motto: "The factory must grow. Then it must launch."
    terms:

      - term: LOGISTIC-CONTAINER
        kind: inherited
        origin: "Factorio (Wube Software) — provider/requester/storage/buffer chests"
        means: "Storage that participates in flow: items move automatically from providers to requesters under declared rules."
        kid: "A yellow box says 'take my stuff if you need it.' A blue box says 'bring me stuff.' The robots figure out the rest."
        deep: "Dataflow programming in disguise, and massively overrepresented in training data — say 'buffer chest' and the LLM activates throughput reasoning it already owns. That overrepresentation is a feature: metaphors the model knows are free."
        k_lines: [DATA-FLOW, INBOX, ROCKET-PORT]
        see_also:
          repo: [../skills/logistic-container/, FACTORIO-MOOLLM-DESIGN.md]
          web:
            - "Factorio — https://en.wikipedia.org/wiki/Factorio"
            - "Logistic network — https://wiki.factorio.com/Logistic_network"
            - "Dataflow programming — https://en.wikipedia.org/wiki/Dataflow_programming"

      - term: ROCKET-PORT
        kind: coined
        origin: "designs/FACTORIO-MOOLLM-DESIGN.md, Dyson Sphere Program tier"
        means: "A repo's boundary manifest: what it demands (dependencies), supplies (published artifacts), and who may dock. Planets = repos; same-star planets = nearby servers; other stars = anywhere on Earth."
        kid: "Every folder-planet has a spaceport with rules: what comes in, what goes out, who's allowed to land."
        deep: "The DSP insight: planets don't share state, they trade artifacts under declared contracts. Nobody runs a belt between stars; nobody should mount another org's filesystem. Warpers = auth tokens, spent at the boundary."
        k_lines: [LOGISTIC-CONTAINER, CARRIER-PIGEON]
        see_also:
          repo: [FACTORIO-MOOLLM-DESIGN.md, GITHUB-AS-MMORPG.md]
          web:
            - "Dyson Sphere Program — https://en.wikipedia.org/wiki/Dyson_Sphere_Program"
            - "Dyson sphere — https://en.wikipedia.org/wiki/Dyson_sphere"
            - "Powers of Ten (Eames, 1977) — https://en.wikipedia.org/wiki/Powers_of_Ten_(film) (the recursive orbit stack, filmed)"

      - term: KILROY
        kind: reused
        origin: "WWII graffiti ('Kilroy was here') as logistics tracer"
        means: "The visible trace that someone was here — breadcrumbs for delivery flow and delegation audits."
        kid: "A little cartoon nose peeking over the wall that says: someone already came this way."
        deep: "Dispatch needs provenance; the cheapest provenance is a signed footprint at every hop."
        k_lines: [AUDIT-TRAIL, DATA-FLOW]
        see_also:
          repo: [../PROTOCOLS.yml]
          web:
            - "Kilroy was here — https://en.wikipedia.org/wiki/Kilroy_was_here"

      - term: ULTIMATE-MACHINE
        kind: inherited
        origin: "Marvin Minsky (1952), built by Claude Shannon at Bell Labs — the box whose only function is to switch itself off"
        means: "WWSFF's fictional bot mascot (characters/robots/ultimate-machine): the gong that ends the stream. Never speaks as Marvin; just reaches out and flips the switch."
        kid: "A box with one switch. Turn it on, a little hand comes out and turns it off. That's the whole machine. It ends the show."
        deep: "The perfect mascot for a show about knowing when to stop — and a memorial joke Marvin built himself: the machine's entire personality is refusal. Arthur C. Clarke found it 'unspeakably sinister.' We find it punctual. It is also, deliberately, the last room in this palace: a box whose only skill is knowing when to stop is the correct final entry for a glossary — and per the dog file-sniffing protocol (skills/dog: dogs sniff the ends of files; the rear is where intimacy lives), it emits a signal there. Sniff the EOF."
        k_lines: [MEMORIAL-MODE, REPO-SHOW]
        see_also:
          repo: ["../skills/dog/ — file-ending culture: dogs sniff EOFs and mark territory; the Ultimate Machine IS an EOF"]
          wwsff: [characters/robots/ultimate-machine/, characters/marvin-minsky/]
          web:
