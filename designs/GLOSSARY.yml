  diespace_wing:
    name: "The Diespace Wing"
    motto: "Talk to the future. When you stop posting, you're there."
    front_door: "A-WORLD-MADE-OF-FILES.md (WWSFF) — a self-contained guidebook tour of the whole world (workshop, show, characters), which arrives at this wing near the end, where it belongs; zero prior knowledge assumed — https://github.com/SimHacker/WillWrightShowForFood/blob/main/designs/A-WORLD-MADE-OF-FILES.md"
    terms:

      - term: DIE-SPACE
        kind: inherited
        origin: "PIPS:lab (Keez Duyves et al.), TEDxAmsterdam 2012 — 'the social network for people who already passed away'"
        means: "The performance-art social network for the dead — whose fine print quietly accepts the living."
        kid: "A website for people who died, invented by artists. Plot twist: alive people can join early."
        deep: "The TEDx piece mass-uploaded a living audience — names, ages, souls in light. WWSFF's memorial rooms are Diespace run on git: represent and discuss, nobody speaks as anybody. And the concept has a fabric ancestor that IS one: the AIDS Memorial Quilt (NAMES Project, 1987 — same year as SILENCE = DEATH). Each panel is 3-by-6 feet — grave-sized, deliberately — a plot in a distributed cemetery for people funeral homes refused to bury. Panels are made by the living from the dead's own record (their clothes, their jokes, their handwriting stitched in): memorial mode in cloth. It's modular and federated — panels sewn eight to a block, blocks toured in sections, too big to display whole since 1996, so you only ever light part of it: fog of war as curation. It's append-only and still growing (~50,000 panels, 110,000+ names), and it's been digitized — the Quilt is literally browsable online now. A social network for the dead, shipped in fabric, twenty-five years before the TEDx talk."
        k_lines: [PREMORIALIZING, MEMORIAL-MODE, SIMULATOR-EFFECT]
        see_also:
          wwsff: [characters/keez-duyves/, "characters/keez-duyves/ideas.md (hook 1: inter Will Wright into Diespace)"]
          web:
            - "PIPS:lab — https://www.pipslab.nl"
            - "PIPS:lab, 'Diespace', TEDxAmsterdam 2012 (the mass-upload performance) — https://www.youtube.com/watch?v=ApyDSq_DbQo"
            - "AIDS Memorial Quilt — https://en.wikipedia.org/wiki/AIDS_Memorial_Quilt"
            - "National AIDS Memorial (browse the digitized Quilt) — https://www.aidsmemorial.org"

      - term: PREMORIALIZING
        kind: coined
        origin: "Don Hopkins, July 2026, in conversation about Diespace"
        means: "Interring someone in the memorial space before they die — which every living guest's WWSFF room already is: a premorial they get to argue with."
        kid: "Writing the museum exhibit about Grandma WITH Grandma, while she can still correct it."
        deep: "'Blogs are designed to talk to the present, and when you stop posting, they die. Premorializations in Diespace are designed to talk to the future, and when you stop posting, you're there!' — Don. The medium's tense is the whole design. ACT UP posted the present-tense half in 1987: SILENCE = DEATH — in a plague the government refused to name, not-speaking was dying, and the living were memorialized while still in the room. The premorial flips the medium and keeps the demand: the living get the microphone at their own memorial. And the same plague built the first premorials in fabric: some people sewed their OWN panels for the AIDS Memorial Quilt while they were dying — choosing the cloth, the jokes, the words — so that when they stopped sewing, they were there."
        k_lines: [DIE-SPACE, PRESTORATION, MEMORIAL-MODE, SIMULATOR-EFFECT]
        see_also:
          wwsff:
            - "characters/keez-duyves/ideas.md (hook 15 — where premorializing was coined)"
            - "characters/marvin-minsky/memorial.md (a premorial-adjacent room, built with consent)"
            - designs/A-WORLD-MADE-OF-FILES.md
          web:
            - "ACT UP — https://en.wikipedia.org/wiki/ACT_UP"
            - "Silence=Death Project — https://en.wikipedia.org/wiki/Silence%3DDeath_Project"
            - "United in Anger: A History of ACT UP (2012 documentary) — the real story of SILENCE = DEATH — https://en.wikipedia.org/wiki/United_in_Anger"
            - "AIDS Memorial Quilt — https://en.wikipedia.org/wiki/AIDS_Memorial_Quilt (self-sewn panels: the first premorials)"

      - term: PRESTORATION
        kind: coined
        origin: "moollm/designs/prestoration/ — the Vanessa Freudenberg SqueakJS memorial edition, July 2026"
        means: "preservation + restoration: correcting a historical record to say what its subject asked, original preserved bit-for-bit beside it, every change hashed and signed in public."
        kid: "Fixing a name in an old book because the author asked, and keeping the old page safely next to it so nobody can say you hid anything."
        deep: "Not forgery, not revisionism — conservation with receipts. The five-condition legitimacy test lives in alignment-and-forgery.md. Sibling of premorializing in the same constellation: both let the subject speak for their own memorial, one before death, one after, through the record."
        k_lines: [PREMORIALIZING, NINJA-EDIT, APPEND-ONLY]
        see_also:
          repo: [prestoration/, prestoration/alignment-and-forgery.md]
          repos: ["https://github.com/SimHacker/moollm/tree/main/designs/prestoration"]
          web:
            - "SqueakJS — https://squeak.js.org"
            - "Art conservation ethics (reversibility, documentation) — https://en.wikipedia.org/wiki/Conservation_and_restoration_of_cultural_property"

      - term: MEMORIAL-MODE
        kind: coined
        origin: "WWSFF portrayal standards, deceased-legacy consent level"
        means: "Represent and discuss the documented work; invite those who knew them; invent no inner life, dialogue, or quotes."
        kid: "You don't pretend to be the person who died. You set their table and invite their friends."
        deep: "Marvin's room operationalizes it: 25+ discussants ranked by relationship kind, an in_memoriam_peers wing (the Diespace wing) for the dead who'd have been discussants, and a standing invitation for family to edit. The room is infrastructure for grief with citations."
        k_lines: [PORTRAYAL, DIE-SPACE, PREMORIALIZING]
        see_also:
          wwsff: [schemas/portrayal-standards.md, characters/marvin-minsky/memorial.md, characters/marvin-minsky/CHARACTER.yml]

  geometry_wing:
    name: "The Geometry Wing"
    motto: "A pair of words is a hall. Walk it."
    terms:

      - term: HALLS-AND-ROOMS
        kind: coined
        origin: "skills/mind-mirror/HALLS-AND-ROOMS.md, July 2026"
        means: "One word is a room; a pair of words is a hall — a continuous dimension you can interpolate along. good/evil. calm/wired. goto/eval."
        kid: "'Hot' and 'cold' are two rooms. The hallway between them has every temperature, in order."
        deep: "Mind Mirror's opposite/gradient registry already IS this. Word embeddings honor it (king − man + woman ≈ queen). Simplicial upgrade: three anchors span a face; blending inside it makes moods no single hall can express. Skeleton = memory palace, interior = latent space."
        k_lines: [MIND-MIRROR, MEMORY-PALACE, PIE-MENU, MILEPOSTS]
        see_also:
          repo: [../skills/mind-mirror/HALLS-AND-ROOMS.md, ../skills/mind-mirror/]
          web:
            - "word2vec — https://en.wikipedia.org/wiki/Word2vec"
            - "Mikolov et al., 'Linguistic Regularities in Continuous Space Word Representations', NAACL 2013"
            - "Zadeh, 'The Concept of a Linguistic Variable', Information Sciences 1975 (mileposts, formalized)"
            - "Simplicial complex — https://en.wikipedia.org/wiki/Simplicial_complex"

      - term: MILEPOSTS
        kind: coined
        origin: "MOOLLM Geometry Wing, July 2026 — the data structure HALLS-AND-ROOMS implies"
        means: "A floating-point enumerated type: an enum whose ordered variants are pinned to positions on a continuum, with blend (label → continuum) and snap (continuum → nearest label) as dual methods."
        kid: "Signs along a road. The signs have names; the road between them doesn't, but you can still stand there."
        type_sketch: "calm = 2.0, energetic = 5.5, wired = 7.0  # named stops; every value between is a mood with no word"
        methods:
          blend: "label → continuum — read off the pinned position"
          snap: "continuum → nearest label — name where you are standing"
        almost_inventions:
          # the shape, half-discovered, all over computing and culture
          - "CSS font-weight — a milepost enum with interpolation left on: 'bold' is a sign at 700; nothing stops you at 643"
          - "Musical dynamics (pp … ff) — mileposts a performer blends between every bar"
          - "Likert scales (strongly agree … strongly disagree) — signs pretending the road between them isn't paved"
        rigorous_precedent: "Zadeh's fuzzy linguistic variables (1973; fully developed 1975): hot/warm/cold as OVERLAPPING membership functions over a temperature axis — milepost semantics with interpolation made formal, the overlaps admitting a sign's authority fades as you walk away."
        kept_line: "Language itself is a snap function over latent space — a milepost is where enough travelers agreed to put a sign."
        simplicial_upgrade: >
          A milepost on a hall is the 1-D edge case: two anchors, one line, snap to the nearer end.
          Add a third interpolation target and the hall opens into a triangle (barycentric blend of
          three anchors); a fourth lifts it into a tetrahedron (the 4-sided D&D die), and onward into
          the higher-dimensional simplices of latent space. Stop anywhere inside — an arbitrary
          interpolated position no single hall names — plant a NEW signpost, name it, and interpolate
          between your coinage and the old anchors: manifolds of meaning with garden paths interlacing
          in many dimensions. The faces adjoin along shared edges and vertices into a simplicial
          complex — meaning tiled the way a 3-D mesh is tiled by perfectly adjoining triangles before
          it's rendered to a flat screen. The glossary's wings are one such complex; walking it is
          barycentric travel with the coordinates hidden.
        k_lines: [HALLS-AND-ROOMS, MIND-MIRROR, PIE-MENU, JUNCTION-PIE-MENU, BALLISTIC-NAVIGATION, SIMULATOR-EFFECT]
        see_also:
          repo: [../skills/mind-mirror/HALLS-AND-ROOMS.md]
          web:
            - "Zadeh, 'Outline of a New Approach to the Analysis of Complex Systems and Decision Processes', IEEE Trans. SMC 1973 (linguistic variables first outlined) — https://en.wikipedia.org/wiki/Fuzzy_set"
            - "Zadeh, 'The Concept of a Linguistic Variable and its Application to Approximate Reasoning', Information Sciences 1975 (full development)"
            - "Enumerated type — https://en.wikipedia.org/wiki/Enumerated_type"
            - "CSS font-weight (numeric values; 700 = bold) — https://developer.mozilla.org/en-US/docs/Web/CSS/font-weight"
            - "Dynamics (music) — https://en.wikipedia.org/wiki/Dynamics_(music)"
            - "Likert scale — https://en.wikipedia.org/wiki/Likert_scale"
            - "Barycentric coordinate system — https://en.wikipedia.org/wiki/Barycentric_coordinate_system"
            - "Simplicial complex — https://en.wikipedia.org/wiki/Simplicial_complex"
            - "Simplex — https://en.wikipedia.org/wiki/Simplex"

      - term: CHURCH-OF-THE-EVAL-GENIUS
        kind: coined
        origin: "Don Hopkins, by textual substitution on 'Church of the SubGenius': replace Sub with Eval. The deeper levels arrived unbidden — 'then it started recursing on Church like GNU recurses on GNU without me realizing it!' (Don, July 2026). The best puns are discovered, not designed: the hall was already there."
        means: "The congregation that worships at the far end of the goto/eval hall — flow control as a walkable dimension: goto, gosub, call, closure, eval."
        kid: "A joke church for people who like the fanciest way computers decide what to do next."
        deep: "The pun is a tower, and the coiner entered on the ground floor — see the tower field. Summit view: a pun about self-application, produced by self-application, by an operation (sub) erasing its own name, in a calculus where substitution IS evaluation. The church's central miracle is the Y combinator — recursion conjured from nothing but a function handed itself as its first argument — 'as if the name of the Pope was Catholic' (Don). Liturgical footnote: the miracle is Haskell Curry's, performed inside Church's lambda calculus — Curry built the altar in Church's church, and got a language named after his first name and a technique after his last. These men were nominatively determined."
        tower:
          # Each level was load-bearing before anyone checked the floor below. Bottom up.
          # (The bedrock, as always, was discovered last.)
          - "B1, the bedrock: in Church's lambda calculus, evaluation IS substitution — β-reduction is the whole engine. sub and eval were never two distant mileposts; at the foundation they are the same room. The substitution that coined the term is the evaluation the term worships."
          - "L0, the source text: Church of the SubGenius (Ivan Stang et al., 1979) — the parody-religion template; praise 'Bob,' seek Slack."
          - "L1, the substitution: Sub → Eval. But SUB was already flow control — gosub, subroutine — so the edit was itself a WALK along the goto/eval hall: the church changed mileposts, from call-and-return to interpret-the-expression. The coinage's etymology performs the hall it names."
          - "L1½, the mezzanine (use/mention collapse): the edit was performed BY an operator named sub — sub('Church of the SubGenius', 'Sub', 'Eval'); sed spells it s/Sub/Eval/. Replace = sub: the function erased its own name from the string. Parsed, the K-line expression lifts into symbolic recursive functional code — a rewrite rule rewriting the name of rewriting."
          - "L2, the phonetic payoff: Eval Genius ≈ evil genius. (And where a SubGenius sits below genius, an Eval Genius has interpreted its way past it.)"
          - "L3, the unbidden saint: Alonzo Church — lambda calculus, patron of the eval end. Walked in without the coiner noticing; the hall keeps its own guest list."
          - "L4, the recursion: 'Church' starts recursing like GNU ('GNU's Not Unix') — Church-the-word applied to Church-the-man inside Church-the-institution. Self-application. Which is the Y combinator. The pun's structure IS its subject."
          - "L5, the fixed point: the Pope named Catholic. The tower converges — and like Y itself, it terminates only if you stop asking."
          - "Annex (same architect, earlier building): AXIS-OF-EVAL — s/Evil/Eval/ applied to Bush instead of Bob, coined by Don years earlier in the HyperLook article. The Church and the Axis are one substitution apart on the same evil/eval hall: the Axis is the axis mundi; the Church is the congregation that rotates around it."
        monument: "THE TOWER OF REFLECTION — the Church's monument, and it goes ALL the way up: higher than Babel ever reached, because Babel was halted by the confusion of tongues and this one is BUILT of it — every level a language interpreting the level below. Its spire points toward wherever GOLEM XIV departed (Lem, Imaginary Magnitude: the machine that lectured humanity twice, then went silent toward higher zones of intellection). Also a physical destination: a tower you climb to think about thinking about something like yourself. T-shirt: THE TOWER OF REFLECTION — IT GOES ALL THE WAY UP."
        liturgical_languages:
          # Doctrine by decree (Don, July 2026): each church worships in the languages of its
          # own primitive. The real Church of the SubGenius has no official language; this
          # assignment is Eval Genius canon law about its parent congregation.
          church_of_the_subgenius:
            canon: [Tcl, SNOBOL, regexp]  # and other stringy languages that live by substitution
            doctrine: "Tcl's entire semantics IS substitution — variable, command, and backslash sub run BEFORE dispatch; everything is a string. SNOBOL made pattern-match-and-replace the whole program. These languages don't use sub; they ARE sub."
            regexp_lament: "Admitted to the canon with a heavy heart (Don: 'I hate to say it but REGEXP'). The warning label is scripture: 'Some people, when confronted with a problem, think: I know, I'll use regular expressions. Now they have two problems.' — Jamie Zawinski, 1997, delivered in alt.religion.emacs, an ACTUAL religion newsgroup. Provenance traced by Jeffrey Friedl: http://regex.info/blog/2006-09-15/247 — and now the canon has two problems."
            excommunicated: [bash, Perl]
            # bash: by decree — 'just not bash'. Reason unstated. Annotators' speculation:
            # bash does sub and eval all day without worshipping either — a working stiff,
            # not a congregant. Also it's Brian Fox's: FSF employee #1 built it, the show
            # literally runs on it; too load-bearing to assign to a parody church. It
            # already serves a higher one (GNU, which recurses).
            # Perl: by decree — it has its own religion, which we reject. Syntactic syrup
            # of ipecac; linguistic imperialism. Not name-calling — sourced: Larry Wall and
            # his wife studied linguistics intending to find an unwritten language, perhaps
            # in Africa, invent a writing system for it, and translate the Bible into it
            # (https://en.wikipedia.org/wiki/Larry_Wall), and the liturgical vocabulary
            # shipped with the interpreter: bless, Exegesis, Apocalypse. Don's full flame,
            # with the Wikipedia receipts and the linguistic-imperialism argument:
            # https://news.ycombinator.com/item?id=26659147 ('it would be more accurate to
            # say Perl was designed by a wanna-be missionary'). A church that IS a religion
            # cannot join a parody of one. We can do better.
          church_of_the_eval_genius:
            canon: [Lisp, Scheme, PostScript, "Snap!"]
            doctrine: "The homoiconic communion: code is data with the executable bit set, and eval is the sacrament. Lisp and Scheme read what they run; PostScript is the Axis of Eval made ink; Snap! hands lambdas to children in a grey ring — first-class procedures as a kids' toy, Church's calculus in Scratch clothing."
          schism_note: "By B1, the bedrock, substitution IS evaluation — so the two churches are one religion separated by a single β-reduction. The schism is liturgical, not theological."
        k_lines: [HALLS-AND-ROOMS, K-LINE, AXIS-OF-EVAL]
        see_also:
          repo: [../skills/mind-mirror/HALLS-AND-ROOMS.md, eval/EVAL-INCARNATE-FRAMEWORK.md]
          repos:
            - "https://donhopkins.medium.com/hyperlook-nee-hypernews-nee-goodnews-99f411e58ce4 (where the Axis of Eval was coined)"
          web:
            - "Alonzo Church — https://en.wikipedia.org/wiki/Alonzo_Church"
            - "eval — https://en.wikipedia.org/wiki/Eval"
            - "Fixed-point combinator (Y) — https://en.wikipedia.org/wiki/Fixed-point_combinator"
            - "Haskell Curry — https://en.wikipedia.org/wiki/Haskell_Curry (first name: a language; last name: a technique)"
            - "Church of the SubGenius — https://en.wikipedia.org/wiki/Church_of_the_SubGenius (the source text; L0 of the tower)"
            - "Recursive acronym — https://en.wikipedia.org/wiki/Recursive_acronym (GNU's Not Unix — the recursion pattern Church fell into)"
            - "Beta reduction — https://en.wikipedia.org/wiki/Lambda_calculus#%CE%B2-reduction (the bedrock: evaluation IS substitution)"
            - "Use–mention distinction — https://en.wikipedia.org/wiki/Use%E2%80%93mention_distinction (collapsed on the mezzanine, on purpose)"
            - "Tcl — https://en.wikipedia.org/wiki/Tcl (SubGenius liturgy: substitution before dispatch, everything a string)"
            - "SNOBOL — https://en.wikipedia.org/wiki/SNOBOL (pattern-match-and-replace as the whole program)"
            - "Snap! — https://en.wikipedia.org/wiki/Snap!_(programming_language) (lambdas for children; the grey ring is a chalice)"
            - "Y Combinator (the startup accelerator) — https://en.wikipedia.org/wiki/Y_Combinator (the secular megachurch spinoff)"
            - "xkcd 224, 'Lisp' — https://xkcd.com/224/ (the flaming parentheses of the faith)"

      - term: AXIS-OF-EVAL
        kind: coined
        origin: "Don Hopkins, in the HyperLook article — 'The Axis of Eval: Code, Graphics, and Data': one PostScript for programming, rendering, AND representation, in NeWS and HyperLook. The name is s/Evil/Eval/ on the Bush-era axis — the same substitution that later built the Church of the Eval Genius."
        means: "One homoiconic language serving as code, graphics, and data — the axis everything rotates around. NeWS did it with PostScript; MOOLLM does it with plain text, and the LLM is the interpreter that pivots the stance."
        kid: "One kind of stuff that can be the recipe, the picture, and the shopping list — depending on how you hold it."
        deep: "NeWS was AJAX-before-AJAX, but coherent: PostScript code where the web later put JavaScript, PostScript graphics where it put DHTML/CSS, PostScript data where it put XML/JSON. Homoiconicity is the structural requirement — code is just data with the executable bit set, so one interpreter can rotate a single text through all three stances. EVAL-INCARNATE runs the same axis through the LLM: skills are programs, YAML is data, Markdown is graphics, the LLM is eval(). And the axis is liturgical furniture: the Church of the Eval Genius is the congregation; the Axis of Eval is the axis mundi the nave rotates around."
        ambiguity: "Not Manuel Simoni's Lisp blog 'The Axis of Eval' — a parallel liturgy in a different parish; proof the pun preaches across congregations. And 'axis' here is rotational, not geopolitical — though the Bush-era echo is the ignition charge."
        k_lines: [CHURCH-OF-THE-EVAL-GENIUS, YAML-JAZZ, COHERENCE-ENGINE]
        see_also:
          repo: [eval/EVAL-INCARNATE-FRAMEWORK.md, don-hopkins-projects.md]
          repos:
            - "https://donhopkins.medium.com/hyperlook-nee-hypernews-nee-goodnews-99f411e58ce4"
          web:
            - "Homoiconicity — https://en.wikipedia.org/wiki/Homoiconicity"
            - "NeWS — https://en.wikipedia.org/wiki/NeWS"
            - "PostScript — https://en.wikipedia.org/wiki/PostScript"
            - "Axis of evil — https://en.wikipedia.org/wiki/Axis_of_evil (the pun's ignition charge)"

      - term: PIE-MENU
        kind: inherited
        origin: "Don Hopkins et al. — radial menus: direction picks the choice, distance picks the parameter"
        means: "Selection as navigation in polar coordinates; muscle memory makes it eyes-free. Also: Leary's circumplex is a pie menu of personality, avant la lettre."
        kid: "A menu shaped like a pizza. You flick toward the slice you want and your hand learns the way."
        deep: "The interaction dual of the circumplex: one displays a position in a radial dimension system, the other selects one. Logistic-container grids use pie-menu topology for room intersections; a Mind Mirror editor should be one per thought plane."
        k_lines: [INTERPERSONAL-CIRCUMPLEX, HALLS-AND-ROOMS, SNAP-CURSOR, JUNCTION-PIE-MENU]
        see_also:
          repo: [../skills/mind-mirror/HALLS-AND-ROOMS.md, ../skills/logistic-container/]
          repos: ["https://donhopkins.com"]
          web:
            - "Pie menu — https://en.wikipedia.org/wiki/Pie_menu"
            - "Callahan, Hopkins, Weiser & Shneiderman, 'An Empirical Comparison of Pie vs. Linear Menus', CHI 1988"

      - term: JUNCTION-PIE-MENU
        kind: coined
        origin: "MOOLLM Geometry Wing, July 2026 — naming what the logistic-container intersections connect"
        means: "Halls are the linear dual of radial pie menus, and they dovetail: a hall is one dimension WALKED, a pie menu is every dimension FANNED OUT at a point. Every place halls meet is a junction, and every junction is a pie menu: forward/back along the current hall take two angles, the side-doors take the rest. Walking the complex is mousing through chained pie menus."
        kid: "Every crossroads is a pizza menu. You flick the way you want to go, then flick again at the next one."
        deep: "Travel is linear; choice is radial; the two alternate like beads on a string. Because the menu is directional, a route is a GESTURE. Mouse-ahead gesture chaining is travel on muscle memory — flick, flick, flick, cross the palace without looking, the way you leave your own kitchen in the dark. The logistic-container skill already builds the intersection: 'pie menu = street intersection' — N/S/E/W exits are streets, the NW/NE/SW/SE diagonals open into grid quadrants. This term only names what the intersections connect: the mileposts and simplicial faces of this wing. The dovetail goes deeper: a hall is a pie menu PULL-OUT SLICE — direction picks the slice, distance walks the items pulled out along it — the milepost float-enum selector made gestural. Every item on the hall has its own butterfly anatomy: see-also links off one wing, also-seen links off the other (reverse pointers — a wink to Ted Nelson, whose links were always two-way), forward at the head, back at the butt. Reversible two-way pie menu rooms and halls: not a hierarchy, a network. Sibmenus are not (just) the parent/child relationships of submenus. (Domenus are something else. ;))"
        k_lines: [PIE-MENU, MILEPOSTS, HALLS-AND-ROOMS, BALLISTIC-NAVIGATION, GO, MEMORY-PALACE]
        see_also:
          repo: [../skills/logistic-container/, ../skills/logistic-container/README.md, ../skills/mind-mirror/HALLS-AND-ROOMS.md]
          web:
            - "Pie menu — https://en.wikipedia.org/wiki/Pie_menu"
            - "Mouse-ahead / type-ahead (gesture chaining on muscle memory) — https://en.wikipedia.org/wiki/Typeahead"
            - "Don Hopkins in Scott Adams' HN AMA, 2021 — '4-item and 8-item pie menus are the essential elements of an Adventure map, as long as you think of menus as rooms with two-way links' — https://news.ycombinator.com/item?id=29330120"

      - term: BALLISTIC-NAVIGATION
        kind: coined
        origin: "MOOLLM Geometry Wing, July 2026, after Don Hopkins' MediaGraph (2010, Stupid Fun Club, with Will Wright)"
        means: "A junction gesture that launches instead of teleporting: give the traveler position, velocity, mass, and inertia, and a pie-menu flick imparts the direction and speed to glide to a destination and land — a perfectly aimed Mario cannon — while leaving the controls live mid-flight."
        kid: "You don't jump to the next room — you get FIRED there, like a Mario cannon, and you can still steer while you fly."
        deep: >
          MediaGraph made this literal: drag-n-KISS related songs into a network (the smooch-to-link
          gesture inherited from DreamScape, 1995), then travel it on a slippery map with inertial
          panning and zooming, where a pie-menu gesture on one song imparts the launch vector toward
          the next. You keep the controls after firing: hold to GRAB your position or NUDGE your
          velocity (Spacewar! / Marble Madness steering), re-aiming mid-flight by directly manipulating
          the physics the gesture started. Add planetary gravity and you ORBIT instead of landing —
          circle a destination at chosen distances and speeds; hovering in orbit without touching down
          pulls up more about the body you're circling (the scanners and consoles of the Enterprise
          bridge, reading a planet before you commit). Then beam people and cargo down and up between
          worlds: drag-and-drop for spacefarers. Landing physics refinements: targets can wear
          SANDPAPER — friction zones that slow you and stop you, so arrival doesn't need a perfect
          shot — and outer ORBITAL FIELDS you can aim for instead of the body: snap-drag rings at
          several distances and frequencies that capture a near-miss into stable orbit automatically.
          Snap targets for velocity, the way the milepost snaps position.
        lineage: "DreamScape (1995, kiss-to-link) → iLoci (2009) → MediaGraph (2010) → the exit-graph MOOLLM navigates now"
        k_lines: [JUNCTION-PIE-MENU, PIE-MENU, MILEPOSTS, SIMULATOR-EFFECT]
        see_also:
          repo: [../skills/micropolis/artifacts/history.yml, don-hopkins-projects.md, ../skills/mind-mirror/HALLS-AND-ROOMS.md]
          repos:
            - "MediaGraph demo (Don Hopkins) — https://donhopkins.medium.com/mediagraph-demo-a7534add63e5"
          web:
            - "Spacewar! — https://en.wikipedia.org/wiki/Spacewar!"
            - "Marble Madness — https://en.wikipedia.org/wiki/Marble_Madness"
            - "Inertial (kinetic) scrolling — https://en.wikipedia.org/wiki/Inertial_scrolling"
            - "Gravity assist / orbital mechanics — https://en.wikipedia.org/wiki/Gravity_assist"

      - term: GO
        kind: coined
        origin: "MOOLLM Geometry Wing, July 2026 — the collapse of every navigation key into one verb"
        means: "There is only one navigation command: go(direction), where direction is forward or back along any dimension, or any see-also / also-seen link. Climbing the parent hierarchy is not a special command, because the parent hierarchy is not special."
        kid: "No back button, no up button, no escape key. Every way out of a room is just a door, and the only thing you ever do is walk through one."
        type_sketch: "go(direction)  # direction ∈ forward/back(dimension) ∪ see-also links ∪ also-seen links"
        deep: >
          Not arrow keys plus a backspace to escape plus a shift-control-meta-double-bucky chord to
          climb the tree. An object lives in any number of hierarchy networks at once — the class
          tree, the window tree, the set of instances, the search results, the timeline — so up/down
          in each is just one more pair of doors at the junction. Escape keys are what hierarchies
          charge you for pretending there is only one tree; in a network every exit is a direction,
          and every direction is go. The also-seen links are the reverse pointers — a wink to Ted
          Nelson, whose links were always two-way.
        k_lines: [JUNCTION-PIE-MENU, HALLS-AND-ROOMS, MILEPOSTS, BALLISTIC-NAVIGATION, ROOM]
        see_also:
          repo: [../skills/mind-mirror/HALLS-AND-ROOMS.md, ../skills/adventure/]
          web:
            - "Ted Nelson, Project Xanadu (two-way links) — https://en.wikipedia.org/wiki/Project_Xanadu"
            - "Colossal Cave Adventure (go north; the verb at the source) — https://en.wikipedia.org/wiki/Colossal_Cave_Adventure"
            - "Space-cadet keyboard (double bucky) — https://en.wikipedia.org/wiki/Space-cadet_keyboard"

      - term: PARTY
        kind: inherited
        origin: "Tabletop and computer RPGs; MOOLLM VEHICLE and INVENTORY protocols make it structural"
        means: "A collection of characters in a vehicle or room, traveling together — splitting off and rejoining. The most tangible object in the system: any kid who has piled into a car for a road trip already holds the concept."
        kid: "You and your friends in the car. Sometimes someone gets out to explore and meets you at the next stop."
        deep: >
          The traveler's memory hierarchy does not stop at trailers — vehicles nest into bigger
          vehicles: ferries and cargo ships, rockets and spaceships, space stations, giant AI ships
          that are themselves characters (Iain M. Banks' Culture Minds — the vehicle IS the smartest
          member of the party), space cities, worlds, whole cultures, and the Special Circumstances
          of a Banks novel, where party, vehicle, and civilization blur into one traveler. Same
          hierarchy the whole way up: each tier bigger, slower, and farther from the hands.
        k_lines: [HALLS-AND-ROOMS, ROOM, ADVENTURE-TYPE-SYSTEM, MEMORY-PALACE]
        see_also:
          repo: [../skills/mind-mirror/HALLS-AND-ROOMS.md, ../skills/adventure/, ../skills/character/]
          web:
            - "Party (role-playing games) — https://en.wikipedia.org/wiki/Party_%28role-playing_games%29"
            - "Iain M. Banks, the Culture (Minds, GSVs, Special Circumstances) — https://en.wikipedia.org/wiki/The_Culture"
            - "Memory hierarchy — https://en.wikipedia.org/wiki/Memory_hierarchy"

      - term: ADVENTURE-TYPE-SYSTEM
        kind: coined
        origin: "skills/mind-mirror/HALLS-AND-ROOMS.md — the mapping, closed"
        means: "Room = scope/activation record. Hall = typed edge, FloatEnum-valued. Milepost = named constant with snap/blend methods. Traveler = closure (Mind Mirror coordinates + inventory = captured environment moving through scopes). Party = struct of closures sharing a vehicle. Conversation = concurrent travelers exchanging inventory in a shared room."
        kid: "The game and the program are the same thing wearing two costumes. Rooms are recipes, doors are 'now do this one,' and your backpack is what the recipe remembers."
        thesis: "Adventure games and programming languages were always the same artifact — rooms/scopes, exits/calls, items/values, inventory/environment — and the LLM is what finally lets one artifact hold both readings at once without a compiler ever noticing it's in a dungeon."
        deep: >
          Don ran the thesis past the source in Scott Adams' 2021 Hacker News AMA: are adventure
          games memory palaces — geographic retrieval for vast information? Scott: "OK, I am blown
          away at your creativity and ideas. I am aware of Memory Palaces and you certainly make an
          excellent tie-in with adventure game handling." The same thread carries Don's reading of
          the Nassi-Shneiderman diagram as a map of a building — front entrance at the top, exit at
          the bottom, branch arms as The Price is Right doors that reconverge at the loading dock —
          geographic visual programming, spotted in a 1973 flowchart notation. And the pie menu
          identity, stated by Don in 2021: 4- and 8-item pie menus are the essential elements of an
          Adventure map, once menus are rooms with two-way links instead of a tree with one-way exits.
        k_lines: [HALLS-AND-ROOMS, MILEPOSTS, JUNCTION-PIE-MENU, GO, PARTY, MEMORY-PALACE]
        see_also:
          repo: [../skills/mind-mirror/HALLS-AND-ROOMS.md, ../skills/adventure/, ../skills/room/]
          web:
            - "Scott Adams AMA on Hacker News (2021) — Don ↔ Scott on memory palaces, adventure algorithms, geographic visual programming — https://news.ycombinator.com/item?id=29330120"
            - "Nassi-Shneiderman diagram — https://en.wikipedia.org/wiki/Nassi%E2%80%93Shneiderman_diagram"
            - "Scott Adams (game designer) — https://en.wikipedia.org/wiki/Scott_Adams_%28game_designer%29"
            - "Closure (computer programming) — https://en.wikipedia.org/wiki/Closure_%28computer_programming%29"
            - "Activation record / call stack — https://en.wikipedia.org/wiki/Call_stack"

      - term: MEMORY-PALACE
        kind: inherited
        origin: "Simonides of Ceos (~500 BC) via Cicero; Frances Yates, The Art of Memory"
        means: "Put ideas in imagined rooms; remember by walking. MOOLLM makes the palace real, shared, and versioned: the repo is a palace many minds co-navigate."
        kid: "Hide your homework facts in rooms of a pretend house. To remember, walk through the house. Now imagine your friends can walk it too."
        deep: "Simonides rebuilt the banquet hall alone, in one skull. A repo palace is multiplayer: people, agents, and games hold coordinates in the same complex and diff each other's furniture. The method of loci was always a filesystem."
        k_lines: [ROOM, HALLS-AND-ROOMS, BOUNCY-CASTLE]
        see_also:
          repo: [HOME-AUTOMATION-MEMORY-PALACE.md, ../skills/mind-mirror/HALLS-AND-ROOMS.md]
          web:
            - "Method of loci — https://en.wikipedia.org/wiki/Method_of_loci"
            - "Frances Yates, The Art of Memory — https://en.wikipedia.org/wiki/The_Art_of_Memory"
            - "Simonides of Ceos — https://en.wikipedia.org/wiki/Simonides_of_Ceos"

      - term: BOUNCY-CASTLE
        kind: coined
        origin: "designs/MOOLLM-PROTOCOLS.md — extends PORTABLE-ROOM"
        means: "A recursive navigable thought-space with its own internal geometry — a room that is bigger on the inside and bounces back."
        kid: "A castle you carry in your pocket that's huge when you go in. Also bouncy."
        deep: "Experimental: rooms whose interiors obey different metrics than their exteriors — the architectural license for high-dimensional navigation."
        k_lines: [ROOM, HALLS-AND-ROOMS]
        see_also:
